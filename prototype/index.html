<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Diecast — Vision Prototype</title>

<!-- Network dependency: CDN imports + Google Fonts required until Phase 6 inlines assets. Acceptable for the dev loop. -->

     driver.js is imported NOWHERE in Phase 1 — it lives in the map only to keep the
     <15KB library-weight check honest (Phase 6 wires its usage). -->
<script type="importmap">

  "imports": {
    "preact": "https://esm.sh/preact@10.26.2",
    "preact/hooks": "https://esm.sh/preact@10.26.2/hooks",
    "htm/preact": "https://esm.sh/htm@3.1.1/preact?external=preact",
    "driver.js": "https://esm.sh/driver.js@1.3.1"
  }
}
</script>

<!-- Identity fonts: IBM Plex Mono (headings/mono) + DM Sans (body). -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ── Design tokens (Contract 7) — lifted VERBATIM from
   goals/product-revamp-diecast/exploration/design-samples/app-shell.html :root block.
   Extend-not-rename downstream. ── */
:root{
  --cream:#F5F4F0; --cream-deep:#EDEBE4; --cream-shadow:#E3E0D6;
  --paper:#FFFFFF; --ink:#1A1A28; --ink-60:#4A4860; --ink-35:#9C99AC;
  --hairline:#DDD8CD; --hairline-soft:#E8E5DC;
  --rasp:#D6235C; --rasp-08:rgba(214,35,92,.08); --rasp-15:rgba(214,35,92,.15);
  --maker:#3B5BB0; --checker:#6B47B0; --ok:#2D7D4F; --warn:#B5821A;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --sans:'DM Sans',system-ui,sans-serif;

  /* ── Motion tokens (Contract 6) — consumed by 1.2/1.3. ── */
  --morph-duration:350ms;
  --ease-morph:cubic-bezier(0.2,0.8,0.2,1);
  --motion-fast:120ms;
  /* reduced-motion fade target = 180ms (consumed in 1.2/1.3 reduced-motion branch). */

  /* ── Radius tokens. ── */
  --radius-sm:4px;
  --radius-md:8px;

  /* ── 2b additions (Contract 7) — extend, never rename. ── */
  --fail:#B22439;            /* test-red for E2/E3 repro — semantic red, DISTINCT from raspberry (needs-you). */
  /* L-level badge mapping → .lbadge--l1/l2/l3 (L1=--ink-35 · L2=--warn · L3=--rasp). Implemented as classes below. */
  /* Confidence glyphs ● high / ◐ med / ○ low are a render convention (confGlyph), never a percentage. */
}

*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{
  background:var(--cream);
  color:var(--ink);
  font-family:var(--sans);
  font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
  display:flex;align-items:center;justify-content:center;
  padding:28px;
}
h1,h2,h3,h4{font-family:var(--mono);font-weight:500;margin:0;}

/* ── View-transition register (1.3, Contract 6) — the locked morph motion.
   Every snapshot group (the named anchors + the root old/new crossfade) animates at
   ~350ms on the morph easing. The five vt- anchors GLIDE/resize independently; the
   unnamed spine/body zones ride the root crossfade (segment bar → loop band). ── */
::view-transition-group(*){
  animation-duration:var(--morph-duration);          /* 350ms */
  animation-timing-function:var(--ease-morph);        /* cubic-bezier(0.2,0.8,0.2,1) */
}
/* Reduced-motion belt-and-suspenders: the JS dispatch path already bypasses
   startViewTransition under prefers-reduced-motion (180ms fade instead). This CSS
   guard neutralizes any view-transition animation that still fires, so nothing slides. */
@media (prefers-reduced-motion: reduce){
  ::view-transition-group(*),
  ::view-transition-old(*),
  ::view-transition-new(*){ animation-duration:1ms !important; }
}

/* ── Three-tier shell: nav rail · CanvasFrame · ChatRail (layout reference: app-shell.html). ── */
#app{width:min(1280px,100%);}
.shell{
  display:grid;grid-template-columns:236px minmax(0,1fr) 304px;
  height:min(780px,calc(100vh - 56px));
  background:var(--cream);border:1px solid var(--hairline);
  box-shadow:0 24px 60px -30px rgba(26,26,40,.25), 0 2px 6px rgba(26,26,40,.05);
  border-radius:14px;overflow:hidden;
}

/* Left nav rail — persistent (vt-nav-rail anchor; mounted across BOTH families). */
.nav-rail{
  background:var(--cream);border-right:1px solid var(--hairline);
  display:flex;flex-direction:column;padding:20px 12px 14px;gap:2px;
  view-transition-name:vt-nav-rail;        /* 1.3 anchor (Contract 5) — glides, never crossfades. */
}
.brand{font-family:var(--mono);font-weight:600;font-size:18px;letter-spacing:-.5px;}
.brand em{color:var(--rasp);font-style:normal;}
.tagline{font-size:11px;color:var(--ink-35);margin:2px 0 16px;}
.rail-h{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink-35);margin:12px 4px 6px;}
.nav-goal{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--radius-sm);
  cursor:pointer;color:var(--ink-60);text-decoration:none;}
.nav-goal:hover{background:var(--cream-deep);}
.nav-goal.sel{background:var(--rasp-08);color:var(--ink);}
.nav-goal .fam{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.04em;
  color:var(--ink-35);min-width:34px;}
.nav-goal.sel .fam{color:var(--rasp);}
.nav-goal .t{flex:1;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nav-dead{color:var(--ink-35);cursor:default;}
.nav-dead:hover{background:transparent;}
.nav-spacer{flex:1;}

/* Center CanvasFrame — renders the resolved route's view. */
.canvas-frame{
  position:relative;overflow-y:auto;padding:26px 32px 30px;
  background:
    radial-gradient(circle, rgba(26,26,40,.045) 1px, transparent 1.2px) 0 0/18px 18px,
    var(--cream);
}

/* Right ChatRail — persistent across routes (vt-chat-rail anchor). */
.chat-rail{
  background:var(--paper);border-left:1px solid var(--hairline);
  display:flex;flex-direction:column;min-height:0;padding:18px 16px;
  view-transition-name:vt-chat-rail;       /* 1.3 anchor (Contract 5). */
}
.chat-h{display:flex;align-items:center;gap:10px;padding-bottom:14px;
  border-bottom:1px solid var(--hairline-soft);}
.chat-h .t{font-family:var(--mono);font-weight:600;font-size:13px;}
.chat-h .s{font-size:11px;color:var(--ink-35);}
.chat-body{flex:1;display:flex;align-items:center;justify-content:center;
  color:var(--ink-35);font-size:12px;text-align:center;padding:0 8px;}
.chat-inp{border:1px solid var(--hairline);border-radius:var(--radius-md);
  padding:9px 11px;color:var(--ink-35);font-size:12px;}

/* ── GoalCanvas (two-part anatomy stubs). ── */
.crumb{font-family:var(--mono);font-size:11px;color:var(--ink-60);margin-bottom:14px;}
.crumb b{color:var(--ink);}
.goal-header{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;
  view-transition-name:vt-goal-header;     /* 1.3 anchor (Contract 5) — title/crumb glide; fampill content crossfades. */
  padding:2px 0;}
.gtitle{font-family:var(--mono);font-weight:500;font-size:22px;letter-spacing:-.4px;}
.fampill{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.06em;
  text-transform:uppercase;padding:3px 8px;border-radius:999px;
  background:var(--rasp-08);color:var(--rasp);}
.fampill.debug{background:rgba(107,71,176,.1);color:var(--checker);}
.guide-line{display:flex;align-items:center;gap:8px;margin:14px 0 4px;
  font-size:12.5px;color:var(--ink-60);}
/* ── Stage-spine ZONE WRAPPER. Carries NO view-transition-name → it rides the root
   crossfade, so on a morph the feature segment bar dissolves into the debug loop band
   ("same goal, new shape"). The four shapes + the PLACEHOLDER watermark now render through
   the StageSpine component (spine-* prefix, 2b.2a); the Phase-1 inline shape/`.ph-mark`
   CSS retired in 2b.3 with the stub markup it styled (dead-class + raw-hex sweep). ── */
.spine-zone{position:relative;margin:20px 0 18px;}
/* 2b.2b: the nudge ZONE WRAPPER — keeps the vt-nudge-card morph anchor (Contract 5/9) on a
   stable shell element; the visual card now renders INSIDE via the NudgeCard component
   (.nudge-card, nudge-* prefix). The stub child rules (.nudge .who/.do/.why) retired with the stub. */
.nudge{margin:6px 0 20px;
  view-transition-name:vt-nudge-card;      /* 1.3 anchor (Contract 5) — zone glides; NudgeCard copy crossfades. */}
/* GoalCanvas Part-2 body — stacked zones (2b.3): the work stream (line-density
   ColleagueCards) above the stage-artifacts EvidenceBlock. Was a 1fr·1fr grid of stub
   panels; the E1 block needs the full content width, so the body now flows in one column. */
.body{display:flex;flex-direction:column;gap:24px;margin-top:10px;}
.body > section{min-width:0;}
.sect-h{font-family:var(--mono);font-size:11px;color:var(--ink-60);margin-bottom:9px;}
.sect-h .k{color:var(--ink);font-weight:600;}
.panel{border:1px solid var(--hairline);border-radius:var(--radius-md);
  background:var(--paper);padding:14px;color:var(--ink-35);font-size:12px;}
/* work stream — a column of line-density ColleagueCards (the In-flight-work zone). */
.work-stream{display:flex;flex-direction:column;gap:8px;max-width:460px;}
.receipt-trail{margin-top:18px;padding-top:12px;border-top:1px dashed var(--hairline);
  font-family:var(--mono);font-size:11px;color:var(--ink-35);min-height:18px;
  display:flex;flex-direction:column;align-items:flex-start;gap:6px;
  view-transition-name:vt-receipt-trail;   /* 1.3 anchor (Contract 5) — trail glides; receipt pill crossfades in. */}
/* ── 3.4: the evidence/work ZONE WRAPPER — the SIXTH morph anchor (vt-evidence-strip), Phase-1
   RESERVED and claimed here. It wraps the .body second zone (the feature StageSurface+E1 strip
   on CAST-412, the InvestigationLedger/E2 seed once morphed), so on the real hero morph the zone
   GLIDES while the EvidenceBlock content (E1 ⇄ E2) crossfades inside it. UNIQUENESS (BINDING #8):
   exactly ONE element carries this name per snapshot — it lives ONLY on the GoalCanvas zone wrapper,
   never on an EvidenceBlock and never on #/kit (which renders bare components, no zone wrapper). ── */
.evidence-zone{min-width:0;view-transition-name:vt-evidence-strip;}
.evidence-zone > section{min-width:0;}

/* ── Home + BoardStub. ── */
.stub-wrap{padding:48px 8px;max-width:520px;}
.stub-wrap h1{font-size:26px;margin-bottom:10px;}
.stub-wrap p{color:var(--ink-60);margin:0 0 20px;}
/* a cream board frame for the #/board density-drift drop (one 4C ColleagueCard) — the real
   board is Phase 5; this is just enough surface to prove the 4C lockup off-canvas (2b.3). */
.board-frame{background:var(--cream-deep);border:1px solid var(--hairline-soft);
  border-radius:var(--radius-md);padding:18px;display:inline-block;}
.stub-link{display:inline-block;font-family:var(--mono);font-size:13px;color:var(--rasp);
  text-decoration:none;border:1px solid var(--rasp-15);border-radius:var(--radius-sm);
  padding:8px 14px;}
.stub-link:hover{background:var(--rasp-08);}

/* ── Decision receipts in the trail now render through the kit `Decision` component at the
   6A `pill` layer (2b.3 composition) — the Phase-1 inline `.receipt` pill CSS retired here,
   superseded by the full 6A→6B→6C ladder shipped in 2b.2b (dec-* prefix). ── */

/* ── Pinned objects (promote / pin ops). ── */
.pinned-wrap{margin-top:18px;}
.pinned-card{border:1px solid var(--hairline);border-left:3px solid var(--checker);
  border-radius:var(--radius-md);background:var(--paper);padding:10px 12px;margin-bottom:8px;}
.pinned-card .name{font-weight:600;font-size:12.5px;}
.pinned-card .prov{font-family:var(--mono);font-size:10px;color:var(--ink-35);margin-top:3px;}

/* ── Drill-in execution panel (drillInto op). ── */
.drill-panel{margin-top:18px;border:1px dashed var(--checker);border-radius:var(--radius-md);
  padding:12px 14px;background:rgba(107,71,176,.04);}

/* ── DEV op strip (TEMPORARY — removed/gated in 1.3). ── */
.dev-strip{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:24px;padding:8px 10px;
  border:1px dashed var(--rasp);border-radius:var(--radius-sm);background:var(--rasp-08);}
.dev-strip .dev-label{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;color:var(--rasp);margin-right:4px;}
.dev-strip button{font-family:var(--mono);font-size:11px;cursor:pointer;
  border:1px solid var(--hairline);background:var(--paper);color:var(--ink-60);
  border-radius:var(--radius-sm);padding:4px 8px;}
.dev-strip button:hover{border-color:var(--rasp);color:var(--ink);}

/* ── ChatRail conversation log + "Next ▸" scripted-send control. ── */
.chat-log{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;
  padding:14px 2px;min-height:0;}
.chat-empty{margin:auto;color:var(--ink-35);font-size:12px;text-align:center;}
.msg{display:flex;flex-direction:column;gap:3px;}
.msg .mfrom{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.06em;
  text-transform:uppercase;color:var(--ink-35);}
.msg .mtext{font-size:12.5px;color:var(--ink);border-radius:var(--radius-md);
  padding:8px 10px;background:var(--cream-deep);}
.msg.you{align-items:flex-end;}
.msg.you .mtext{background:var(--rasp-08);}
/* Guide voice (locked, 2b.3): hue-free — a left-rule + the ◈ diamond carry the Guide's
   identity, NOT color (the label-free distinctness contract; the Guide is never the checker hue). */
.msg.guide .mfrom{color:var(--ink-60);}
.msg.guide .mtext{border-left:2px solid var(--ink);border-radius:0 var(--radius-md) var(--radius-md) 0;}
.msg.system .mtext{background:transparent;color:var(--ink-35);font-style:italic;padding:2px 10px;}
.msg .mops{display:flex;gap:6px;margin-top:2px;}
.opbtn{font-family:var(--mono);font-size:11px;cursor:pointer;border:1px solid var(--rasp-15);
  background:var(--paper);color:var(--rasp);border-radius:var(--radius-sm);padding:4px 9px;}
.opbtn:hover{background:var(--rasp-08);}
.next-btn{font-family:var(--mono);font-size:12px;font-weight:500;cursor:pointer;
  border:1px solid var(--rasp);background:var(--rasp);color:var(--paper);border-radius:var(--radius-md);
  padding:9px 12px;margin:10px 0;}
.next-btn:hover{filter:brightness(1.05);}
.next-btn:disabled{background:var(--cream-deep);color:var(--ink-35);border-color:var(--hairline);
  cursor:default;filter:none;}

/* ════════════════════════════════════════════════════════════════════════
   2b.1 — GRAMMAR LAYER STYLES (Avatar · ColleagueCard · L-badge · Guide voice ·
   #/kit harness). Token-only colors (the single 2b raw-hex addition is --fail in
   :root). Prefixes: av- (avatar) · cc- (colleague card) · lbadge- · gm-/gv- (guide
   mark + voice) · kit- (harness-only chrome). No view-transition-name lives here
   (Contract 9 — kit components render twice; anchors are shell-only).
   ════════════════════════════════════════════════════════════════════════ */

/* ── L-level reversibility badge (Contract 7 mapping). ── */
.lbadge{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.04em;
  padding:1px 7px;border-radius:999px;border:1px solid;}
.lbadge--l1{color:var(--ink-35);border-color:var(--ink-35);}
.lbadge--l2{color:var(--warn);border-color:var(--warn);}
.lbadge--l3{color:var(--rasp);border-color:var(--rasp);}

/* ── Avatar primitive (Contract 6): one component, four kinds. .av-mk is the shape
   geometry, optically scaled so circle/square/diamond read as the SAME visual mass
   (square is heaviest → inset; circle ≈ full; diamond bumped to fill the rotation
   silhouette). .av-face is the glyph layer — never rotated, always upright. Size via
   the --avatar-size custom property (inherited; default 30px), not per-call markup. ── */
.av{position:relative;flex:none;display:inline-grid;place-items:center;
  width:var(--avatar-size,30px);height:var(--avatar-size,30px);
  font-family:var(--mono);font-weight:600;
  font-size:calc(var(--avatar-size,30px) * .36);letter-spacing:-.03em;}
.av-mk{grid-area:1/1;width:100%;height:100%;}
.av-face{grid-area:1/1;z-index:1;line-height:1;}
.av--human  .av-mk{border-radius:50%;background:var(--ink);transform:scale(.98);}
.av--human  .av-face{color:var(--cream);}
.av--maker  .av-mk{border-radius:var(--radius-sm);background:var(--paper);
  border:2px solid var(--maker);transform:scale(.88);}
.av--maker  .av-face{color:var(--maker);}
.av--checker .av-mk{border-radius:var(--radius-sm);background:var(--checker);transform:scale(.88);}
.av--checker .av-face{color:var(--paper);}
.av--guide  .av-mk{border-radius:2px;background:var(--ink);transform:rotate(45deg) scale(.62);}
.av--guide  .av-face{color:var(--cream);}

/* ── ColleagueCard (Contract 1, pick 4C+4B): ONE component, two densities. The five
   lockup slots render in IDENTICAL order both densities (zero field drift); density is
   purely a container-layout concern + the card-only stat footer. ── */
.cc{--avatar-size:30px;font-size:12.5px;color:var(--ink);}
.cc-slot{display:inline-flex;align-items:center;gap:7px;min-width:0;}
.cc-slot--head{gap:8px;}
.cc-name{font-family:var(--mono);font-weight:600;font-size:13px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cc-pair{font-family:var(--mono);font-size:11px;color:var(--ink-60);}
.cc-pair .cc-tie{color:var(--ink-35);margin-right:2px;}
.cc-pair--broken{color:var(--rasp);font-weight:600;}   /* missing checker = needs-you, never silent */
.cc-pair--solo{color:var(--ink-35);}
.cc-meter{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);
  font-size:11px;color:var(--ink-60);}
.cc-meter > i.cc-seg{width:11px;height:5px;border-radius:2px;background:var(--hairline);}
.cc-meter > i.cc-seg--used{background:var(--warn);}
.cc-meter--na{color:var(--ink-35);}
.cc-flight{font-family:var(--mono);font-size:11px;color:var(--checker);}
.cc-flight--idle{color:var(--ink-35);}                 /* inflight:null → visible absence, not a gap */

/* card density — 4C mini-card: head spans the top, the other four slots flow into a
   four-column row beneath (order preserved), stat footer last. */
.cc--card{--avatar-size:34px;display:grid;grid-template-columns:auto auto auto auto;
  gap:9px 16px;align-items:center;max-width:380px;
  border:1px solid var(--hairline);border-radius:var(--radius-md);
  background:var(--paper);padding:13px 15px;}
.cc--card .cc-slot--head{grid-column:1 / -1;}
.cc--card .cc-foot{grid-column:1 / -1;display:flex;justify-content:space-between;
  border-top:1px solid var(--hairline-soft);padding-top:9px;margin-top:1px;
  font-family:var(--mono);font-size:11px;color:var(--ink-35);}

/* line density — 4B compact row: same five slots, one line. */
.cc--line{--avatar-size:22px;display:flex;align-items:center;flex-wrap:wrap;gap:6px 13px;
  padding:8px 11px;border:1px solid var(--hairline-soft);border-radius:var(--radius-sm);
  background:var(--paper);}
.cc--line .cc-name{font-size:12px;}

/* ── Guide character — chosen treatment A (diamond + mono wordmark; voice = typography
   + structure, NO new hue). GuideMark reuses the Avatar diamond (single-source grammar). ── */
.gm{display:inline-flex;align-items:center;gap:7px;}
.gm-word{font-family:var(--mono);font-weight:600;font-size:11px;letter-spacing:.14em;color:var(--ink);}
/* chat voice: hairline left-rule + cream-deep tint (color-free distinction). */
.gv-chat-h{display:flex;align-items:center;gap:9px;padding-bottom:9px;
  border-bottom:1px solid var(--hairline-soft);}
.gv-chat-sub{font-family:var(--mono);font-size:11px;color:var(--ink-35);}
.gv-chat-msg{margin-top:10px;padding:9px 12px;font-size:12.5px;color:var(--ink);
  border-left:2px solid var(--ink);background:var(--cream-deep);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;}
/* nudge attribution (card carries the needs-you accent; the Guide mark stays ink). */
.gv-nudge{border:1px solid var(--hairline);border-left:3px solid var(--rasp);
  border-radius:var(--radius-md);background:var(--paper);padding:12px 14px;max-width:360px;}
.gv-nudge-who{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;
  letter-spacing:.05em;color:var(--ink-60);text-transform:uppercase;}
.gv-nudge-do{font-weight:600;font-size:14px;margin:5px 0 2px;}
.gv-nudge-why{font-size:12px;color:var(--ink-60);}
/* receipt byline. */
.gv-receipt{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;
  color:var(--ink-60);border:1px solid var(--hairline);border-radius:999px;
  background:var(--paper);padding:4px 11px;}
.gv-receipt-by{display:inline-flex;align-items:center;gap:5px;color:var(--ink-35);}

/* ── #/kit harness chrome (kit- prefix — Phase 6 strips this without touching product CSS). ── */
.kit-wrap{max-width:760px;}
.kit-banner{border-bottom:1px solid var(--hairline);padding-bottom:14px;margin-bottom:6px;}
.kit-title{font-family:var(--mono);font-weight:600;font-size:16px;}
.kit-sub{font-size:12px;color:var(--ink-35);margin-top:3px;}
.kit-sect{padding:20px 0;border-bottom:1px dashed var(--hairline-soft);}
.kit-h{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--ink);}
.kit-cap{font-family:var(--mono);font-size:11px;color:var(--ink-35);margin:3px 0 14px;}
.kit-note{font-size:11px;color:var(--ink-35);margin-top:10px;font-style:italic;}
.kit-tokrow{display:flex;flex-wrap:wrap;gap:16px;align-items:center;}
.kit-tok{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:12px;color:var(--ink-60);}
.kit-sw{width:14px;height:14px;border-radius:3px;display:inline-block;border:1px solid var(--hairline);}
.kit-avrow{display:flex;gap:28px;align-items:flex-end;flex-wrap:wrap;}
.kit-avrow--lg{margin-top:18px;gap:24px;}
.kit-avcell{display:flex;flex-direction:column;align-items:center;gap:8px;
  font-size:11px;color:var(--ink-35);font-family:var(--mono);}
.kit-frame{margin:0 0 10px;}
.kit-frame--board{background:var(--cream);border:1px solid var(--hairline-soft);
  border-radius:var(--radius-md);padding:16px;display:inline-block;}
.kit-frame--row{background:var(--paper);border:1px solid var(--hairline-soft);
  border-radius:var(--radius-md);padding:4px 10px;display:inline-block;min-width:420px;}
.kit-cand-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:640px;}
.kit-cand{border:1px solid var(--hairline);border-radius:var(--radius-md);
  background:var(--paper);padding:14px;text-align:center;}
.kit-cand--keep{border-color:var(--ink);}
.kit-cand--rej{opacity:.6;}
.kit-cand-mark{height:40px;display:grid;place-items:center;--avatar-size:30px;}
.cand-seal{font-size:26px;color:var(--ink);}
.cand-typo{font-family:var(--mono);font-weight:600;font-size:15px;color:var(--ink-60);letter-spacing:.06em;}
.kit-cand-id{font-family:var(--mono);font-size:11px;margin-top:8px;color:var(--ink);}
.kit-cand-v{font-size:11px;color:var(--ink-35);margin-top:6px;}
.kit-cand-v--keep{color:var(--ok);font-weight:600;}

/* ════════════════════════════════════════════════════════════════════════
   2b.2a — SPINE + EVIDENCE LAYER STYLES (StageSpine · EvidenceBlock).
   Prefixes: spine-* (four canvas shapes) · ev-* (the E1–E5 evidence family).
   Token-only colors. NO view-transition-name lives here (Contract 9 — StageSpine
   renders twice on #/kit and is swapped inside the shell's spine-zone wrapper; the
   morph anchor is on the wrapper, never on the component). The loop-band checker
   tint mirrors the Phase 1 .loopband values VERBATIM so the live feature→debug
   morph crossfade keeps its established silhouette (load-bearing for the morph gate).
   ════════════════════════════════════════════════════════════════════════ */

/* ── StageSpine shared shell — position:relative anchors the PLACEHOLDER watermark
   that every placeholder spine carries (Phase 1 convention; self-contained so #/kit
   renders are honest without the shell zone wrapper). ── */
.spine-root{position:relative;margin:0;}
.spine-ph{position:absolute;top:-9px;right:0;font-family:var(--mono);font-size:8px;font-weight:600;
  letter-spacing:.16em;text-transform:uppercase;color:var(--ink-35);
  border:1px dashed var(--hairline);border-radius:999px;padding:1px 8px;background:var(--cream);
  pointer-events:none;}
.spine-unknown{font-family:var(--mono);font-size:12px;color:var(--rasp);
  border:1px dashed var(--rasp);border-radius:var(--radius-sm);padding:8px 11px;background:var(--rasp-08);}
.spine-n{font-family:var(--mono);font-size:10px;color:var(--ink-35);}

/* shape A · SEGMENTS (1B) — labeled segment BAR: future hollow, done ink-tinted,
   current accent-filled (raspberry = the active step). Silhouette: row of square chips. */
.spine-segbar{display:flex;gap:8px;flex-wrap:wrap;margin:0;}
.spine-seg{display:flex;align-items:center;gap:7px;padding:7px 11px;border-radius:var(--radius-sm);
  border:1px solid var(--hairline);font-size:12px;color:var(--ink-35);background:var(--paper);}
.spine-seg--done{color:var(--ink-60);background:var(--cream-deep);border-color:var(--hairline-soft);}
.spine-seg--now{border-color:var(--rasp);color:var(--ink);background:var(--rasp-08);}

/* shape B · LOOP (2B) — staged checker-tinted pill BAND + `↺ iter n/m` badge. The loop
   glyph is the signature; the counter is mono. Silhouette: rounded band, → separators. */
.spine-loopband{display:flex;align-items:center;gap:2px;flex-wrap:wrap;margin:0;
  border:1px solid rgba(107,71,176,.25);border-radius:999px;
  background:rgba(107,71,176,.06);padding:6px 8px;}
.spine-loopstage{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;
  font-size:12px;color:var(--ink-60);white-space:nowrap;}
.spine-loopstage--now{background:var(--checker);color:var(--paper);}
.spine-loopstage .spine-n{opacity:.7;}
.spine-loopsep{color:var(--ink-35);font-size:12px;padding:0 1px;}
.spine-iter{margin-left:auto;display:inline-flex;align-items:center;gap:5px;
  font-family:var(--mono);font-size:11px;font-weight:600;color:var(--checker);
  background:rgba(107,71,176,.14);border-radius:999px;padding:3px 11px;}

/* shape C · TIMEBOX — a single horizontal budget METER, deliberately lighter than a
   spine (no phase nodes — a spike must never look like a mini-feature, playbook 03).
   Silhouette: one thin track with a used-fill + a budget·used legend. */
.spine-timebox{display:flex;flex-direction:column;gap:7px;max-width:340px;}
.spine-tb-head{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;color:var(--ink-60);}
.spine-tb-glyph{font-size:12px;color:var(--ink-35);}
.spine-tb-track{height:8px;border-radius:999px;background:var(--cream-deep);
  border:1px solid var(--hairline-soft);overflow:hidden;}
.spine-tb-fill{height:100%;background:var(--warn);border-radius:999px;}
.spine-tb-legend{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--ink-35);}

/* shape D · PIPELINE — a data-stage NODE CHAIN (Question ▸ Sources ▸ Analysis ▸ Answer):
   dots hollow/filled by `current`, ▸ flow arrows between. Silhouette: dotted chain, not
   boxed chips (materially distinct from SEGMENTS). */
.spine-pipeline{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin:0;}
.spine-node{display:inline-flex;align-items:center;gap:7px;padding:5px 4px;font-size:12px;color:var(--ink-35);}
.spine-node--done{color:var(--ink-60);}
.spine-node--now{color:var(--ink);font-weight:600;}
.spine-dot{width:11px;height:11px;border-radius:50%;border:2px solid var(--ink-35);background:var(--paper);}
.spine-node--done .spine-dot{border-color:var(--ink-60);background:var(--ink-60);}
.spine-node--now .spine-dot{border-color:var(--rasp);background:var(--rasp);}
.spine-flow{color:var(--ink-35);font-size:11px;}

/* ════════════════════════════════════════════════════════════════════════
   EvidenceBlock family — ONE component, five per-kind sub-renderers (E1–E5).
   Shared vocabulary: .ev shell · .ev-head (kind tag + outcome-first line) · mono for
   machine values. EVERY block carries a confidence or flag signal — NO bare green badge
   anywhere (the "pass" counts read in ink, never a green seal). Unknown kind → visible
   .ev-unknown + console.warn, never a throw (zero-silent-failure, Phase 1 posture).
   ════════════════════════════════════════════════════════════════════════ */
.ev{border:1px solid var(--hairline);border-radius:var(--radius-md);background:var(--paper);
  padding:14px 16px;max-width:460px;font-size:12.5px;color:var(--ink);}
.ev-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;
  padding-bottom:10px;margin-bottom:12px;border-bottom:1px solid var(--hairline-soft);}
.ev-kind{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--ink-35);white-space:nowrap;}
.ev-outcome{font-weight:600;font-size:13px;color:var(--ink);line-height:1.35;}
.ev-link{font-family:var(--mono);font-size:11px;color:var(--ink);
  text-decoration:underline;text-decoration-color:var(--ink-35);text-underline-offset:2px;}
.ev-link:hover{text-decoration-color:var(--ink);}

/* E1 · Acceptance Panel — stat tiles + screenshot strip + checker-compliance rows + PR. */
.ev-tiles{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:13px;}
.ev-tile{border:1px solid var(--hairline-soft);border-radius:var(--radius-sm);
  padding:7px 12px;background:var(--cream);min-width:74px;}
.ev-tile-n{font-family:var(--mono);font-size:17px;font-weight:600;color:var(--ink);line-height:1.1;}
.ev-tile-n--muted{color:var(--ink-35);}
.ev-tile-n--delta{color:var(--ink-60);}
.ev-tile-k{font-size:9px;color:var(--ink-35);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}
.ev-shots{display:flex;gap:8px;margin-bottom:13px;}
.ev-shot{width:84px;}
.ev-shot svg{display:block;border:1px solid var(--hairline);border-radius:var(--radius-sm);}
.ev-shot-bg{fill:var(--paper);}
.ev-shot-bar{fill:var(--cream-shadow);}
.ev-shot-ln{fill:var(--hairline);}
.ev-shot-cap{display:block;font-family:var(--mono);font-size:9px;color:var(--ink-35);margin-top:3px;text-align:center;}
.ev-checks{display:flex;flex-direction:column;gap:5px;margin-bottom:11px;}
.ev-check{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--ink-60);}
.ev-check-code{font-weight:600;color:var(--ink);}
.ev-check--flag{color:var(--rasp);}
.ev-check--flag .ev-check-code{color:var(--rasp);}
.ev-attrib{margin-top:4px;}
.ev-attrib-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--ink-35);margin-bottom:5px;}

/* E2 · Confirm/Refute Ledger — refuted rows stay VISIBLE (struck), never removed. */
.ev-hyp{border-top:1px solid var(--hairline-soft);padding:9px 0;}
.ev-hyp:first-child{border-top:none;padding-top:0;}
.ev-hyp-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px;}
.ev-hyp-stmt{font-weight:600;}
.ev-hyp--refuted .ev-hyp-stmt{text-decoration:line-through;color:var(--ink-35);}
.ev-hyp-flow{font-family:var(--mono);font-size:11px;color:var(--ink-60);
  display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:5px;}
.ev-hyp-arrow{color:var(--ink-35);}
.ev-verdict{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.04em;
  padding:1px 8px;border-radius:999px;border:1px solid;white-space:nowrap;text-transform:uppercase;}
.ev-verdict--confirmed{color:var(--ok);border-color:var(--ok);}
.ev-verdict--refuted{color:var(--fail);border-color:var(--fail);}
.ev-verdict--open{color:var(--warn);border-color:var(--warn);}

/* E3 · Red→Green Repro — same test name, fail header then pass header; mono excerpts. */
.ev-run-name{font-family:var(--mono);font-size:11px;color:var(--ink-60);margin-bottom:8px;}
.ev-run-name b{color:var(--ink);}
.ev-repro{display:flex;flex-direction:column;gap:9px;}
.ev-run{border:1px solid var(--hairline);border-radius:var(--radius-sm);overflow:hidden;}
.ev-run-h{font-family:var(--mono);font-size:11px;font-weight:600;padding:5px 10px;color:var(--paper);
  display:flex;justify-content:space-between;align-items:center;}
.ev-run--fail .ev-run-h{background:var(--fail);}
.ev-run--pass .ev-run-h{background:var(--ok);}
.ev-run-body{font-family:var(--mono);font-size:11px;white-space:pre-wrap;
  padding:8px 10px;color:var(--ink-60);background:var(--cream);margin:0;}

/* E4 · Verdict Card — answer + H/M/L glyph (neutral; shape carries the signal) +
   deciding data points + a first-class spike_ref link row. */
.ev-answer{font-weight:600;font-size:14px;margin-bottom:9px;line-height:1.4;}
.ev-conf{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--ink-60);}
.ev-conf-glyph{font-size:13px;color:var(--ink);}
.ev-points{list-style:none;padding:0;margin:11px 0;display:flex;flex-direction:column;gap:5px;}
.ev-point{font-size:12px;color:var(--ink-60);padding-left:14px;position:relative;}
.ev-point::before{content:'·';position:absolute;left:5px;color:var(--ink-35);font-weight:700;}
.ev-spikeref{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;
  border-top:1px solid var(--hairline-soft);padding-top:9px;margin-top:3px;color:var(--ink-35);}

/* E5 · Rendered Report + Provenance — hand-rolled inline-SVG chart (NO chart library) +
   a `show provenance` disclosure + a dated version chip (the freshness signal). */
.ev-chart{margin:2px 0 11px;}
.ev-svg{display:block;width:100%;height:auto;}
.ev-svg .ev-bar{fill:var(--ink-35);}
.ev-svg .ev-bar--latest{fill:var(--ink);}
.ev-svg .ev-axis{stroke:var(--hairline);stroke-width:1;}
.ev-svg text{font-family:var(--mono);}
.ev-prov{margin-top:4px;}
.ev-prov summary{font-family:var(--mono);font-size:11px;color:var(--ink);cursor:pointer;
  text-decoration:underline;text-decoration-color:var(--ink-35);text-underline-offset:2px;width:fit-content;}
.ev-prov-body{font-size:11px;color:var(--ink-60);margin-top:9px;}
.ev-prov-src{font-family:var(--mono);display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
.ev-prov-chip{border:1px solid var(--hairline);border-radius:var(--radius-sm);padding:1px 7px;color:var(--ink-60);}
.ev-prov-q{font-family:var(--mono);font-size:10.5px;background:var(--cream);color:var(--ink-60);
  padding:6px 9px;border-radius:var(--radius-sm);white-space:pre-wrap;}
.ev-ver{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;
  color:var(--ink-60);border:1px solid var(--hairline);border-radius:999px;padding:2px 10px;margin-top:11px;}
.ev-ver-dot{width:6px;height:6px;border-radius:50%;background:var(--warn);flex:none;}
.ev-unknown{font-family:var(--mono);font-size:12px;color:var(--rasp);border:1px dashed var(--rasp);
  border-radius:var(--radius-md);padding:12px 14px;background:var(--rasp-08);}

/* #/kit — 2b.2a gallery layout (spine grid + evidence grid). kit- prefix (harness-only). */
.kit-spinegrid{display:grid;grid-template-columns:1fr;gap:22px;max-width:620px;}
.kit-spinecell{display:flex;flex-direction:column;gap:8px;}
.kit-spinecell > .kit-cap{margin:0;}
.kit-evgrid{display:flex;flex-direction:column;gap:18px;}
.kit-evcell{display:flex;flex-direction:column;gap:8px;}
.kit-evcell > .kit-cap{margin:0;}

/* ════════════════════════════════════════════════════════════════════════
   2b.2b — JUDGMENT LAYER STYLES (Decision ladder · NudgeCard · EscalationRail ·
   AutonomyDial). Prefixes: dec-* (decision 6A pill / 6B callout / 6C trail row) ·
   nudge-* (3B card) · rail-* (7A escalation) · dial-* (8A autonomy). Token-only
   colors. NO view-transition-name lives here (Contract 9 — these render on #/kit;
   the only morph anchor is vt-nudge-card on the GoalCanvas .nudge ZONE WRAPPER,
   never on NudgeCard). ACCENT DISCIPLINE: raspberry is confined to the L3 L-badge
   mapping (Contract 7), the rail's hero option, and the dial's L3 threshold-legend
   entry — nowhere else in normal render (error-path fallbacks reuse the semantic
   alert-red, the same posture as 2b.2a's ev-unknown / spine-unknown).
   ════════════════════════════════════════════════════════════════════════ */

/* ── Decision ladder — ONE atom, three projections. The DEC- id renders in every
   layer (ID-match verifiable); `diff` is the mono scan-line. ── */
/* 6A · inline pill: ⚖ + field diff (mono scan-line) + L-badge + DEC id. */
.dec-pill{display:inline-flex;align-items:center;gap:7px;
  border:1px solid var(--hairline);border-radius:999px;background:var(--paper);
  padding:4px 11px 4px 9px;font-size:12px;color:var(--ink-60);
  box-shadow:0 1px 2px rgba(26,26,40,.04);}
.dec-scale{font-size:13px;color:var(--ink-35);line-height:1;}
.dec-diff{font-family:var(--mono);font-size:11px;color:var(--ink);font-weight:500;}
.dec-id{font-family:var(--mono);font-size:10px;color:var(--ink-35);letter-spacing:.02em;}
.dec-pill--superseded .dec-diff{text-decoration:line-through;color:var(--ink-35);font-weight:400;}
.dec-pill--awaiting{border-style:dashed;}
/* awaiting tag — NON-animated (visible, not modal). */
.dec-await-tag{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.05em;
  text-transform:uppercase;color:var(--warn);border:1px solid var(--warn);border-radius:999px;padding:0 6px;}

/* 6B · callout: the pill AS a button + a CSS-positioned popover (no portal library). */
.dec-callout{position:relative;display:inline-flex;}
.dec-pill--btn{cursor:pointer;font:inherit;}
.dec-pill--btn:hover{border-color:var(--ink-35);}
.dec-pill--btn:focus-visible{outline:2px solid var(--maker);outline-offset:2px;}
.dec-pop{position:absolute;top:calc(100% + 7px);left:0;z-index:20;width:300px;
  border:1px solid var(--hairline);border-radius:var(--radius-md);background:var(--paper);
  box-shadow:0 12px 30px -12px rgba(26,26,40,.3),0 2px 6px rgba(26,26,40,.06);
  padding:13px 15px;font-size:12px;color:var(--ink-60);text-align:left;}
.dec-pop-row{margin-bottom:9px;}
.dec-pop-k{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.06em;
  text-transform:uppercase;color:var(--ink-35);display:block;margin-bottom:3px;}
.dec-pop-opt{display:flex;gap:7px;align-items:baseline;padding:2px 0;}
.dec-pop-opt-mark{font-family:var(--mono);font-size:11px;color:var(--ink-35);width:12px;flex:none;}
.dec-pop-opt--chosen{color:var(--ink);font-weight:500;}
.dec-pop-opt--chosen .dec-pop-opt-mark{color:var(--ok);}
.dec-pop-by{display:flex;align-items:center;gap:6px;border-top:1px solid var(--hairline-soft);
  padding-top:9px;margin-top:3px;font-family:var(--mono);font-size:10px;color:var(--ink-35);}
.dec-pop-link{font-family:var(--mono);font-size:11px;color:var(--ink);
  text-decoration:underline;text-decoration-color:var(--ink-35);text-underline-offset:2px;
  display:inline-block;margin-top:9px;cursor:pointer;}

/* 6C · trail row: time · phase · ⚖L · [diff over title] · who. The diff is the mono
   scan-line and LEADS the decision cell (the eye lands on the change, not the prose);
   the title rides secondary. Superseded rows strike the diff + link to superseded_by. */
.dec-trail{display:flex;flex-direction:column;border:1px solid var(--hairline);
  border-radius:var(--radius-md);background:var(--paper);overflow:hidden;max-width:620px;}
.dec-row{display:grid;grid-template-columns:46px 92px 58px 1fr 110px;gap:10px;align-items:center;
  padding:9px 13px;border-top:1px solid var(--hairline-soft);font-size:12px;}
.dec-row:first-child{border-top:none;}
.dec-row--head{background:var(--cream);font-family:var(--mono);font-size:9px;
  letter-spacing:.06em;text-transform:uppercase;color:var(--ink-35);}
.dec-c-time{font-family:var(--mono);font-size:11px;color:var(--ink-35);}
.dec-c-phase{font-family:var(--mono);font-size:10px;color:var(--ink-60);}
.dec-c-title{min-width:0;}
.dec-c-diff{font-family:var(--mono);font-size:11.5px;color:var(--ink);font-weight:600;display:block;}
.dec-c-name{font-size:11px;color:var(--ink-35);display:block;margin-top:2px;}
.dec-c-who{font-family:var(--mono);font-size:10.5px;color:var(--ink-60);}
.dec-row--superseded .dec-c-diff{text-decoration:line-through;color:var(--ink-35);font-weight:400;}
.dec-suplink{font-family:var(--mono);font-size:10px;color:var(--ink);text-decoration:underline;
  text-decoration-color:var(--ink-35);text-underline-offset:2px;cursor:pointer;}
.dec-unknown{font-family:var(--mono);font-size:12px;color:var(--rasp);border:1px dashed var(--rasp);
  border-radius:var(--radius-sm);padding:8px 11px;background:var(--rasp-08);}

/* ── NudgeCard (3B): primary do-line CTA (INK-filled — hue-neutral; raspberry stays
   reserved for the needs-you rail/dial per accent discipline) + ALWAYS-present
   subordinate why-line (3B thesis: the product justifies, not just points) + ◈ Guide. ── */
.nudge-card{border:1px solid var(--hairline);border-left:3px solid var(--ink);
  border-radius:var(--radius-md);background:var(--paper);padding:13px 15px;max-width:380px;}
.nudge-who{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;
  letter-spacing:.05em;text-transform:uppercase;color:var(--ink-60);}
.nudge-do{display:inline-block;margin:9px 0 7px;padding:8px 14px;border:none;cursor:pointer;
  font-family:var(--sans);font-size:14px;font-weight:600;color:var(--cream);
  background:var(--ink);border-radius:var(--radius-sm);text-align:left;}
.nudge-do:hover{filter:brightness(1.14);}
.nudge-do:focus-visible{outline:2px solid var(--maker);outline-offset:2px;}
.nudge-why{font-size:12px;color:var(--ink-60);}
.nudge-card--empty{color:var(--rasp);font-family:var(--mono);font-size:12px;
  border:1px dashed var(--rasp);border-radius:var(--radius-md);padding:12px 14px;background:var(--rasp-08);}

/* ── EscalationRail (7A): L3 header + @you route · evidence pack · three RANK-WEIGHTED
   option <button>s (A hero / B outline / C ghost), each with a consequence line. NOTHING
   pre-selected — rank guides, a real click decides (owner's resolution of pb05 pitfall 2
   vs the 7A pick). Raspberry = needs-you, on the hero card only. ── */
.rail{border:1px solid var(--hairline);border-radius:var(--radius-md);background:var(--paper);
  padding:16px 18px;max-width:460px;}
.rail-head{border-bottom:1px solid var(--hairline-soft);padding-bottom:12px;margin-bottom:13px;}
.rail-head-top{display:flex;align-items:flex-start;gap:9px;}
.rail-title{font-family:var(--mono);font-weight:600;font-size:13px;color:var(--ink);line-height:1.35;}
.rail-route{font-family:var(--mono);font-size:11px;color:var(--ink-60);margin-top:8px;}
.rail-route b{color:var(--ink);}
.rail-pack{background:var(--cream);border:1px solid var(--hairline-soft);border-radius:var(--radius-sm);
  padding:10px 12px;margin-bottom:14px;display:flex;flex-direction:column;gap:7px;}
.rail-pack-row{display:flex;gap:10px;font-size:12px;}
.rail-pack-k{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.05em;
  text-transform:uppercase;color:var(--ink-35);min-width:66px;flex:none;padding-top:2px;}
.rail-pack-v{color:var(--ink-60);}
.rail-opts{display:flex;flex-direction:column;gap:10px;}
.rail-opt{display:grid;grid-template-columns:auto 1fr;gap:3px 11px;text-align:left;cursor:pointer;
  border-radius:var(--radius-md);padding:11px 14px;font:inherit;width:100%;background:var(--paper);}
.rail-opt-rank{grid-row:1 / span 2;align-self:start;font-family:var(--mono);font-weight:600;font-size:12px;
  width:22px;height:22px;display:grid;place-items:center;border-radius:50%;
  border:1px solid var(--hairline);color:var(--ink-60);}
.rail-opt-label{font-weight:600;font-size:13px;color:var(--ink);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.rail-opt-conseq{font-size:12px;color:var(--ink-60);}
.rail-opt-tag{font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:.07em;
  text-transform:uppercase;color:var(--rasp);border:1px solid var(--rasp);border-radius:999px;padding:0 6px;}
/* A · hero — accent-filled (raspberry = needs-you). */
.rail-opt--hero{border:1px solid var(--rasp);background:var(--rasp-08);}
.rail-opt--hero .rail-opt-rank{border-color:var(--rasp);color:var(--rasp);background:var(--paper);}
.rail-opt--hero:hover{background:var(--rasp-15);}
/* B · outline. */
.rail-opt--outline{border:1px solid var(--hairline);}
.rail-opt--outline:hover{border-color:var(--ink-35);}
/* C · ghost — dashed, lightest weight. */
.rail-opt--ghost{border:1px dashed var(--hairline);background:transparent;}
.rail-opt--ghost .rail-opt-label{color:var(--ink-60);}
.rail-opt--ghost:hover{border-color:var(--ink-35);}
.rail-opt:focus-visible{outline:2px solid var(--maker);outline-offset:2px;}
.rail-policy{font-family:var(--mono);font-size:10px;color:var(--ink-35);margin-top:13px;
  padding-top:11px;border-top:1px solid var(--hairline-soft);}
.rail-unknown{font-family:var(--mono);font-size:12px;color:var(--rasp);border:1px dashed var(--rasp);
  border-radius:var(--radius-sm);padding:8px 11px;background:var(--rasp-08);}

/* ── AutonomyDial (8A, static): 3-position segmented control (Balanced default) +
   plain-language legend + L-threshold teaching legend (L1 silent · L2 digest · L3 stop;
   the L3 entry carries raspberry via the L-badge mapping) + earned-trust stat line. ── */
.dial{max-width:460px;}
.dial-seg{display:inline-flex;border:1px solid var(--hairline);border-radius:999px;
  background:var(--cream);padding:3px;gap:2px;}
.dial-pos{font-family:var(--mono);font-size:12px;font-weight:500;cursor:default;border:none;
  background:transparent;color:var(--ink-60);border-radius:999px;padding:6px 16px;}
.dial-pos--on{background:var(--paper);color:var(--ink);font-weight:600;box-shadow:0 1px 2px rgba(26,26,40,.1);}
.dial-legend{display:flex;flex-direction:column;gap:6px;margin:14px 0 13px;}
.dial-leg{display:grid;grid-template-columns:112px 1fr;gap:11px;font-size:12px;}
.dial-leg-k{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--ink);}
.dial-leg-v{color:var(--ink-60);}
.dial-leg--default .dial-leg-k::after{content:' · default';color:var(--ink-35);font-weight:400;font-size:9px;}
.dial-llegend{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:13px;}
.dial-lchip{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-60);}
.dial-trust{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;
  color:var(--ink-60);border:1px solid var(--hairline);border-radius:999px;background:var(--cream);padding:5px 12px;}
.dial-trust-i{color:var(--ink-35);}

/* #/kit — 2b.2b gallery layout (decision ladder cells). kit- prefix (harness-only). */
.kit-dec-ladder{display:flex;flex-direction:column;gap:20px;max-width:640px;}
.kit-dec-cell{display:flex;flex-direction:column;gap:9px;align-items:flex-start;}
.kit-dec-cell > .kit-cap{margin:0;}

/* ════════════════════════════════════════════════════════════════════════
   3.1 — FEATURE BACKBONE LAYER (StageSurface · work-happening stream · E1 raster
   wiring · stage-navigator focus · needs-you L3 chip). Prefixes: surf-* (stage
   surfaces, Contract: greppable) · work-* (the per-goal work stream, PRF1) ·
   ny-* (the L3 needs-you header chip). Token-only colors. NO view-transition-name
   here (anchors stay on shell zone wrappers). Error paths render VISIBLE fallbacks +
   console.warn, never throw (zero-silent-failure, the established posture).
   ════════════════════════════════════════════════════════════════════════ */

/* ── StageSpine NAVIGATOR additions — a focused step gets an ink ring distinct from
   the raspberry `current` fill; clickable steps are buttons (keyboard-reachable, DOM
   order = focus order) carrying data-op="drillInto:<step-id>" (no sixth op). ── */
button.spine-seg{font:inherit;cursor:pointer;}
.spine-seg--nav{cursor:pointer;}
.spine-seg--focus{outline:2px solid var(--ink);outline-offset:1px;}
button.spine-loopstage{font:inherit;cursor:pointer;border:none;background:transparent;}
.spine-loopstage--focus{outline:2px solid var(--ink);outline-offset:1px;border-radius:999px;}

/* ── Work-happening stream (PRF1) — line-density run-status rows resolved from
   ORG.goals[id].work_stream against ORG.agents. Reuses the Avatar primitive (kit
   grammar) + a status pill; the @you manual item carries the needs-you accent only
   when blocking. NOT the 2b kit FIXTURES. ── */
.work-row{display:grid;grid-template-columns:auto 1fr;gap:6px 11px;align-items:center;
  padding:9px 12px;border:1px solid var(--hairline-soft);border-radius:var(--radius-sm);
  background:var(--paper);}
.work-row--needs{border-color:var(--rasp);background:var(--rasp-08);}
.work-id{--avatar-size:22px;display:inline-flex;align-items:center;gap:7px;min-width:0;}
.work-name{font-family:var(--mono);font-weight:600;font-size:12px;color:var(--ink);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.work-label{grid-column:1 / -1;font-size:12.5px;color:var(--ink-60);}
.work-meta{display:flex;align-items:center;gap:9px;justify-self:end;}
.work-step{font-family:var(--mono);font-size:10px;color:var(--ink-35);
  border:1px solid var(--hairline-soft);border-radius:999px;padding:1px 8px;white-space:nowrap;}
.work-status{font-family:var(--mono);font-size:10.5px;color:var(--ink-60);white-space:nowrap;}
.work-status--running{color:var(--checker);}
.work-status--blocked{color:var(--warn);}
.work-status--needs{color:var(--rasp);font-weight:600;}
.work-status--idle{color:var(--ink-35);}

/* ── StageSurface (surf-*) — ONE component, one switch on step.surface → a familiar-tool
   surface (doc · board · pr-thread · ledger · notebook · memo). Full-bleed-ish in the
   stage-artifacts zone; a one-line surfaceWhy caption ties the surface to the step.
   Unknown surface → visible surf-unknown + console.warn. ── */
.surf{border:1px solid var(--hairline);border-radius:var(--radius-md);background:var(--paper);
  overflow:hidden;max-width:560px;}
.surf-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:8px 14px;background:var(--cream-deep);border-bottom:1px solid var(--hairline);}
.surf-kind{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--ink-35);white-space:nowrap;}
.surf-why{font-family:var(--mono);font-size:10px;color:var(--ink-60);text-align:right;}
.surf-body{padding:14px 15px;}
.surf-title{font-family:var(--mono);font-weight:600;font-size:13px;color:var(--ink);
  display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
.surf-vchip{font-family:var(--mono);font-size:9px;color:var(--ink-60);
  border:1px solid var(--hairline);border-radius:999px;padding:1px 7px;}
.surf-does{font-size:12px;color:var(--ink-60);margin:9px 0 12px;line-height:1.5;}
.surf-skel{display:flex;flex-direction:column;gap:6px;margin:10px 0 13px;}
.surf-skel i{height:7px;border-radius:2px;background:var(--hairline-soft);display:block;}
.surf-arts{display:flex;flex-direction:column;gap:8px;}
.surf-art{font-size:12.5px;color:var(--ink);}
.surf-art-cap{color:var(--ink-60);font-size:12px;margin-top:2px;}
.surf-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.surf-chip{font-family:var(--mono);font-size:10px;color:var(--ink-60);
  border:1px solid var(--hairline-soft);border-radius:var(--radius-sm);padding:2px 8px;background:var(--cream);}
/* board / pr-thread / ledger / notebook / memo rows */
.surf-rows{display:flex;flex-direction:column;}
.surf-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:baseline;
  padding:9px 0;border-top:1px solid var(--hairline-soft);}
.surf-row:first-child{border-top:none;}
.surf-row-main{font-size:12.5px;color:var(--ink);min-width:0;}
.surf-row-sub{font-size:11.5px;color:var(--ink-60);margin-top:2px;}
.surf-row-meta{font-family:var(--mono);font-size:10px;color:var(--ink-35);white-space:nowrap;text-align:right;}
.surf-pr-line{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;
  color:var(--ink-60);padding:7px 0;border-top:1px solid var(--hairline-soft);}
.surf-pr-line:first-child{border-top:none;}
.surf-pr-av{--avatar-size:18px;}
.surf-decisions{margin-top:13px;padding-top:12px;border-top:1px dashed var(--hairline-soft);
  display:flex;flex-direction:column;gap:8px;align-items:flex-start;}
.surf-dec-h{font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-35);}
.surf-unknown{font-family:var(--mono);font-size:12px;color:var(--rasp);border:1px dashed var(--rasp);
  border-radius:var(--radius-sm);padding:10px 12px;background:var(--rasp-08);margin:13px 15px;}

/* ── E1 raster wiring — real <img> screenshot with an onerror swap to the 2b CSS/SVG
   thumbnail (BINDING #2 + the error-path rule: a visible fallback, NEVER a broken-image
   icon). The fallback SVG is hidden until the img errors (a class toggle on the wrapper). ── */
.ev-shot--raster{width:100%;max-width:480px;}
.ev-shot-img{display:block;width:100%;height:auto;border:1px solid var(--hairline);
  border-radius:var(--radius-sm);background:var(--cream);}
.ev-shot-fallback{display:none;}
.ev-shot--broken .ev-shot-img{display:none;}
.ev-shot--broken .ev-shot-fallback{display:block;border:1px solid var(--hairline);
  border-radius:var(--radius-sm);}
.ev-shot--broken .ev-shot-cap::after{content:' · image unavailable, showing thumbnail';color:var(--ink-35);}

/* ── E1 compact evidence strip (the default-view summary of the acceptance panel). ── */
.ev-strip{display:flex;align-items:center;gap:12px;flex-wrap:wrap;max-width:560px;
  border:1px solid var(--hairline);border-left:3px solid var(--ink);border-radius:var(--radius-md);
  background:var(--paper);padding:11px 14px;font-size:12px;color:var(--ink-60);}
.ev-strip-k{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;color:var(--ink-35);}
.ev-strip-n{font-family:var(--mono);font-weight:600;color:var(--ink);}
.ev-strip-flag{font-family:var(--mono);color:var(--rasp);font-weight:600;}
.ev-strip-link{font-family:var(--mono);font-size:11px;color:var(--ink);margin-left:auto;
  text-decoration:underline;text-decoration-color:var(--ink-35);text-underline-offset:2px;}

/* ── Needs-you L3 chip (ny-*) — a persistent header-band chip; clicking opens the
   EscalationRail INLINE at the WHAT level (no Execution-tab entry). Local-UI-state
   popover, same posture as the 6B decision callout (not appState). ── */
.ny-band{display:flex;flex-direction:column;gap:11px;margin:4px 0 2px;}
.ny-chip{display:inline-flex;align-items:center;gap:7px;align-self:flex-start;cursor:pointer;
  font-family:var(--mono);font-size:11px;font-weight:600;color:var(--rasp);
  border:1px solid var(--rasp);background:var(--rasp-08);border-radius:999px;padding:4px 11px;}
.ny-chip:hover{background:var(--rasp-15);}
.ny-chip:focus-visible{outline:2px solid var(--maker);outline-offset:2px;}
.ny-chip-t{color:var(--ink);font-weight:500;}
.ny-rail{max-width:460px;}

/* ════════════════════════════════════════════════════════════════════════
   3.2 — EXECUTION DRILL-IN STYLES (exec-*). The HOW panel below the canvas
   zones: a flat run list (level 1) → the focus run expands (level 2) to the
   threaded dispatch tree (RunNode, the run_node.html idiom lift) + the
   maker-checker IterationPanel. Token-only colors. Rollup tints: has-failure
   (blocked/failed in subtree) rides --fail; has-warning (rework/flagged) rides
   --warn — failure dominates, exactly as run_node.html. NO view-transition-name
   here (the panel stays CLOSED during the morph; it never joins a snapshot).
   ════════════════════════════════════════════════════════════════════════ */
.exec-panel{margin-top:18px;border:1px solid var(--hairline);border-radius:var(--radius-md);
  background:var(--cream);overflow:hidden;max-width:760px;}
.exec-head{display:flex;align-items:baseline;justify-content:space-between;gap:14px;flex-wrap:wrap;
  padding:11px 15px;background:var(--cream-deep);border-bottom:1px solid var(--hairline);}
.exec-head-k{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.09em;
  text-transform:uppercase;color:var(--ink);}
.exec-head-sub{font-family:var(--mono);font-size:10.5px;color:var(--ink-60);}
.exec-empty{font-family:var(--mono);font-size:12px;color:var(--rasp);padding:14px 15px;}

/* ── flat run list (level 1) ── */
.exec-runlist{display:flex;flex-direction:column;padding:6px 8px;}
.exec-runrow{display:grid;grid-template-columns:auto auto auto 1fr auto;gap:10px;align-items:center;
  padding:7px 8px;border-radius:var(--radius-sm);font-size:12px;color:var(--ink-60);}
.exec-runrow:hover{background:var(--paper);}
.exec-runrow-agent{font-family:var(--mono);font-weight:600;font-size:11.5px;color:var(--ink);}
.exec-runrow-when{font-family:var(--mono);font-size:10px;color:var(--ink-35);}
.exec-runrow-sum{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.exec-runrow-rw{font-family:var(--mono);font-size:10px;color:var(--warn);white-space:nowrap;}

/* ── status dots — distinct semantics: done=ok · running=maker(pulse) · blocked=warn · flagged=rasp ── */
.exec-dot{width:8px;height:8px;border-radius:50%;flex:none;background:var(--ink-35);}
.exec-dot--done{background:var(--ok);}
.exec-dot--running{background:var(--maker);animation:exec-pulse 1.6s ease-in-out infinite;}
.exec-dot--blocked{background:var(--warn);}
.exec-dot--flagged{background:var(--rasp);}
@keyframes exec-pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
@media (prefers-reduced-motion: reduce){.exec-dot--running{animation:none;}}

/* ── the focus-run disclosure (the ONLY row that opens a tree) ── */
.exec-focusrow{display:grid;grid-template-columns:auto auto 1fr auto auto;gap:11px;align-items:center;width:100%;
  font:inherit;text-align:left;cursor:pointer;border:none;border-top:1px solid var(--hairline-soft);
  background:var(--paper);padding:10px 15px;color:var(--ink-60);}
.exec-focusrow:hover{background:var(--cream);}
.exec-focusrow:focus-visible{outline:2px solid var(--maker);outline-offset:-2px;}
.exec-focus-k{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--maker);border:1px solid var(--maker);border-radius:999px;padding:1px 8px;}
.exec-focus-agent{font-family:var(--mono);font-weight:600;font-size:12px;color:var(--ink);}
.exec-focus-lbl{font-size:12px;color:var(--ink-60);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.exec-focus-meta{font-family:var(--mono);font-size:10px;color:var(--ink-35);white-space:nowrap;}
.exec-caret{font-size:10px;color:var(--ink-35);}

.exec-detail{padding:14px 15px 16px;border-top:1px solid var(--hairline-soft);background:var(--paper);}
.exec-tree-h{font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--ink-35);margin-bottom:9px;}

/* ── RunNode — threaded recursion + rollup rails (the run_node.html idiom) ── */
.exec-group{border-radius:var(--radius-sm);}
.exec-node{border:1px solid var(--hairline-soft);border-radius:var(--radius-sm);background:var(--paper);
  padding:8px 11px;}
.exec-node.is-child{background:var(--cream);}
.exec-node--alert{border-color:var(--hairline);}
.exec-row1{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.exec-av{display:inline-flex;}
.exec-agent{font-family:var(--mono);font-weight:600;font-size:11.5px;color:var(--ink);}
.exec-agent--unknown{color:var(--rasp);}
.exec-kind{font-family:var(--mono);font-size:9px;letter-spacing:.05em;text-transform:uppercase;
  color:var(--ink-35);border:1px solid var(--hairline-soft);border-radius:999px;padding:0 7px;}
.exec-rework{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--warn);
  border:1px solid var(--warn);border-radius:999px;padding:0 7px;}
.exec-stat{font-family:var(--mono);font-size:10px;color:var(--ink-35);margin-left:auto;}
.exec-label{font-size:12px;color:var(--ink-60);margin:6px 0 0;line-height:1.45;}
.exec-row2{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:8px;}
.exec-skills{display:inline-flex;gap:5px;flex-wrap:wrap;}
.exec-skill{font-family:var(--mono);font-size:9.5px;color:var(--ink-60);background:var(--cream-deep);
  border-radius:var(--radius-sm);padding:1px 7px;}
.exec-ctx{display:inline-flex;align-items:center;gap:6px;margin-left:auto;}
.exec-ctx-track{width:84px;height:5px;border-radius:3px;background:var(--hairline-soft);overflow:hidden;}
.exec-ctx-fill{display:block;height:100%;border-radius:3px;background:var(--maker);}
.exec-ctx--mid .exec-ctx-fill{background:var(--warn);}
.exec-ctx--hot .exec-ctx-fill{background:var(--fail);}
.exec-ctx-lbl{font-family:var(--mono);font-size:9.5px;color:var(--ink-35);white-space:nowrap;}
.exec-node--unknown{font-family:var(--mono);font-size:11px;color:var(--rasp);
  border:1px dashed var(--rasp);border-radius:var(--radius-sm);padding:8px 11px;background:var(--rasp-08);}
/* threaded rail — a left gutter whose hue mirrors the subtree rollup */
.exec-thread{margin:6px 0 0 16px;padding-left:13px;border-left:2px solid var(--hairline);
  display:flex;flex-direction:column;gap:7px;}
.exec-group.has-warning > .exec-node{border-left:3px solid var(--warn);}
.exec-group.has-failure > .exec-node{border-left:3px solid var(--fail);}
.exec-thread.has-warning{border-left-color:var(--warn);}
.exec-thread.has-failure{border-left-color:var(--fail);}
.exec-group > .exec-node{margin-bottom:0;}
.exec-thread > .exec-group{margin-top:0;}

/* ── IterationPanel — maker/checker pair, findings, rework meter, named exits, PR diff ── */
.exec-iter{margin-top:16px;border:1px solid var(--hairline);border-radius:var(--radius-md);
  background:var(--cream);overflow:hidden;}
.exec-iter-head{display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:9px 13px;background:var(--cream-deep);border-bottom:1px solid var(--hairline);}
.exec-iter-k{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.09em;
  text-transform:uppercase;color:var(--ink);}
.exec-iter--unknown{font-family:var(--mono);font-size:12px;color:var(--rasp);padding:12px 13px;}
.exec-pair{display:flex;align-items:center;gap:10px;padding:12px 13px;flex-wrap:wrap;}
.exec-pair-card{--avatar-size:20px;flex:1 1 240px;min-width:0;border:1px solid var(--hairline-soft);
  border-radius:var(--radius-sm);background:var(--paper);padding:4px 8px;}

/* ════════════════════════════════════════════════════════════════════════

   the ONE evidence/work-zone deviation from the feature grammar (every other
   zone — header, work-stream frame, chips, exec tab, chat rail — is shared, SC-005).
   Iteration history is first-class (FR-007): older passes COLLAPSE (<details>),
   never delete; the live pass hosts the E2 EvidenceBlock as its hero. Token-only

   loop-band iter-overflow guard (.spine-iter--over) reuses the semantic --fail red
   (the same zero-silent-failure posture as ev-unknown / spine-unknown).
   ════════════════════════════════════════════════════════════════════════ */

/* ── Loop-band iter-overflow guard — iter.current > budget renders --fail (data error,

   render byte-identically to before via the base .spine-iter. ── */
.spine-iter--over{color:var(--fail);background:rgba(178,36,57,.12);}

/* ════════════════════════════════════════════════════════════════════════
   4.1 — SPIKE CANVAS STYLES. The lightest surface in the prototype: a timebox
   METER + four sub-steps (the 2c FLAG: the meter is a wrapper, not the only
   element), the SINGLE probes-tried card (the one work-zone deviation), the

   Classes stay under the existing spine-* / surf-* / ev-* prefixes — NO new prefix

   6×1 anchor set is unchanged). Error paths reuse the semantic --fail (zero-silent-
   failure, the established posture).
   ════════════════════════════════════════════════════════════════════════ */

/* ── Timebox meter: overrun guard + the L2 extension chip + the four sub-steps beneath
   the budget meter. A spike spine still shows its steps — just materially lighter than a

.spine-tb-fill--over{background:var(--fail);}            /* timebox_used > budget — data error, never a silent clamp */

/* ── Probes-tried card (surf-*) — the spike's ONE deviated work zone: a single card with

/* ── spike_ref BIDIRECTIONAL local disclosure — the scroll-target highlight when the verdict's
   spike_ref opens the L3 rail (and when the rail's back-link returns to the verdict card). Pure
   affordance: NO op, NO appState (same posture as the 6B popover). Reduced-motion-safe. ── */
.spk-flash{animation:spk-flash 1.4s ease-out;border-radius:var(--radius-md);}
@keyframes spk-flash{0%{box-shadow:0 0 0 3px var(--rasp-15);}100%{box-shadow:0 0 0 3px transparent;}}
@media (prefers-reduced-motion: reduce){.spk-flash{animation-duration:1ms;}}
</style>
</head>
<body>
<div id="app"></div>

<!-- ── 2a.3: the DATA SPINE, loaded as a CLASSIC script BEFORE the inline module ──
     file:// forbids fetch() and local ES-module imports, so window.ORG must arrive via a
     classic <script src> (Phase 1 packaging contract #1). This tag MUST precede the module
     below so window.ORG exists when the module runs; if it is deleted or the file moves, the
     module renders a visible error banner instead of silently painting stubs. Never refactor
     this to fetch('org.json') — org.js's own header restates the same rule. -->
<script src="data/org.js"></script>

<script type="module">
import { render } from 'preact';
import { html } from 'htm/preact';
import { useState, useEffect } from 'preact/hooks';   // 2b.2b: 6B decision-callout popover (LOCAL UI state only — never appState)

/* ════════════════════════════════════════════════════════════════════════
   2a.3 — SPINE BOOT. window.ORG (from the classic script above) is the single
   source of every canonical token this app renders. To keep the drift grep clean,
   NO canonical token (goal ids · checker rule codes · agent slugs · cred stats · org
   name · rework budget) is hand-typed in the Phase-1 app surface below — each is DERIVED from ORG.
   ════════════════════════════════════════════════════════════════════════ */
const ORG = window.ORG;
// Zero-silent-failure guard (Phase 1 dispatcher posture): if the spine did not load,
// paint a visible one-line banner and STOP — never fall through to stub rendering.
if (!ORG) {
  const app = document.getElementById('app');
  if (app) app.innerHTML =
    '<div role="alert" style="max-width:620px;margin:24px auto;padding:14px 18px;'
    + 'border:1px solid var(--rasp);border-left:4px solid var(--rasp);border-radius:var(--radius-md);'
    + 'background:var(--paper);color:var(--ink);font-family:var(--mono);font-size:13px;line-height:1.5;">'
    + '⚠ Diecast data spine not loaded — <b>window.ORG</b> is missing. '
    + 'index.html needs <code>&lt;script src="data/org.js"&gt;</code> to load <em>before</em> this module '
    + '(file:// forbids fetch/import, so the spine must arrive as a classic script first).'
    + '</div>';
  throw new Error('window.ORG missing — the classic <script src="data/org.js"> must precede the module.');
}

// ── Derived canonical handles (so no canonical literal is typed in this file). ──
const goalIdByFamily = {};
for (const [gid, g] of Object.entries(ORG.goals)) goalIdByFamily[g.family] = gid;
const FEATURE_ID = goalIdByFamily.feature;                 // resolves to the feature goal id
const FEATURE = ORG.goals[FEATURE_ID];
// the single flagged checker rule code on the feature E1 panel (resolved from ORG, never typed).
const FLAGGED_RULE = ((FEATURE.evidence?.E1?.checker_rows || []).find((r) => r.state === 'flagged') || {}).code || '';
// the locked morph atom = the feature goal's L2 execution decision (uniquely the classify-as-bug
// reclassification). Selected structurally so its id is never hand-typed in this file.
const MORPH_ATOM = ORG.decisions.find(
  (a) => a.goal_slug === FEATURE_ID && a.reversibility === 'L2' && a.phase === 'execution');

// ── Spine derivation (Contract 5 / 2c mapping rule). appState.spines.<family> keeps Phase 1's
//    shape EXACTLY: {placeholder, shape, steps:string[], current:<index>, iter?, timebox?}. Labels
//    derive via stageModels.<f>.steps.map(s => s.shortLabel ?? s.label); spine_state.current (a step
//    id) maps to the numeric index Phase 1's shape renderers expect. ──
function tbMinutes(s) {                                      // '1h40m' / '3h' / '40m' → minutes
  if (!s) return 0;
  let n = 0; const h = s.match(/(\d+)\s*h/); const m = s.match(/(\d+)\s*m/);
  if (h) n += +h[1] * 60; if (m) n += +m[1]; return n;
}
function deriveSpine(family) {
  const sm = ORG.stageModels[family];
  const ss = (ORG.goals[goalIdByFamily[family]] || {}).spine_state || {};
  const steps = sm.steps.map((s) => s.shortLabel ?? s.label);
  let current = sm.steps.findIndex((s) => s.id === ss.current);
  if (current < 0) current = 0;
  const spine = { placeholder: sm.placeholder, shape: sm.shape, steps, current };
  if (ss.iter) spine.iter = { ...ss.iter };
  if (sm.timebox) {
    const budgetMin = tbMinutes(sm.timebox.budget);
    const usedStr = ss.timebox_used || sm.timebox.used;
    const usedMin = tbMinutes(usedStr);
    // 4.1 error path (design review): used > budget is a DATA error — flag `over` so SpineTimebox
    // renders the fill in --fail + console.warns (never a silent clamp); an unparseable duration
    // string (parses to 0 but isn't literally a zero) renders raw + warns. Valid data → both false,
    // so the meter renders byte-identically to before.
    const over = budgetMin ? usedMin > budgetMin : false;
    const unparseable = !!usedStr && usedMin === 0 && !/\b0\s*[hm]/.test(usedStr);
    spine.timebox = {
      budget: sm.timebox.budget,
      used: usedStr,
      pct: budgetMin ? Math.round((usedMin / budgetMin) * 100) : 0,
      over,
      unparseable,
    };
  }
  return spine;
}

/* ── 3.4 MORPH PROJECTION (the real hero morph). When the feature goal (CAST-412) is viewed in
   the DEBUG shape, its post-reclassification state comes from goals[id].morph_view — NOT from the
   real debug goal (CAST-431). These two pure helpers build that projection so GoalCanvas renders
   the loop-band spine (iter 1/3) + the just-seeded investigation (the E2 seed) for the SAME goal,
   keeping header/crumb/chat untouched. State is READ from morph_view (the goal's own data is never
   rebuilt), so the scripted reverse restores the feature projection exactly (the undo proof). ── */
function deriveMorphSpine(goal) {                            // the debug loop-band spine for a morphed feature goal
  const sm = ORG.stageModels.debug;
  const mv = goal.morph_view || {};
  const steps = sm.steps.map((s) => s.shortLabel ?? s.label);
  const iter = (mv.spine_state && mv.spine_state.iter) || { current: 1, budget: 3 };
  // the loop's live position = the furthest step the seeded work stream reaches (dbg-03 here).
  const wsSteps = (mv.work_stream || []).map((w) => w.step);
  let current = 0;
  sm.steps.forEach((s, i) => { if (wsSteps.includes(s.id)) current = i; });
  return { placeholder: sm.placeholder, shape: sm.shape, steps, current, iter: { ...iter } };
}
function deriveMorphInvestigation(goal) {                    // a one-live-pass investigation from morph_view (reuses InvestigationLedger)
  const mv = goal.morph_view || {};
  const e2 = (mv.evidence && mv.evidence['E2-seed']) || { hypotheses: [] };
  const experiments = (mv.work_stream || []).map((w) => ({
    id: w.id, label: w.label, assignee: w.assignee, verdict: 'open',   // a fresh pass — nothing weighed yet
  }));
  return {
    investigation: { passes: [{
      n: 1, status: 'live',
      summary: 'Reclassified from feature. First pass on the coupon-apply 500.',
      experiments,
    }] },
    evidence: { E2: e2 },
  };
}

/* ════════════════════════════════════════════════════════════════════════
   appState (Contract 2 — v1). Phase 2a EXTENDS this; it must NOT rename keys.
   Placeholder spine vocabulary carries placeholder:true so later phases never
   mistake stub steps for the real Phase-2c per-family set.
   ════════════════════════════════════════════════════════════════════════ */
const appState = {
  // ── appState v1.1 (2a.3) — EXTENDS Phase 1's v1; no key renamed. `family` now ranges over
  //    all four families; `spines` gains spike+data (all four DERIVED from ORG.stageModels +
  //    spine_state); `goal` is populated from ORG.goals[id]; NEW key `org`; receipts gain a
  //    decision_id field (morph). Every value below comes from the spine — no canonical literal. ──
  route:   '#/goal/' + FEATURE_ID,   // mirror of location.hash, set by router (derived id)
  family:  'feature',                // 'feature' | 'debug' | 'spike' | 'data'
  org:     ORG,                      // v1.1: the frozen data spine (window.ORG)
  goal:    { id: FEATURE_ID, title: FEATURE.title, crumb: ORG.org.crumb },
  spines:  {                         // all four DERIVED from stageModels + the family goal's spine_state
    feature: deriveSpine('feature'),
    debug:   deriveSpine('debug'),
    spike:   deriveSpine('spike'),
    data:    deriveSpine('data'),
  },
  nudge:   { ...FEATURE.nudge },     // the feature goal's nudge (who/do/why) — was the Phase 1 stub
  receipts: [],                      // decision receipts, pushed by morph op (now derived from an atom)
  pinned:  [],                       // canvas objects created by promote/pin ops (1.2)
  drill:   null,                     // 'execution' | null — drillInto:execution target (1.2 / HOW; 3.2 fleshes it)
  // 3.1: stage-navigator focus. null = "current step" (default WHAT view); a step id =
  // the user-navigated step whose StageSurface renders. Set via drillInto:<step-id> (NO sixth op).
  stageFocus: null,
  // 3.1 / PRF2: chat is keyed PER-GOAL — appState.chat.byGoal[goalId] = {messages, scriptIndex,
  // scriptKey}. Refines (does not rename) the Phase-1 `chat` contract: the keys live one level
  // deeper, under the goal id, so switching goals shows that goal's own thread. chatFor(id) lazily
  // seeds an entry (scriptKey = family). Reload rebuilds appState → resets cleanly.
  chat:    { byGoal: {} },
};
// expose for console verification (manual click-through, Constraint C1 — not a test).
window.appState = appState;

/* ════════════════════════════════════════════════════════════════════════
   Components — PascalCase. Layout references app-shell.html but markup is fresh.
   The five future view-transition anchors (Contract 5) are mounted as PERSISTENT
   structure now (stable wrappers), so 1.3 only adds CSS `view-transition-name`:
     .nav-rail → vt-nav-rail   .chat-rail → vt-chat-rail
     .goal-header → vt-goal-header   .nudge → vt-nudge-card   .receipt-trail → vt-receipt-trail
   ════════════════════════════════════════════════════════════════════════ */

// family → short nav tag (the four families the spine carries).
const FAM_TAG = { feature: 'FEAT', debug: 'DEBUG', spike: 'SPIKE', data: 'DATA' };
function NavRail() {
  // 2a.3: the goal list renders from ORG.goals (all four ids resolve via the route guard) —
  // the selected row keys on the routed goal id. No goal id/title is hand-typed here.
  const goals = appState.org.goals;
  const curId = appState.goal.id;
  return html`
    <nav class="nav-rail">
      <div class="brand">die<em>cast</em></div>
      <div class="tagline">cast to spec · no drift</div>
      <div class="rail-h">Goals</div>
      ${Object.entries(goals).map(([id, g]) => html`
        <a class=${'nav-goal' + (id === curId ? ' sel' : '')} href=${'#/goal/' + id}>
          <span class="fam">${FAM_TAG[g.family] || g.family}</span><span class="t">${g.title}</span>
        </a>`)}
      <div class="nav-spacer"></div>
      <div class="rail-h">Workspace</div>
      <a class="nav-goal" href="#/board"><span class="fam">▦</span><span class="t">Board</span></a>

function labelFor(from) {
  return ({ guide: '◈ Guide', you: 'You', narration: 'Narration', system: 'System' })[from] || 'Narration';
}

function ChatRail() {
  // PRF2: the rail reads the PER-GOAL chat (chatFor(goal)). Switching goals shows that goal's own
  // thread + scenario position; SCRIPTS[scriptKey] is the active script (only `feature` exists in 3.1).
  const c = chatFor(appState.goal.id);
  const scr = SCRIPTS[c.scriptKey] || [];
  const msgs = c.messages;
  const hasScript = scr.length > 0;
  const done = c.scriptIndex >= scr.length;
  // 2b.3: the rail header speaks in the LOCKED Guide voice — the GuideMark (ink diamond +
  // mono wordmark), no checker hue. The handle derives from the routed goal title (no
  // hand-typed canonical token — the 2a.3 drift rule).
  const handle = appState.goal.title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  return html`
    <aside class="chat-rail">
      <div class="chat-h">
        <${GuideMark} size=${20} wordmark=${true}/>
        <div class="s">${handle}</div>
      </div>
      <div class="chat-log">
        ${msgs.length === 0
          ? html`<div class="chat-empty">${hasScript
              ? html`Click <b>Next ▸</b> to walk the scripted demo.`
              : html`No scripted walkthrough for this goal yet.`}</div>`
          : msgs.map((m) => html`
              <div class=${'msg ' + (m.from || 'narration')}>
                <div class="mfrom">${labelFor(m.from)}</div>
                <div class="mtext">${m.text}</div>
                ${m.ops ? html`
                  <div class="mops">
                    ${m.ops.map((o) => html`<button class="opbtn" data-op=${o.op}>${o.label}</button>`)}
                  </div>` : null}
              </div>`)}
      </div>
      <!-- "Next ▸" is scenario-advance (NOT an op) — wired to advance() directly, kept
           visibly the same grammar as the data-op buttons it sits beside. -->
      <button class="next-btn" onClick=${advance} disabled=${!hasScript || done}>
        ${!hasScript ? 'No script for this goal' : (done ? 'Script complete · reload to replay' : 'Next ▸')}
      </button>
      <div class="chat-inp">Steer, ask, or override the Guide… ⏎</div>
    </aside>`;
}

function AppShell({ children }) {
  // Three-tier shell. NavRail + ChatRail are persistent chrome (rendered here, not

  return html`
