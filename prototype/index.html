    { element: '[data-tour="hire-head"]', popover: { title: 'Hire, do not install', side: 'bottom', align: 'start', description: 'The whole funnel is framed as hiring a teammate, which is why it ends in onboarding rather than a download.' } },
    { element: '[data-tour="hire-steps"]', popover: { title: 'The five steps', side: 'bottom', align: 'start', description: 'Assess, federate, report, hire, onboard. The same five beats whether you drive from the buttons or the chat.' } },
    { element: '[data-tour="chat"]', popover: { title: 'Drive from chat', side: 'left', align: 'start', description: 'The Guide can walk the whole funnel from the chat rail. The buttons and the chat set the same step.' } },
    ADVANCE_STOP,
  ],
};

/* Start a tour. Filters to stops whose anchor is actually in the DOM (quiet degrade), then drives the
   driver.js popovers with the mandatory tour-pop token override; animation OFF under reduced motion. ── */
function startTour(key) {
  const all = TOURS[key] || [];
  const steps = all.filter((s) => !s.element || document.querySelector(s.element));
  if (!steps.length) return;
  const d = driver({
    showProgress: true,
    animate: !reduced.matches,                 // BINDING: animate:false under prefers-reduced-motion
    overlayColor: 'rgba(26,26,40,.45)',
    stagePadding: 6,
    stageRadius: 8,
    popoverClass: 'tour-pop',                  // the mandatory Diecast-token restyle (6.2 gate capture #2)
    nextBtnText: 'Next ▸',
    prevBtnText: '◂ Back',
    doneBtnText: 'Done',
    steps,
  });
  d.drive();
}
window.startTour = startTour;

function presenterCueFor(beat) {
  return beat && beat.from === 'you' ? 'You type this line.' : 'The Guide responds, then advance.';
}

/* The presenter demo-script overlay (BINDING #6 key: appState.demoScriptOpen). Renders the ACTIVE
   flow's SCRIPTS beats as a numbered list with the on-deck beat (chat.scriptIndex) highlighted;
   advancing chat moves the highlight. Bottom-LEFT so it never covers the chat rail. Reload resets. ── */
function DemoScriptOverlay() {
  if (!appState.demoScriptOpen) return null;
  const c = chatFor(chatKey());
  const key = c.scriptKey;
  const beats = SCRIPTS[key] || [];
  const cues = TALKING_POINTS[key] || [];
  const idx = c.scriptIndex;                   // the on-deck beat (advance() plays index, then increments)
  return html`
    <aside class="demo-overlay" role="complementary" aria-label="Presenter demo script">
      <div class="demo-head">
        <span class="demo-head-t">Demo script</span><span class="demo-head-key">${key}</span>
        <button class="demo-close" onClick=${toggleDemoScript} aria-label="Close demo script">✕</button>
      </div>
      ${beats.length === 0
        ? html`<div class="demo-empty">No scripted flow is active here. Open a scenario from the front door, then the beats show up.</div>`
        : html`
          <ol class="demo-list">
            ${beats.map((b, i) => html`
              <li class=${'demo-beat' + (i < idx ? ' done' : i === idx ? ' now' : '')}>
                <span class="demo-beat-n">${i + 1}</span>
                <div>
                  <div class=${'demo-beat-from' + (b.from === 'you' ? ' you' : '')}>${b.from === 'you' ? 'You' : 'Guide'}</div>
                  <div class="demo-beat-say">${b.narration}</div>
                  <div class="demo-beat-cue">${cues[i] || presenterCueFor(b)}</div>
                </div>
              </li>`)}
          </ol>`}
      <div class="demo-foot">press s or the nav control to toggle · reload resets</div>
    </aside>`;
}

/* Toggle the overlay — a PLAIN handler (no sixth op). The `s` key is the twin trigger, guarded on
   event.target so it never fires inside a text input or the FR-017 parity fake-terminal (design
   review edge). No modifier combos, so browser shortcuts are never hijacked. ── */
function toggleDemoScript() { appState.demoScriptOpen = !appState.demoScriptOpen; paint(); }
window.toggleDemoScript = toggleDemoScript;
document.addEventListener('keydown', (e) => {
  if (e.key !== 's' && e.key !== 'S') return;
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  const t = e.target;
  if (t && t.closest && t.closest('input, textarea, select, [contenteditable=""], [contenteditable="true"], .parity-term')) return;
  e.preventDefault();
  toggleDemoScript();
});

/* ════════════════════════════════════════════════════════════════════════
   Render spine. Hash-keyed routes (#/area/id grammar), one App resolver, and a
   single top-level SYNCHRONOUS paint(). CRITICAL (carried to 1.2/1.3): every
   app-state update goes through paint(); NO component-local useState for app
   state — synchronous render is what lets 1.2 wrap paint() inside
   startViewTransition without snapshotting stale DOM.
   ════════════════════════════════════════════════════════════════════════ */
const routes = {
  '': Home, '#/goal': GoalCanvas, '#/board': BoardView, '#/kit': KitHarness,
  // 5a — the board arc: board → ticket → decision artifact → cross-phase trail (US5 + US10).
  '#/ticket': TicketView, '#/decision': DecisionView, '#/decisions': DecisionsTrailView,
  // 5c — the US7 requirements-doc loop (replaces the 5.0 stub).
  '#/reqs': ReqsDocView,
  // 5b — hiring funnel · marketplace · agent ops · skillification · Layer-2 (US6 + US8 + US9).
  '#/hire': HireWizard, '#/marketplace': Marketplace, '#/agent': AgentResume,
  '#/skills': SkillsNew, '#/layer2': Layer2View,
};

function resolve(hash) {                       // key on first two '#/area' segments
  const key = hash.split('/').slice(0, 2).join('/').replace(/^#$/, '');
  return routes[key] || routes[''];
}

function App() {
  const View = resolve(location.hash);
  // 6.1: the chooser (#/) is a BARE route — NO three-tier shell (BINDING #7 / Phase-1 precedent), so
  // it renders no shell zone wrapper and carries no vt- name (zero vt- dup risk). Every other route
  // renders inside AppShell as before.
  if (View === Home) return html`<${Home}/>`;
  return html`<${AppShell}><${View}/><//>`;
}

function paint() {
  appState.route = location.hash || '#/';
  render(html`<${App}/>`, document.getElementById('app'));
}

// 2a.3 ROUTE GUARD: #/goal/<id> resolves ANY of the four goal ids in ORG.goals, syncing
// appState.goal + appState.family to that goal so the canvas renders its family's spine.
// An unknown goal id keeps the current goal (no crash). This runs ONLY on real navigation — NOT
// on op-dispatch paints — so the morph (which flips family without a hashchange) is never undone.
function syncGoalFromRoute(hash) {
  const m = (hash || '').match(/^#\/goal\/([^/]+)/);
  if (!m) return;
  const g = appState.org.goals[m[1]];
  if (!g) return;                              // unknown goal id → keep current goal (guard)
  if (m[1] !== appState.goal.id) appState.stageFocus = null;   // 3.1: a NEW goal resets stage focus (its step ids differ)
  appState.goal = { id: m[1], title: g.title, crumb: appState.org.org.crumb };
  appState.family = g.family;
  // 3.3: the nudge is PER-GOAL — render the routed goal's own nudge object (the debug nudge for
  // CAST-431, the feature nudge for CAST-412). On CAST-412 entry this is byte-identical to boot
  // (= FEATURE.nudge = NUDGES[0]), so the feature canvas + its nudge-op cycle are un-regressed.
  // The morph (3.4) flips family WITHOUT a hashchange, so this never fires on a morph — the morph
  // owns its own nudge state on CAST-412.
  if (g.nudge) appState.nudge = { ...g.nudge };
  chatFor(m[1]).scriptKey = g.family;          // PRF2: scriptKey set per-goal on route entry, by family
}
function navigate() {
  syncGoalFromRoute(location.hash);
  paint();
}

addEventListener('hashchange', navigate);
navigate();                                    // initial sync + paint
</script>
