/* ── ColleagueCard (Contract 1, pick 4C+4B): ONE function, two densities, five lockup
   fields in IDENTICAL order both densities. The same `slots` fragment renders for both
   — density only swaps the container class and the card-only stat footer. A grep for
   `cc-slot` finds exactly one lockup definition (no second markup). ── */
function ReworkMeter({ rework }) {
  if (!rework) return html`<span class="cc-meter cc-meter--na">—</span>`;
  const segs = [];
  for (let i = 0; i < rework.budget; i++)
    segs.push(html`<i class=${'cc-seg' + (i < rework.used ? ' cc-seg--used' : '')}></i>`);
  return html`<span class="cc-meter" title=${`rework ${rework.used}/${rework.budget}`}>
      ${segs}<span class="cc-meter-lbl">rework ${rework.used}/${rework.budget}</span></span>`;
}
function PairedTie({ agent }) {
  if (agent.kind !== 'maker')                              // only makers carry a checker
    return html`<span class="cc-pair cc-pair--solo">—</span>`;
  if (!agent.pairedWith)                                   // broken state — visible, never silent
    return html`<span class="cc-pair cc-pair--broken">⚠ paired: none</span>`;
  return html`<span class="cc-pair"><span class="cc-tie">⌐</span>${agent.pairedWith}</span>`;
}
function InflightPill({ agent }) {
  if (!agent.inflight)
    return html`<span class="cc-flight cc-flight--idle">○ no run in flight</span>`;
  return html`<span class="cc-flight">▸ ${agent.inflight.label}</span>`;
}
function ColleagueCard({ agent, density = 'card' }) {
  // The five lockup fields, in ONE fixed order — shared verbatim by both densities.
  const slots = html`
    <span class="cc-slot cc-slot--head">
      <${Avatar} kind=${agent.kind} initials=${agent.id}/>
      <span class="cc-name">${agent.slug}</span>
    </span>
    <span class="cc-slot cc-slot--pair"><${PairedTie} agent=${agent}/></span>
    <span class="cc-slot cc-slot--meter"><${ReworkMeter} rework=${agent.rework}/></span>
    <span class="cc-slot cc-slot--badge"><${LBadge} level=${agent.autonomy}/></span>
    <span class="cc-slot cc-slot--flight"><${InflightPill} agent=${agent}/></span>`;
  const foot = (density === 'card' && agent.stats)
    ? html`<div class="cc-foot"><span>${agent.stats.compliancePct}% compliant</span>
        <span>${agent.stats.loops} loops · ${agent.stats.runs} runs</span></div>`
    : null;
  return html`<div class=${'cc cc--' + density} data-agent=${agent.id}>${slots}${foot}</div>`;
}

function SpineSegments({ spine, nav }) {            // shape A — labeled segment BAR

function SpineLoop({ spine, nav }) {                 // shape B — staged LOOP BAND + iter badge

  const overBudget = iter.current > iter.budget;

// 4.2: EvBarChart is the prototype's ONE real chart — a hand-authored GROUPED inline-SVG bar chart
// (NO chart library, NO raster). It accepts a normalized `chart` = {categories:[seg], series:[{source,
// accent:'ink'|'alt', points:[{label,value}]}], unit}; one series renders single bars (at-rest source-
// of-record), two series render side-by-side groups (resolved both-sources view). Muted ink (--ink-35)
// for the source-of-record series, raspberry (--rasp) for the disagreeing series — EXISTING tokens,
// no minted color. Every number is a pure function of the passed series (ZERO series literals in this
// markup); real <text> axis + category labels; <title>/<desc> carry the a11y description.
function EvBarChart({ chart }) {
  const cats = chart.categories || [];
  const series = (chart.series || []).filter((s) => s && (s.points || []).length);
  const unit = chart.unit || '';
  const W = 360, H = 152, padL = 40, padR = 8, padTop = 10, padBottom = 26;
  const nCat = Math.max(cats.length, 1);
  const nSer = Math.max(series.length, 1);
  const plotW = W - padL - padR;
  const plotH = H - padTop - padBottom;
  const groupW = plotW / nCat;
  const barGap = 3;
  const bw = Math.max((groupW - barGap * (nSer + 1)) / nSer, 3);
  const max = Math.max(...series.flatMap((s) => (s.points || []).map((p) => p.value)), 1);
  const yOf = (v) => padTop + plotH - (v / max) * plotH;
  const desc = series.map((s) => `${s.source}: ` + (s.points || []).map((p) => `${p.label} ${p.value}${unit}`).join(', ')).join('; ');
  return html`
    <svg class="ev-svg" viewBox=${`0 0 ${W} ${H}`} role="img" aria-label=${'grouped bar chart of revenue by segment' + (unit ? ', ' + unit : '')}>
      <title>${chart.title || 'Revenue by segment'}${unit ? ' (' + unit + ')' : ''}</title>
      <desc>${desc}</desc>
      <line class="ev-axis" x1=${padL} y1=${padTop} x2=${padL} y2=${padTop + plotH}/>
      <line class="ev-axis" x1=${padL} y1=${padTop + plotH} x2=${W - padR} y2=${padTop + plotH}/>
      <text class="ev-ylab" x=${padL - 5} y=${padTop + 4} text-anchor="end">${max}${unit}</text>
      <text class="ev-ylab" x=${padL - 5} y=${padTop + plotH} text-anchor="end">0</text>
      ${cats.map((cat, ci) => {
        const gx = padL + ci * groupW;
        return html`
          ${series.map((s, si) => {
            const p = (s.points || [])[ci] || { value: 0 };
            const bx = gx + barGap + si * (bw + barGap);
            const by = yOf(p.value);
            const bh = padTop + plotH - by;
            return html`
              <rect class=${'ev-bar ev-bar--' + (s.accent || 'ink')} x=${bx} y=${by} width=${bw} height=${bh} rx="1.5">
                <title>${s.source} · ${cat}: ${p.value}${unit}</title>
              </rect>`;
          })}
          <text class="ev-xlab" x=${gx + groupW / 2} y=${padTop + plotH + 13} text-anchor="middle">${cat}</text>`;
      })}
    </svg>`;
}

/* ── Decision ladder (Contract 1 pick 6A/6B/6C, Contract 3 atom): ONE component, a
   `layer` prop → three projections of ONE atom. The DEC- id renders in every layer so an
   ID-match across layers is verifiable. Fields are read VERBATIM from the contract-3 atom;
   `diff` is a presentational distillation (render hint), never a contract field. ── */
function hhmm(ts) {                                  // HH:MM from an ISO timestamp (display only)
  const m = /T(\d{2}:\d{2})/.exec(ts || '');
  return m ? m[1] : '--:--';
}
function DecisionPill({ atom }) {                    // 6A — inline pill
  const sup = atom.status === 'superseded';
  const awaiting = atom.status === 'awaiting_human';
  return html`
    <span class=${'dec-pill' + (sup ? ' dec-pill--superseded' : '') + (awaiting ? ' dec-pill--awaiting' : '')}>
      <span class="dec-scale">⚖</span>
      <span class="dec-diff">${atom.diff || atom.title}</span>
      <${LBadge} level=${atom.reversibility}/>
      ${awaiting ? html`<span class="dec-await-tag">awaiting</span>` : null}
      <span class="dec-id">${atom.id}</span>
    </span>`;
}
function DecisionCallout({ atom }) {                 // 6B — pill-as-button + CSS popover
  const [open, setOpen] = useState(false);
  useEffect(() => {                                  // escape-to-close (a11y)
    if (!open) return undefined;
    const onKey = (e) => { if (e.key === 'Escape') setOpen(false); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [open]);
  return html`
    <span class="dec-callout">
      <button class="dec-pill dec-pill--btn" aria-expanded=${open ? 'true' : 'false'}
              aria-haspopup="dialog" onClick=${() => setOpen(!open)}>
        <span class="dec-scale">⚖</span>
        <span class="dec-diff">${atom.diff || atom.title}</span>
        <${LBadge} level=${atom.reversibility}/>
        <span class="dec-id">${atom.id}</span>
      </button>
      ${open ? html`
        <div class="dec-pop" role="dialog" aria-label=${'decision ' + atom.id}>
          <div class="dec-pop-row"><span class="dec-pop-k">why</span>${atom.rationale}</div>
          <div class="dec-pop-row">
            <span class="dec-pop-k">considered</span>
            ${(atom.options_considered || []).map((o) => html`
              <div class=${'dec-pop-opt' + (o.chosen ? ' dec-pop-opt--chosen' : '')}>
                <span class="dec-pop-opt-mark">${o.chosen ? '✓' : '·'}</span>
                <span>${o.option} — ${o.consequence}</span>
              </div>`)}
          </div>
          <div class="dec-pop-row"><span class="dec-pop-k">revisit if</span>${atom.revisit_if}</div>
          <div class="dec-pop-by">${atom.originating_agent} · ${atom.author_type} · ${hhmm(atom.timestamp)}</div>
          <a class="dec-pop-link" href=${'#/decision/' + atom.id}>open full record →</a>
        </div>` : null}
    </span>`;
}
function DecisionRow({ atom }) {                     // 6C — diff-first trail row
  const sup = atom.status === 'superseded';
  return html`
    <div class=${'dec-row' + (sup ? ' dec-row--superseded' : '')}>
      <span class="dec-c-time">${hhmm(atom.timestamp)}</span>
      <span class="dec-c-phase">${atom.phase}</span>
      <span class="dec-c-lvl"><${LBadge} level=${atom.reversibility}/></span>
      <span class="dec-c-title">
        <span class="dec-c-diff">${atom.diff || ('decision: ' + atom.title)}</span>
        <span class="dec-c-name">${atom.title} · <span class="dec-id">${atom.id}</span>${sup && atom.superseded_by
          ? html` · <span class="dec-suplink">superseded by ${atom.superseded_by} →</span>` : ''}</span>
      </span>
      <span class="dec-c-who">${atom.originating_agent}</span>
    </div>`;
}
function Decision({ atom, layer = 'pill' }) {
  if (!atom) { console.warn('Decision: missing atom'); return html`<span class="dec-unknown">⚠ no decision atom</span>`; }
  if (layer === 'callout') return html`<${DecisionCallout} atom=${atom}/>`;
  if (layer === 'row') return html`<${DecisionRow} atom=${atom}/>`;
  return html`<${DecisionPill} atom=${atom}/>`;
}

/* ════════════════════════════════════════════════════════════════════════
   3.1 — FEATURE BACKBONE COMPONENTS. All PURE (props)->vdom (no appState reads except
   the NeedsYouChip's ephemeral LOCAL useState popover, same posture as the 6B callout).
   StageSurface (surf-*) renders the focused step's familiar-tool surface; WorkRow renders
   the per-goal work stream resolved against ORG.agents (PRF1); the evidence adapters map
   the ORG E1 shape onto EvidenceBlock + wire the real raster. NO view-transition-name here.

// ── assignee → identity resolvers (PRF1). initials from a slug; resolve against ORG. ──
function initialsOf(slug) {
  if (!slug) return '?';
  if (slug.charAt(0) === '@') {                          // '@you' → the human's initials (e.g. SJ)
    const h = (ORG.humans || []).find((x) => x.slug === slug);
    return h ? h.initials : slug.replace('@', '').slice(0, 2).toUpperCase();
  }
  const parts = slug.split('-').filter(Boolean);         // 'crud-orchestrator' → 'CO'
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return slug.slice(0, 2).toUpperCase();
}
function resolveAssignee(slug) {
  const a = (ORG.agents || {})[slug];
  if (a) return { slug, name: slug, kind: a.kind, state: a.state, human: false };
  const h = (ORG.humans || []).find((x) => x.slug === slug);
  if (h) return { slug, name: slug, kind: 'human', state: 'idle', human: true };
  if (ORG.guide && ORG.guide.slug === slug) return { slug, name: slug, kind: 'guide', state: 'working', human: false };
  console.warn('resolveAssignee: unresolved assignee', slug);   // visible-not-silent
  return { slug, name: slug, kind: 'maker', state: 'idle', human: false, unresolved: true };
}

// ── WorkRow (PRF1) — one run-status row per work_stream item, the assignee resolved against
//    ORG.agents (Avatar kind from the agent's kind). The @you MANUAL item carries the needs-you
//    accent ONLY when blocking. Replaces the 2b kit FIXTURES in this zone. ──
const WORK_STATUS = {
  running: { cls: 'running', glyph: '▸', label: 'running' },
  working: { cls: 'running', glyph: '▸', label: 'running' },
  idle:    { cls: 'idle', glyph: '○', label: 'queued' },
  benched: { cls: 'idle', glyph: '○', label: 'benched' },
  blocked: { cls: 'blocked', glyph: '⚠', label: 'blocked' },
  'checker-flagged': { cls: 'blocked', glyph: '⚠', label: 'flagged' },
};
function WorkRow({ item, steps }) {
  const who = resolveAssignee(item.assignee);
  const needs = who.human && item.kind === 'manual';     // pending human action = needs-you
  const st = needs
    ? { cls: 'needs', glyph: '⚠', label: 'needs you' }
    : (WORK_STATUS[who.state] || { cls: 'idle', glyph: '○', label: who.state || 'idle' });
  const step = (steps || []).find((s) => s.id === item.step);
  const stepLbl = step ? (step.shortLabel || step.label) : item.step;
  return html`
    <div class=${'work-row' + (needs ? ' work-row--needs' : '')} data-agent=${who.slug}>
      <span class="work-id">
        <${Avatar} kind=${who.kind} initials=${initialsOf(who.slug)}/>
        <span class="work-name">${who.name}</span>
      </span>
      <span class="work-meta">
        <span class="work-step">${stepLbl}</span>
        <span class=${'work-status work-status--' + st.cls}>${st.glyph} ${st.label}</span>
      </span>
      <span class="work-label">${item.label}</span>
    </div>`;
}

//    Labels/surfaceWhy/artifacts all come from the stageModels step (never hardcoded). Unknown
//    surface → visible surf-unknown + console.warn (zero-silent-failure). ──

// ── Evidence adapters — map the ORG goal-evidence shape onto EvidenceBlock props. E1 is fully
//    adapted (real raster shots + checker attribution from execution.iteration.checker); E2–E5 pass
//    the ORG object through (3.3 / 3.4 / Phase 4 own their polish). ──
function adaptE1(goal) {
  const e = (goal.evidence && goal.evidence.E1) || {};
  const m = /(\d+)\s*passed\s*\/\s*(\d+)\s*failed/i.exec(e.test_summary || '');
  return {
    tests: { passed: m ? +m[1] : null, failed: m ? +m[2] : null, coverageDelta: e.coverage_delta },
    shots: e.shots || [],
    checks: (e.checker_rows || []).map((r) => ({ code: r.code, label: r.label, status: r.state })),
    pr: { id: (e.pr || '').replace(/^PR\s*/i, '') || e.pr, label: goal.title },
    checkerSlug: (goal.execution && goal.execution.iteration && goal.execution.iteration.checker) || null,
  };
}
// 4.1: adapt the ORG E4 shape ({verdict, confidence:'◐', budget_ms, p95_ms, atom_ref, caption,
// data_points:[{label,ms}]}) onto EvidenceE4's props. confidence is a GLYPH in ORG (◐); the
// component runs it back through confGlyph, so map the glyph → the H/M/L key it expects (◐→M).
// spike_ref becomes {atomId, evId} → the bidirectional local-disclosure link (no route, no op).
const GLYPH_TO_CONF = { '●': 'H', '◐': 'M', '○': 'L' };
function adaptE4(goal) {
  const e = (goal.evidence && goal.evidence.E4) || {};

    budget_ms: e.budget_ms, p95_ms: e.p95_ms,
    dataPoints: (e.data_points || []).map((p) => `${p.label}: ${p.ms}ms`),
    evId: e.id,

  };
}
// 4.2: a generic SQL-ish lineage stub for the E5 provenance disclosure + the notebook cells. Built
// from the ORG source names (sluggified into table-ish names) + the quarter parsed from the title —
// it carries ZERO revenue figures and never hand-types a source name, so the drift grep stays clean.
function srcTable(name) { return (name || 'source').toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, ''); }
function dataQuery(sources, quarter) {
  return (sources || []).map((s) =>
    `-- ${s}\nSELECT segment, SUM(amount) AS revenue\nFROM ${srcTable(s)}\nWHERE quarter = '${quarter}'\nGROUP BY segment;`
  ).join('\n\n');
}
// 4.2: adaptE5 builds the E5 report props from the FROZEN ORG, in one of two states. The chart series
// is a PURE FUNCTION of the ORG payload — at-rest plots ONLY the source-of-record (the first source's
// column) with the disagreement flagged (◐ + gap); resolved plots BOTH sources from evidence.resolved_view
// (source-of-record muted-ink, the disagreeing source raspberry). v1 is ALWAYS present + accessible
// (FR-007 — never deleted). No series value, source name, or the gap figure is typed here; all DERIVE.
function adaptE5(goal, resolved) {
  const e = (goal.evidence && goal.evidence.E5) || {};
  const rv = (goal.evidence && goal.evidence.resolved_view) || {};
  const unit = e.unit || '';
  const sources = e.sources || [];
  const segs = (e.series || []).map((r) => r.segment);
  const quarter = (goal.title.match(/Q[1-4]/) || ['the quarter'])[0];
  const query = dataQuery(sources, quarter);
  if (resolved && (rv.series || []).length) {
    const series = rv.series.map((src, i) => ({
      source: src.source,
      accent: i === 0 ? 'ink' : 'alt',        // source-of-record muted-ink · disagreeing source raspberry
      total: src.total,
      points: (src.segments || []).map((p) => ({ label: p.segment, value: p.value })),
    }));
    return {
      title: goal.title, unit, resolved: true, confidence: '●', flag: null,
      note: rv.reconciliation_note,
      chart: { categories: series[0] ? series[0].points.map((p) => p.label) : segs, series, unit, title: 'Revenue by segment' },
      sources, query,
      versions: [
        { n: 1, label: 'v1', active: false, accessible: true, note: 'draft · pre-reconciliation, kept on file' },
        { n: 2, label: 'v2', active: true, accessible: true, note: 're-run on fresh data · reconciled' },
      ],
    };
  }
  // at-rest: source-of-record only (first source column on the at-rest series), disagreement flagged.
  const sor = sources[0] || 'source-of-record';
  const points = (e.series || []).map((r) => ({ label: r.segment, value: r.finance }));
  return {
    title: goal.title, unit, resolved: false, confidence: e.confidence || '◐',
    flag: e.gap ? `${sources[1] || 'the second source'} disagrees by ${e.gap} — source call pending` : null,
    note: e.reconciliation_note,
    chart: { categories: segs, series: [{ source: sor, accent: 'ink', points }], unit, title: 'Revenue by segment' },
    sources, query,
    versions: [
      { n: 1, label: 'v1', active: true, accessible: true, note: 'draft · headline pending the source call' },
      { n: 2, label: 'v2', active: false, accessible: false, note: 'pending the L3 source call' },

  };
}

  if (kind === 'E1') return adaptE1(goal);
  if (kind === 'E4') return adaptE4(goal);
  if (kind === 'E5') return adaptE5(goal, !!(opts && opts.resolved));
  return (goal.evidence && goal.evidence[kind]) || {};
}

/* ════════════════════════════════════════════════════════════════════════
   3.2 — EXECUTION DRILL-IN COMPONENTS (exec-*). RunNode + IterationPanel are

   avatar hue / maker-checker resolution, same posture as 3.1's WorkRow/RunNode

   without rework. RunNode is the recursive run_node.html VISUAL idiom lift (rail-
   threaded recursion · has-failure/has-warning rollup · ↻ rework #N · ctx tint ·
   status dots · skill chips). It is mounted at EXACTLY ONE external call-site
   (ExecPanel) — the span tree exists nowhere else (trace-creep guard); the only
   other `<${RunNode}` is the component's own recursion. ExecPanel keeps the focus
   run's expand state in a LOCAL useState (ephemeral UI, same posture as the 6B
   callout / NeedsYouChip popover) — NOT appState; the panel's OPEN/CLOSED is

// ── status semantics (distinct red --fail rollup vs raspberry needs-you) ──
const EXEC_STATUS = {
  done:    { cls: 'done',    lbl: 'done' },
  running: { cls: 'running', lbl: 'running' },
  blocked: { cls: 'blocked', lbl: 'blocked' },
  flagged: { cls: 'flagged', lbl: 'flagged' },
};
// run_node.html rollup: failure dominates warning. `blocked` (a hard L3 stop) rolls up as failure;
// `flagged` / rework roll up as warning. Pure recursion over the node subtree.
function execRollup(node) {
  let fail = node.status === 'blocked' || node.status === 'failed' || node.status === 'stuck';
  let warn = node.rework != null || node.status === 'flagged';
  for (const c of node.children || []) { const r = execRollup(c); fail = fail || r.fail; warn = warn || r.warn; }
  return { fail, warn };
}
function execRollClass(node) {
  const { fail, warn } = execRollup(node);
  return fail ? ' has-failure' : warn ? ' has-warning' : '';
}
function ctxTint(ctx) {                                   // ctx-tint BUCKET derived in the view (data carries raw used/limit)
  if (!ctx || !ctx.limit) return 'calm';
  const p = ctx.used / ctx.limit;
  return p >= 0.70 ? 'hot' : p >= 0.45 ? 'mid' : 'calm';
}
function countNodes(n) { let c = 1; for (const k of n.children || []) c += countNodes(k); return c; }

// ── RunNode({node, depth}) — recursive, pure. Guard: an unknown agent slug (can't happen given the
//    3.1 generator invariant, but guarded anyway) renders the slug raw + a `?` avatar, never throws. ──
function RunNode({ node, depth = 0 }) {
  if (!node || typeof node !== 'object') {                // visible fallback, never throw mid-demo
    console.warn('RunNode: missing node');
    return html`<div class="exec-node exec-node--unknown">⚠ missing run node</div>`;
  }
  const st = EXEC_STATUS[node.status] || { cls: 'unknown', lbl: node.status || '?' };
  const agent = (ORG.agents || {})[node.agent];
  const unknownAgent = !agent;
  if (unknownAgent) console.warn('RunNode: unresolved agent', node.agent);   // visible-not-silent
  const avatarKind = agent ? agent.kind : 'maker';        // resolved agent kind drives the maker/checker hue
  const ctx = node.ctx;
  const pct = (ctx && ctx.limit) ? Math.round(ctx.used / ctx.limit * 100) : null;
  const skills = node.skills || [];
  return html`
    <div class=${'exec-group' + execRollClass(node)}>
      <div class=${'exec-node' + (depth > 0 ? ' is-child' : '') + ((st.cls === 'blocked' || st.cls === 'flagged') ? ' exec-node--alert' : '')} data-run-id=${node.id}>

          <span class=${'exec-dot exec-dot--' + st.cls}></span>

// ── IterationPanel({iteration}) — maker/checker ColleagueCard line-density pair (bracket tie),
//    finding rows (code · label · round · status), 3-segment rework meter, named exits. PURE: the
//    maker/checker slugs resolve against the frozen ORG.agents global (no appState). Reused by 5a. ──
function FindingRow({ f }) {

function ExecReworkMeter({ rework }) {                     // 3-segment meter from iteration.rework
  const used = rework ? rework.used : 0, budget = rework ? rework.budget : 0;
  const segs = [];
  for (let i = 0; i < budget; i++) segs.push(html`<i class=${'exec-rw-seg' + (i < used ? ' exec-rw-seg--used' : '')}></i>`);
  return html`<span class="exec-rwmeter">${segs}<span class="exec-rw-lbl">rework ${used}/${budget}</span></span>`;
}
const EXEC_EXIT_META = {                                  // named exits — visually complete, INERT (no data-op → dispatcher never fires; no onClick → no console error)
  fix:      { glyph: '✎', hint: 'apply the checker fix and re-review' },
  retry:    { glyph: '↻', hint: 're-run the maker-checker loop' },

};
// adapt an ORG.agents record onto the kit ColleagueCard's agent shape (the kit was authored for the
// FIXTURES shape: id = 2-letter avatar initials, inflight = {label}). Keeps the line-density lockup
// rendering correctly (avatar initials, paired tie, rework meter, autonomy badge, inflight pill).
function execAgentCard(slug) {
  const a = (ORG.agents || {})[slug];
  if (!a) return null;
  const inflight = (a.inflight && typeof a.inflight === 'object') ? a.inflight
    : (a.inflight ? { label: a.state === 'running' ? 'run in flight' : a.inflight + ' in flight' } : null);
  return { id: initialsOf(slug), slug, kind: a.kind, pairedWith: a.pairedWith,
           rework: a.rework, autonomy: a.autonomy, stats: a.stats, inflight };

function IterationPanel({ iteration }) {
  if (!iteration) {

// ── ExecPanel({goal}) — the Execution-tab shell (rendered ONLY while appState.drill==='execution',

/* ════════════════════════════════════════════════════════════════════════
   3.3 — DEBUG-LOOP CANVAS COMPONENTS (dbg-*). The investigation ledger is the
   ONE evidence/work-zone deviation from the feature grammar (SC-005: every other
   zone is shared). InvestigationLedger + ExperimentRow are PURE (props)->vdom —
   they read PROPS + the frozen ORG (resolveAssignee / execAgentCard against
   ORG.agents, same posture as 3.1's WorkRow and 3.2's RunNode), NEVER appState.
   Iteration history is first-class (FR-007): older passes COLLAPSE via <details>,
   never delete; the LIVE pass hosts the LOCKED E2 EvidenceBlock as its hero (the
   refuted hypotheses render struck-but-visible — never forked here). NO
   view-transition-name (anchors stay on shell zone wrappers).
   ════════════════════════════════════════════════════════════════════════ */

const VERDICT_MARK = { confirmed: '✓', refuted: '✕', open: '○' };
// ── ExperimentRow — one experiment an agent ran in a pass: label + verdict chip, with the
//    assignee rendered as a line-density ColleagueCard (resolved against ORG.agents via the 3.2
//    execAgentCard adapter). Unresolved assignee → visible slug fallback, never a blank gap. ──
function ExperimentRow({ exp }) {
  const card = execAgentCard(exp.assignee);

        ? html`<${ColleagueCard} agent=${card} density="line"/>`

}
// ── InvestigationPass — one iteration pass. <details>: the live pass is open; closed passes
//    collapse by default (FR-007 — collapsed, NEVER deleted). The live pass hosts the E2 ledger
//    as its hero (all hypotheses, refuted ones struck-but-visible via the LOCKED EvidenceBlock). ──
function InvestigationPass({ pass, e2 }) {
  const live = pass.status === 'live';
  return html`

      <summary class="dbg-pass-sum">

          ? html`<div class="dbg-pass-e2"><${EvidenceBlock} kind="E2" data=${e2}/></div>`
          : html`<div class="dbg-pass-collapsednote">${(pass.hypotheses || []).length} hypotheses weighed · kept in the ledger (collapsed, not deleted)</div>`}
      </div>

// ── InvestigationLedger — the debug work zone: the iteration passes (history first-class) + an L1
//    decision pill on the investigation. PURE: reads goal.investigation + goal.evidence.E2 + the L1
//    atom (props). Visible fallback if the passes are missing (zero-silent-failure). ──
function InvestigationLedger({ goal, l1Atom }) {
  const inv = goal && goal.investigation;
  const e2 = (goal && goal.evidence && goal.evidence.E2) || {};
  if (!inv || !(inv.passes || []).length) {

      ${inv.passes.map((p) => html`<${InvestigationPass} pass=${p} e2=${e2}/>`)}
      ${l1Atom ? html`
        <div class="dbg-ledger-dec">

          <${Decision} atom=${l1Atom} layer="pill"/>

}

/* ════════════════════════════════════════════════════════════════════════
   NERVOUS SYSTEM (1.2) — the typed-op dispatcher + the scenario engine.
   Contract 3: the op vocabulary is a CLOSED 5-op set; NOTHING mutates the
   canvas outside dispatch(). pin stays DISTINCT from promote (not aliased) —
   the closed vocabulary is itself the contract being proven. The VISUAL morph
   (view-transition-name tagging, contrasting spine shapes, watermark) is 1.3;
   here morph only flips appState.family + pushes a receipt stub.
   ════════════════════════════════════════════════════════════════════════ */

// Two canned nudges the `nudge` op cycles between (proves the card re-renders from state).
// [0] is the feature goal's nudge from ORG (carries the goal id + flagged rule — derived, never
// typed); [1] is demo chrome with zero canonical tokens (the cycle target that proves re-render).
const NUDGES = [
  { ...FEATURE.nudge },
  { who: 'Guide', do: 'Reproduce the auth timeout', why: 'attach the failing trace before hypothesizing' },
];

/* ── The five op functions (Step 1.2.2) — minimal-but-visible state mutations. ── */
function morph(family, s) {                     // chat course-change reshapes the canvas
  s.family = family;
  // 3.4: morph is MORPH-SAFE — it always clears the HOW drill-in so the exec tree DOM never
  // participates in the view-transition snapshot (the close-beat guard, enforced at the op too).
  s.drill = null;
  // 3.4: the receipt drops ONLY on the FORWARD morph (away from the goal's real family — the
  // "classify as bug" reclassification); the scripted REVERSE (back to the goal's own family)
  // emits NO second receipt (Decision 9 — reversibility is shown by the canvas returning, not by a
  // new atom; one atom DEC-CAST-412-03, one receipt). Idempotent: never double-push the same atom.
  const goal = s.org.goals[s.goal.id];
  const intrinsic = goal && goal.family;
  const a = MORPH_ATOM;
  const already = s.receipts.some((r) => r.decision_id === a.id);
  if (family !== intrinsic && !already) {
    // The receipt is DERIVED from the locked morph atom (level/label/time all spine-derived),
    // keeping Phase 1's receipt keys {level,label,at} + the v1.1 decision_id.
    s.receipts.push({
      level: a.reversibility,                   // 'L2'
      label: a.title,                           // the decision's headline, from the spine
      at: a.timestamp.slice(11, 16),            // 'HH:MM' (UTC) → '17:52'
      rationale: a.rationale,
      decision_id: a.id,                        // v1.1: receipts gain a decision_id
    });
  }
}
function nudge(_id, s) {                         // swap the dominant next step (cycle two canned nudges)
  s.nudge = (s.nudge.do === NUDGES[0].do) ? { ...NUDGES[1] } : { ...NUDGES[0] };
}
function promote(artifactId, s) {               // chat artifact → durable pinned canvas object
  s.pinned.push({ id: artifactId, kind: 'promoted',
                  title: 'Acceptance criteria — RBAC checkout',
                  provenance: 'from chat · Guide · 17:53' });
  chatFor(s.goal.id).messages.push({ from: 'system', text: 'Pinned ✓ — artifact promoted to the canvas.' });  // PRF2: per-goal chat
}
// drillInto is REUSED for BOTH targets (closed 5-op set — NO sixth op for stage navigation; see the
// OPS table comment). The argument grammar branches:
//   • arg === 'execution' → toggle the HOW drill-in panel (the run_node.html lift; 3.2 fleshes it).
//   • arg === '<step-id>' → set appState.stageFocus (3.1 stage navigator). Re-clicking the focused
//     step, OR clicking the current step while at default, returns to the default view (stageFocus=null).
function drillInto(target, s) {
  if (target === 'execution') { s.drill = (s.drill === 'execution') ? null : 'execution'; return; }
  const g = s.org.goals[s.goal.id];
  const current = g && g.spine_state && g.spine_state.current;
  if (s.stageFocus === target || (s.stageFocus == null && target === current)) { s.stageFocus = null; return; }
  s.stageFocus = target;
}
function pin(artifactId, s) {                    // DISTINCT from promote — canvas-local stub object
  // 2a.3: the flagged rule code derives from ORG (FLAGGED_RULE), never hand-typed.
  s.pinned.push({ id: artifactId, kind: 'pinned',
                  title: `Canvas note — ${FLAGGED_RULE} checker flag`,
                  provenance: 'pinned on canvas · 17:54' });
}
// 4.2: resolveDataSource is the ONE script-wired L3 resolution in the prototype (Decision 4/6). It is
// NOT a sixth op and NOT an OPS-table entry — it is a SCRIPT PATCH (the same posture 4.3's parity reveal
// uses): it flips the additive presentation flag (appState.dataResolved) so the E5 headline re-renders
// to resolved_view, and pushes EXACTLY ONE receipt carrying the L3 atom's decision_id. ORG is NOT mutated
// (the atom keeps chosen:false on every option — the 2a gate invariant is untouched); reload rebuilds
// appState → dataResolved:false → the unresolved state. Idempotent: never double-push the same atom.
function resolveDataSource(s) {
  s.dataResolved = true;
  const a = (s.org.decisions || []).find((d) => d.goal_slug === s.goal.id && d.reversibility === 'L3');
  if (!a) { console.warn('resolveDataSource: no L3 atom for', s.goal.id); return; }
  if (s.receipts.some((r) => r.decision_id === a.id)) return;
  // the user's pick = "show both with a reconciliation note" (the rank-2 option) — DERIVED, not typed.
  const opt = (a.options_considered || []).find((o) => /both|reconcil/i.test(o.label || '')) || (a.options_considered || [])[1] || {};
  s.receipts.push({
    level: a.reversibility,                  // 'L3'
    label: opt.label || a.title,             // the chosen option, as the receipt headline
    at: (a.timestamp || '').slice(11, 16),   // 'HH:MM' (UTC)
    rationale: a.rationale,
    decision_id: a.id,                       // the L3 atom id on the receipt (FR-016 trail)
  });
}

/* ── The dispatcher (Step 1.2.1, ~30 lines vanilla). Every canvas change goes through here. ── */
// Closed 5-op set (Contract 3) — stays closed. Stage navigation is NOT a sixth op: it REUSES
// `drillInto` with a step-id argument (drillInto:'<step-id>' → stageFocus), while drillInto:'execution'
// remains the HOW drill-in. The arg-grammar branch lives in drillInto() above.
const OPS = { morph, nudge, promote, drillInto, pin };          // closed set (Contract 3)
const reduced = matchMedia('(prefers-reduced-motion: reduce)');

function fade(apply) {                                          // fallback: apply, then a 180ms opacity ramp
  apply();
  const frame = document.getElementById('canvas-frame');
  frame && frame.animate([{ opacity: 0.0 }, { opacity: 1 }], { duration: 180, easing: 'ease-out' });
}

function dispatch(opStr) {                                      // e.g. "morph:debug"
  const [op, arg] = opStr.split(':');
  if (!OPS[op]) { console.warn('unknown op:', opStr); return; }// guard — no throw mid-demo
  const apply = () => { OPS[op](arg, appState); paint(); };
  if (!document.startViewTransition || reduced.matches) return fade(apply);
  document.startViewTransition(apply);                         // shared-element morph (visuals in 1.3)
}

// Exactly ONE delegated listener (survives re-renders; never bind per element).
document.addEventListener('click', (e) => {
  const el = e.target.closest('[data-op]');
  if (el) dispatch(el.getAttribute('data-op'));
});

/* ── 4.1: spike_ref BIDIRECTIONAL LOCAL DISCLOSURE (Decision 11) — NOT a sixth op. The closed 5-op
   set stands; this is the existing chip→callout mechanism + scroll/highlight, on its own delegated
   listener (the elements carry data-disclose-*, never data-op, so dispatch() ignores them). One
   direction: the verdict's spike_ref [data-disclose-l3] opens the header L3 rail by CLICKING the
   existing NeedsYouChip (the literal chip→callout affordance), then scroll/highlights it. The other:
   the rail's back-link [data-disclose-e4="<evId>"] scroll/highlights the E4 verdict card. Pure DOM
   affordance — no appState, same posture as the 6B popover. ── */
function spkFlash(el) {
  if (!el) return;
  el.classList.add('spk-flash');
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  setTimeout(() => el.classList.remove('spk-flash'), 1400);
}
document.addEventListener('click', (e) => {
  const toL3 = e.target.closest('[data-disclose-l3]');
  if (toL3) {
    const chip = document.querySelector('.ny-chip');
    if (chip && chip.getAttribute('aria-expanded') !== 'true') chip.click();   // open via the established chip mechanism
    setTimeout(() => spkFlash(document.querySelector('.ny-rail .rail')), 60);    // after the rail's re-render
    return;
  }
  const toE4 = e.target.closest('[data-disclose-e4]');
  if (toE4) { spkFlash(document.getElementById(toE4.getAttribute('data-disclose-e4'))); return; }
});

/* ── Per-goal chat (PRF2). chatFor(id) lazily seeds {messages, scriptIndex, scriptKey:<family>};
   activeScript() resolves SCRIPTS[scriptKey]. Switching goals shows that goal's own thread + its
   scenario position; reload rebuilds appState → resets cleanly. ── */
function chatFor(goalId) {
  const by = appState.chat.byGoal;
  if (!by[goalId]) {
    // 5b: the hiring side-arc owns its OWN chat bucket ('__hire') keyed to SCRIPTS.hiring, so the
    // funnel's "start from chat" (US6) never pollutes a goal's per-goal thread. Reload rebuilds → reset.
    if (goalId === '__hire') { by[goalId] = { messages: [], scriptIndex: 0, scriptKey: 'hiring' }; }
    else {
      const fam = (appState.org.goals[goalId] || {}).family;
      by[goalId] = { messages: [], scriptIndex: 0, scriptKey: fam };
    }
  }
  return by[goalId];
}
// 5b: the active chat key — '__hire' while on the hiring funnel (#/hire), the routed goal id otherwise.
// The chat rail is a first-class driver of appState.hiring.step (US6's test starts "from chat"); the
// wizard's own Next buttons set the same state, so both paths stay in sync by construction.
function chatKey() { return (location.hash || '').startsWith('#/hire') ? '__hire' : appState.goal.id; }

/* ── The scenario engine (Step 1.2.3). An ARRAY WALKER, explicitly NOT a state machine. Engine
   state lives ONLY in the PER-GOAL chat (chatFor(goal).scriptIndex) → reload resets, and each
   goal keeps its own position (PRF2). ── */
function advance() {
  const c = chatFor(chatKey());
  const scr = SCRIPTS[c.scriptKey] || [];
  const i = c.scriptIndex;
  if (i >= scr.length) return;
  const step = scr[i];
  c.messages.push({ from: step.from || 'narration', text: step.narration, ops: step.ops });
  c.scriptIndex = i + 1;
  const apply = () => { step.patch && step.patch(appState); paint(); };
  if (step.transition === 'morph' && document.startViewTransition && !reduced.matches) {
    document.startViewTransition(apply);
  } else if (step.transition === 'morph') {
    fade(apply);
  } else {
    apply();
  }
}

/* ── SCRIPTS — per-family scenario scripts (3.1 introduces SCRIPTS.feature; 3.3 adds .debug, 3.4
   adds the real morph beat). The feature flow (~7 beats): open → Guide why-line nudge → spine-
   navigator beat (focus the design step) → promote a real artifact → evidence beat (focus the E1
   home step) → the L3 needs-you beat → close. Narration INTERPOLATES canonical tokens + step labels
   from ORG (FEATURE_ID, FLAGGED_RULE, the PR + test summary, step labels, the L3 ticket) — NEVER
   retyped, so the drift grep stays clean (no stage-label string literal appears in this file). ── */
const FEAT_SM = ORG.stageModels.feature;

   no sixth op (UI state lives in the hash + the additive appState.hiring key, mutated by plain

// ── inline-SVG helpers (Decision 14 · the Phase-4 E5/M9 idiom: real <text>, <title>/<desc>, tokens only) ──
function polar(cx, cy, r, angDeg) {           // angle measured from 12-o'clock, clockwise
  const a = (angDeg - 90) * Math.PI / 180;
  return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
}
/* RadarChart — per-dimension evaluation polygon. axes=[{label, value, max}]; value/max scales the
   spoke. Hand-authored grid rings + axis spokes + the value polygon, real <text> axis labels, and a
   machine-readable <title>/<desc>. Data-driven only (no baked geometry beyond the frame). */
function RadarChart({ axes, size = 172 }) {
  const N = (axes || []).length;
  if (!N) return null;
  const c = size / 2, R = size * 0.33, LR = size * 0.45;
  const frac = (ax) => Math.max(0, Math.min(1, (ax.value || 0) / (ax.max || 5)));
  const ringPts = (rf) => axes.map((ax, i) => polar(c, c, R * rf, i * 360 / N).map((n) => n.toFixed(1)).join(',')).join(' ');
  const valPts = axes.map((ax, i) => polar(c, c, R * frac(ax), i * 360 / N).map((n) => n.toFixed(1)).join(',')).join(' ');
  const desc = axes.map((a) => `${a.label} ${a.value}/${a.max || 5}`).join('; ');
  return html`
    <svg class="svg-radar" viewBox=${`0 0 ${size} ${size}`} width=${size} height=${size} role="img" aria-label=${'evaluation radar — ' + desc}>
      <title>Per-dimension evaluation</title><desc>${desc}</desc>
      ${[0.25, 0.5, 0.75, 1].map((rf) => html`<polygon class="svg-radar-grid" points=${ringPts(rf)}/>`)}
      ${axes.map((ax, i) => { const [x, y] = polar(c, c, R, i * 360 / N); return html`<line class="svg-radar-axis" x1=${c} y1=${c} x2=${x.toFixed(1)} y2=${y.toFixed(1)}/>`; })}
      <polygon class="svg-radar-poly" points=${valPts}/>
      ${axes.map((ax, i) => { const [x, y] = polar(c, c, R * frac(ax), i * 360 / N); return html`<circle class="svg-radar-dot" cx=${x.toFixed(1)} cy=${y.toFixed(1)} r="2.3"/>`; })}
      ${axes.map((ax, i) => { const [x, y] = polar(c, c, LR, i * 360 / N); const anc = x < c - 3 ? 'end' : x > c + 3 ? 'start' : 'middle'; return html`<text class="svg-radar-lbl" x=${x.toFixed(1)} y=${(y + 2.5).toFixed(1)} text-anchor=${anc}>${ax.short || ax.label}</text>`; })}
    </svg>`;
}
/* Sparkline — compliance trend over N samples. Min-baseline normalized polyline + soft area fill +
   end dot; min/max are read off the data, never hardcoded. */
function Sparkline({ points, width = 220, height = 46 }) {
  const pts = (points || []).map(Number).filter((n) => !isNaN(n));
  if (!pts.length) return null;
  const min = Math.min(...pts), max = Math.max(...pts), span = (max - min) || 1, pad = 5;
  const xs = (i) => pad + i * (width - 2 * pad) / Math.max(1, pts.length - 1);
  const ys = (v) => (height - pad) - ((v - min) / span) * (height - 2 * pad);
  const line = pts.map((v, i) => `${xs(i).toFixed(1)},${ys(v).toFixed(1)}`).join(' ');
  const area = `${pad},${(height - pad).toFixed(1)} ${line} ${(width - pad).toFixed(1)},${(height - pad).toFixed(1)}`;
  const last = pts[pts.length - 1];
  const desc = `${pts.length} samples, ${min}% to ${max}%, latest ${last}%`;
  return html`
    <svg class="svg-spark" viewBox=${`0 0 ${width} ${height}`} width=${width} height=${height} role="img" aria-label=${'compliance trend — ' + desc}>
      <title>Compliance trend</title><desc>${desc}</desc>
      <line class="svg-spark-base" x1=${pad} y1=${ys(min).toFixed(1)} x2=${width - pad} y2=${ys(min).toFixed(1)}/>
      <polygon class="svg-spark-area" points=${area}/>
      <polyline class="svg-spark-line" points=${line}/>
      <circle class="svg-spark-dot" cx=${xs(pts.length - 1).toFixed(1)} cy=${ys(last).toFixed(1)} r="2.5"/>
    </svg>`;
}

// benchmark radar axes for a resume — every spoke is a deterministic projection of a REAL ORG number
// (stats.compliancePct / stats.loops / stats.runs / health / autonomy), scaled to a 0–5 spoke.
function agentBenchAxes(a) {
  const s = a.stats || {};

  const auton = { conservative: 2, balanced: 3.5, autonomous: 5 }[a.autonomy] || 3;
  return [
    { label: 'compliance', short: 'comply', value: Math.max(0, Math.min(5, (s.compliancePct || 0) - 95)), max: 5 },
    { label: 'loop economy', short: 'loops', value: Math.max(0, Math.min(5, 6 - (s.loops || 3))), max: 5 },
    { label: 'volume', short: 'runs', value: Math.max(0, Math.min(5, Math.log10((s.runs || 1) + 1) * 2)), max: 5 },
    { label: 'freshness', short: 'health', value: fresh, max: 5 },
    { label: 'autonomy', short: 'auton', value: auton, max: 5 },
  ];
}

/* ── #/layer2 — one page, three in-page sections (taste call: plain scroll nav, NOT hash anchors,
   which would collide with the hash router). The chain pipeline REUSES StageSpine's pipeline shape and
   reads its stage labels from ORG.layer2.chain (Constraint 6 — no hardcoded stage vocabulary). ── */
function Layer2View() {

  const chainAligned = contracts.filter((c) => c.kind === 'chain-aligned');
  const crossCutting = contracts.filter((c) => c.kind === 'cross-cutting');
  // CAST-412's position = the chain's first ACTIVE node (derived from status, never a hardcoded label).
  const nowIdx = Math.max(0, chain.findIndex((n) => n.status === 'active'));
  const chainSpine = { shape: 'pipeline', steps: chain.map((n) => n.node), current: nowIdx };
  const nowLabel = (chain[nowIdx] || {}).node;
  return html`
    <div class="surf5">
      <div class="surf5-head"><span class="surf5-title">Layer-2 — the contract substrate</span><span class="surf5-kicker">enumerable</span></div>

        <div class="l2-contracts">

            <div class=${'l2-contract' + (c.kind === 'cross-cutting' ? ' l2-contract--cross' : '')}>
              <div class="l2-ct-top"><span class="l2-ct-nm">${c.name}</span>
                <span class=${'l2-ct-kind l2-ct-kind--' + (c.kind === 'cross-cutting' ? 'cross' : 'chain')}>${c.kind === 'cross-cutting' ? 'cross-cutting' : 'chain'}</span></div>
              <div class="l2-ct-purpose">${c.purpose}</div>

      </div>

              <div class="l2-proj-figs">
                <div><div class="l2-proj-fig-n">${p.runs}</div><div class="l2-proj-fig-k">runs</div></div>
                <div><div class="l2-proj-fig-n">${p.compliancePct}%</div><div class="l2-proj-fig-k">compliant</div></div>

/* ── #/board — re-author preso a08/s8a as DOM (layout/vocabulary only, zero SVG geometry). Four
   columns from ORG.board; humans AND agents in ONE assignee stack (same card format, distinguished
   only by the 2b avatar grammar — no Automations lane). Each card embeds a line-density ColleagueCard
   so the assignee + in-flight pill read without opening the ticket. ── */
const BOARD_FILTERS = [
  { key: 'any', label: 'Any' }, { key: 'human', label: 'Human' },
  { key: 'agent', label: 'Agent' }, { key: 'checker', label: 'Checker' },
];
function boardCardMatches(t, f) {
  if (f === 'any') return true;
  const who = resolveAssignee(t.assignee);
  if (f === 'human') return !!who.human;
  if (f === 'checker') return who.kind === 'checker';
  if (f === 'agent') return !who.human && who.kind !== 'guide';   // any agent (maker OR checker)
  return true;
}
// ticket assignee → the kit ColleagueCard line-density shape. Agents adapt via toCardAgent; humans get
// the same five-slot lockup (pair/meter/badge degrade to '—'). The in-flight pill reflects the TICKET.
function boardCardAgent(ticket) {
  const slug = ticket.assignee;
  const a = (ORG.agents || {})[slug];
  let base;
  if (a) { base = toCardAgent(a); }
  else {
    const h = (ORG.humans || []).find((x) => x.slug === slug);
    base = { id: h ? h.initials : initialsOf(slug), slug, kind: h ? 'human' : 'maker',
             pairedWith: null, stats: null, autonomy: null, rework: null, inflight: null, state: 'idle' };
  }
  return Object.assign({}, base, { inflight: ticket.inflight ? { label: ticket.id + ' in flight' } : null });
}
function BoardCard({ ticket }) {
  const isL3 = ticket.badge === 'L3';
  return html`

        ${isL3 ? html`<${LBadge} level="L3"/>` : null}

      <div class="board-card-title">${ticket.title}</div>

}
function BoardView() {
  const board = ORG.board || { columns: [], tickets: [] };

  return html`

/* ── #/ticket/CAST-412 — re-author a09. Header = title + maker-checker paired lockup + 3-segment

function TicketView() {

  const pr = iter.pr || {};
  const atoms = (goal.decisions || []).map((id) => (ORG.decisions || []).find((a) => a.id === id)).filter(Boolean);
  const nextAtom = atoms.find((a) => a.phase === 'execution' && a.reversibility === 'L2') || atoms[0];

            <a class="ticket-pair-who" href=${'#/agent/' + iter.checker} title=${'open ' + iter.checker + '’s résumé'}><${Avatar} kind=${checkerA ? checkerA.kind : 'checker'} initials=${checkerA ? checkerA.id : '?'}/> ${iter.checker} <span class="ticket-pair-role">checker</span></a>
          </span>

          </div>`)}
      </div>

      <div class="ticket-foot">
        <a class="ticket-prlink" href=${'#/goal/' + tid} data-replay="execution">⌥ ${pr.id || 'PR'}${pr.label ? ' — ' + pr.label : ''}</a>
        <span class="ticket-foot-why">the diff lives behind the execution drill-in — the surface carries only the link</span>

/* ── #/decision/:atomId — the decision-artifact frame (the 6C full record). Renders every atom field
   verbatim. BRANCH: an L3 atom carrying an escalation pack (the CAST-417 roles-column drop) ALSO
   renders the EscalationRail — three pre-framed options, nothing pre-selected, an UNRESOLVED stop
   (options stay inert; only Phase 4's data L3 resolves prototype-wide). "escalated to me →" loops back
   to #/board with boardFilter applied. Unknown id → muted strip. ── */
// the EscalationRail prop mapping is the SINGLE Phase-3 `atomToEscalation` (defined above for the
// goal-canvas NeedsYouChip) — reused verbatim here so the rail reads identically in both surfaces.
function decRec(k, v) {
  return html`<div class="dec-rec-row"><span class="dec-rec-k">${k}</span><span class="dec-rec-v">${v}</span></div>`;
}
function DecisionView() {
  const seg = (location.hash || '').split('/');
  const aid = seg[2] || '';
  const atom = (ORG.decisions || []).find((a) => a.id === aid);
  if (!atom) {
    return html`
      <div class="surf5">
        <div class="surf5-head"><span class="surf5-title">Decision artifact</span></div>
        <div class="muted-strip">No decision <code>${aid || '—'}</code> in the record. Open the <a href=${'#/decisions/' + FEATURE_ID} style="color:var(--rasp)">decision trail ▸</a>.</div>
      </div>`;
  }
  const isEsc = atom.reversibility === 'L3' && (atom.what_i_want || (atom.influenced || []).includes('CAST-417'));
  const trailH = '#/decisions/' + (atom.goal_slug || FEATURE_ID);
  const opts = atom.options_considered || [];
  const rows = [
    decRec('id', atom.id),
    decRec('reversibility', html`<${LBadge} level=${atom.reversibility}/> ${atom.reversibility}`),
    decRec('status', html`<span class="dec-status-chip">${atom.status}</span>`),
    decRec('phase', atom.phase),
    decRec('decision', atom.title),
    decRec('rationale', atom.rationale),
    decRec('options', opts.length ? opts.map((o) => html`
      <div class=${'dec-rec-opt' + (o.chosen ? ' dec-rec-opt--chosen' : '')}>
        <span class="dec-rec-opt-mark">${o.chosen ? '✓' : '·'}</span>
        <span>${o.option || o.label}${o.consequence ? html` — <span class="dec-rec-opt-conseq">${o.consequence}</span>` : ''}</span>
      </div>`) : html`<span class="dec-rec-opt-conseq">— none recorded</span>`),
    decRec('consequences', atom.consequences),
    decRec('revisit if', atom.revisit_if),
  ];
  if (atom.what_i_want) rows.push(decRec('what I want', atom.what_i_want));
  if (atom.what_i_tried) rows.push(decRec('what I tried', atom.what_i_tried));
  rows.push(decRec('originating', atom.originating_agent + ' · ' + atom.author_type));
  rows.push(decRec('timestamp', html`<span class="dec-rec-meta">${atom.timestamp}</span>`));
  if (atom.supersedes) rows.push(decRec('supersedes', html`<a href=${'#/decision/' + atom.supersedes}>${atom.supersedes} →</a>`));
  if (atom.superseded_by) rows.push(decRec('superseded by', html`<a href=${'#/decision/' + atom.superseded_by}>${atom.superseded_by} →</a>`));
  if (atom.spike_ref) rows.push(decRec('spike_ref', (typeof atom.spike_ref === 'object') ? (atom.spike_ref.label || atom.spike_ref.decisionId) : atom.spike_ref));
  if ((atom.influenced || []).length) rows.push(decRec('influenced', (atom.influenced || []).join(' · ')));
  return html`
    <div class="dec-frame">
      <div class="dec-frame-crumb"><a href="#/board">▦ Board</a> / <a href=${trailH}>decision trail</a> / ${atom.id}</div>
      <div class="dec-frame-head">
        <${LBadge} level=${atom.reversibility}/>
        <span class="dec-frame-title">${atom.title}</span>
      </div>
      ${atom.diff ? html`<div class="dec-frame-diff">⚖ ${atom.diff}</div>` : null}
      ${isEsc ? html`
        <div class="dec-esc-band">
          <span class="dec-esc-band-h">⚠ L3 — held as an unresolved stop, routed to @you</span>
          <button type="button" class="dec-esc-backlink" onClick=${escalateToBoard}>escalated to me →</button>
        </div>
        <${EscalationRail} escalation=${atomToEscalation(atom)}/>` : null}
      <div class="ticket-sect-h">full record</div>
      <div class="dec-rec">${rows}</div>
    </div>`;
}

/* ── #/decisions/:goalId — the cross-phase trail (diff-first, one row per atom) + the AutonomyDial
   wiring + the L2 digest strip. Filter facets (phase / actor / L-level) live in the hash. Toggling the
   dial to Conservative promotes the dial_demo L2 atom OUT of the digest/trail flow into a pinned
   stop-and-confirm card — a scripted illusion (no receipt, ORG untouched, reload resets). ── */
const TRAIL_ACTORS = [{ key: 'all', label: 'Any' }, { key: 'human', label: 'Human' }, { key: 'agent', label: 'Agent' }];
const TRAIL_LVLS = [{ key: 'all', label: 'Any' }, { key: 'L1', label: 'L1' }, { key: 'L2', label: 'L2' }, { key: 'L3', label: 'L3' }];
const DIAL_VALUE_LBL = { conservative: 'Conservative', balanced: 'Balanced', autonomous: 'Autonomous' };
function trailHref(goalId, phase, actor, lvl) {
  const segs = [phase || 'all', actor || 'all', lvl || 'all'];
  while (segs.length && segs[segs.length - 1] === 'all') segs.pop();
  return '#/decisions/' + goalId + (segs.length ? '/' + segs.join('/') : '');
}
function DecisionsTrailView() {
  const seg = (location.hash || '').split('/');
  const goalId = seg[2] || '';
  const goal = ORG.goals[goalId];
  if (!goal) {
    return html`
      <div class="surf5">
        <div class="surf5-head"><span class="surf5-title">Decision trail</span></div>
        <div class="muted-strip">No goal <code>${goalId || '—'}</code>. Open the <a href="#/board" style="color:var(--rasp)">board ▸</a>.</div>
      </div>`;
  }
  const phaseF = seg[3] || 'all', actorF = seg[4] || 'all', lvlF = seg[5] || 'all';
  const allAtoms = (goal.decisions || []).map((id) => (ORG.decisions || []).find((a) => a.id === id)).filter(Boolean);
  allAtoms.sort((a, b) => (a.timestamp || '').localeCompare(b.timestamp || ''));   // chronological (diff-first trail)
  const phases = allAtoms.reduce((acc, a) => (acc.includes(a.phase) ? acc : acc.concat(a.phase)), []);

  const conservative = (appState.autonomyLevel || 'balanced') === 'conservative';
  const dialAtom = allAtoms.find((a) => a.dial_demo);
  const l2Atoms = allAtoms.filter((a) => a.reversibility === 'L2');
  const digestAtoms = conservative ? l2Atoms.filter((a) => !a.dial_demo) : l2Atoms;   // the promoted atom leaves the digest

  const trailAtoms = allAtoms.filter((a) => {
    if (conservative && a.dial_demo) return false;                       // promoted into the pinned stop above
    if (phaseF !== 'all' && a.phase !== phaseF) return false;
    if (lvlF !== 'all' && a.reversibility !== lvlF) return false;
    if (actorF === 'human' && a.author_type !== 'human') return false;
    if (actorF === 'agent' && a.author_type !== 'agent') return false;
    return true;
  });

  const trust = (goal.autonomy && goal.autonomy.trust) || {};
  const dialValue = DIAL_VALUE_LBL[appState.autonomyLevel || 'balanced'] || 'Balanced';
  return html`
    <div class="dec-trailpage">
      <div class="surf5-head"><span class="surf5-title">Decision trail</span><span class="surf5-kicker">${goalId} · diff-first</span></div>
      <p class="surf5-lede">Every judgment call on ${goalId}, in order, each row a diff. The autonomy dial sets where the threshold sits — flip it to Conservative and watch a quiet L2 become a stop.</p>

      <div class="dec-dialhead">
        <div class="dec-dialhead-top">
          <span class="dec-dialhead-h">⚖ Autonomy dial — sets where the agents stop to ask</span>
          <span class="dec-dialhead-sub">toggle re-tints the threshold live · reload resets to Balanced</span>
        </div>
        <${AutonomyDial} value=${dialValue} trust=${trust} onPick=${(p) => setAutonomyLevel(p.toLowerCase())}/>
      </div>

      ${(conservative && dialAtom) ? html`
        <div class="dec-pinned">
          <div class="dec-pinned-top">
            <span class="dec-pinned-badge">${dialAtom.reversibility} · now a stop</span>
            <span class="dec-pinned-now">now requires your OK</span>
          </div>
          <div class="dec-pinned-title">${dialAtom.title}</div>
          <div class="dec-pinned-diff">⚖ ${dialAtom.diff}</div>
          <div class="dec-pinned-cond">Under <b>Conservative</b>, this reversible-but-notable (${dialAtom.reversibility}) call <b>would pause for your confirmation</b> before it's recorded — instead of landing quietly in the digest below. ${dialAtom.rationale}</div>
          <button type="button" class="dec-pinned-confirm">Confirm &amp; record</button>
          <div class="dec-pinned-foot">scripted preview · nothing is recorded, ORG is unchanged, reload restores Balanced</div>
        </div>` : null}

      ${digestAtoms.length ? html`
        <${DigestNotice} glyph="⚖"
          summary=${digestAtoms.length + ' decision' + (digestAtoms.length === 1 ? '' : 's') + ' made while you were away'}
          rows=${digestAtoms.map((a) => ({ label: a.title, body: html`<${Decision} atom=${a} layer="callout"/>` }))}/>` : null}

      <div class="ticket-sect-h">the trail</div>
      <div class="dec-filterbar">
        <div class="dec-filtergrp">
          <span class="dec-filtergrp-k">phase</span>
          <a class=${'facet-chip' + (phaseF === 'all' ? ' sel' : '')} href=${trailHref(goalId, 'all', actorF, lvlF)}>Any</a>
          ${phases.map((p) => html`<a class=${'facet-chip' + (phaseF === p ? ' sel' : '')} href=${trailHref(goalId, p, actorF, lvlF)}>${p}</a>`)}
        </div>
        <div class="dec-filtergrp">
          <span class="dec-filtergrp-k">actor</span>
          ${TRAIL_ACTORS.map((x) => html`<a class=${'facet-chip' + (actorF === x.key ? ' sel' : '')} href=${trailHref(goalId, phaseF, x.key, lvlF)}>${x.label}</a>`)}
        </div>
        <div class="dec-filtergrp">
          <span class="dec-filtergrp-k">L-level</span>
          ${TRAIL_LVLS.map((x) => html`<a class=${'facet-chip' + (lvlF === x.key ? ' sel' : '')} href=${trailHref(goalId, phaseF, actorF, x.key)}>${x.label}</a>`)}
        </div>
      </div>

      <div class="dec-trail">
        <div class="dec-row dec-row--head"><span>time</span><span>phase</span><span>⚖</span><span>decision</span><span>who</span></div>
        ${trailAtoms.length
          ? trailAtoms.map((a) => html`<a class="dec-rowlink" href=${'#/decision/' + a.id}><${Decision} atom=${a} layer="row"/></a>`)
          : html`<div class="dec-trail-empty">No decisions match this filter.</div>`}
      </div>
    </div>`;
}

/* ════════════════════════════════════════════════════════════════════════
   5c — #/reqs/:goalId · the US7 requirements-doc loop. ONE view reading entirely from
   goals[id].requirements_doc: a workflow-classification pill + version chip + version-
   history popover (header); the element hierarchy as native-<details> progressive
   disclosure where DEPTH IS TYPOGRAPHIC, never an L-badge (the L1/L2/L3 collision rule —
   hierarchy levels live here as typography; reversibility L1/L2/L3 rides the decision
   chips as ⚖-prefixed colored badges); the ONE PM-framed anchored comment thread (the
   single pm-role author, role-tagged from ORG.humans — the one PM moment prototype-wide);
   a diff-first v1→v2 delta review (the decision-trail row grammar); and the write-back
   DigestNotice (the SAME 5.0 component, '↺' voice) whose CTA opens the delta. reqsDoc
   state is plain appState + handlers (NO sixth op). Anchoring a comment/delta into a
   collapsed subtree force-opens its disclosure chain (a highlight inside a closed
   <details> is invisible). reqs-* prefix; introduces NO vt- name (Contract 8).
   ════════════════════════════════════════════════════════════════════════ */
function toggleReqsComment(id) { const r = appState.reqsDoc; r.openComment = (r.openComment === id) ? null : id; paint(); }
function toggleReqsDelta(force) { const r = appState.reqsDoc; r.deltaView = (typeof force === 'boolean') ? force : !r.deltaView; paint(); }
function setReqsCommentResolved(v) { appState.reqsDoc.commentResolved = v; paint(); }   // additive display-state override (reload clears)
function scrollToReqEl(id) { const n = document.getElementById('reqs-el-' + id); if (n) n.scrollIntoView({ block: 'nearest' }); }

const REQ_KIND_LBL = { intent: 'intent', story: 'story', fr: 'requirement', constraint: 'constraint' };

// every element id strictly UNDER `el` (descendants only) — decides whether a node's child
// disclosure must force-open because an active anchor (open comment / delta row) lives inside it.
function reqDescendantIds(el, byId, acc) {
  acc = acc || [];
  (el.children || []).forEach((cid) => { const c = byId[cid]; if (c) { acc.push(cid); reqDescendantIds(c, byId, acc); } });
  return acc;
}

// the one PM-framed comment thread (side-anchored). Each message's author is looked up in
// ORG.humans (circle Avatar + role tag — never a hardcoded persona name); the pm-role author
// is highlighted. open/resolved is a display state toggled via additive appState.
function ReqCommentThread({ comment, resolved }) {
  return html`
    <div class="reqs-thread" role="dialog" aria-label=${'comment thread on ' + comment.anchor}>
      <div class="reqs-thread-head">
        <span class=${'reqs-thread-state ' + (resolved ? 'is-resolved' : 'is-open')}>${resolved ? '✓ resolved' : '○ open'}</span>
        <button class="reqs-thread-toggle" onClick=${() => setReqsCommentResolved(!resolved)}>mark ${resolved ? 'open' : 'resolved'}</button>
        <button class="reqs-thread-x" aria-label="close thread" onClick=${() => toggleReqsComment(comment.id)}>×</button>
      </div>
      ${(comment.thread || []).map((m) => {
        const h = (ORG.humans || []).find((x) => x.slug === m.who);
        const isPm = h && /pm/i.test(h.role || '');
        return html`
          <div class=${'reqs-msg' + (isPm ? ' reqs-msg--pm' : '')}>
            <span class="reqs-msg-av"><${Avatar} kind="human" initials=${h ? h.initials : '?'}/></span>
            <div class="reqs-msg-b">
              <div class="reqs-msg-meta">
                <span class="reqs-msg-who">${h ? h.name : m.who}</span>
                ${h ? html`<span class=${'reqs-msg-role' + (isPm ? ' is-pm' : '')}>${h.role}</span>` : null}
                <span class="reqs-msg-time">${hhmm(m.time)}</span>
              </div>
              <div class="reqs-msg-text">${m.text}</div>
            </div>
          </div>`;
      })}
    </div>`;
}

// one element row → its level is carried TYPOGRAPHICALLY (reqs-lvlN: size/weight/indent), NEVER
// an L-badge. Current (non-superseded) decision_refs ride below as 6B callouts — that is where the
// reversibility L1/L2/L3 badge lives, always ⚖-prefixed (the collision rule). Children sit one
// disclosure deeper: L1 reveals its L2s open by default; an L2 reveals its L3s collapsed, so the
// auto-expand-on-anchor edge is observable.
function ReqElement({ el, byId, depth, doc, active, openComment, commentResolved }) {
  const kids = (el.children || []).map((id) => byId[id]).filter(Boolean);
  const refs = (el.decision_refs || [])
    .map((id) => (ORG.decisions || []).find((a) => a.id === id))
    .filter((a) => a && a.status !== 'superseded');         // current decisions only (the REST atom, not the retired GraphQL one)
  const comment = (doc.comments || []).find((c) => c.anchor === el.id);
  const isCmtOpen = !!(comment && openComment === comment.id);
  const anchored = active.has(el.id);
  const forceKids = reqDescendantIds(el, byId).some((id) => active.has(id));
  const kidsOpen = forceKids || el.level === 1;              // L1→L2 open by default; deeper levels collapse until anchored
  return html`
    <div class=${'reqs-node reqs-lvl' + el.level + (anchored ? ' reqs-node--anchored' : '')} id=${'reqs-el-' + el.id}>
      <div class="reqs-row">
        <span class="reqs-kind">${REQ_KIND_LBL[el.kind] || el.kind}</span>
        <span class="reqs-text">${el.text}</span>
        ${comment ? html`
          <button class=${'reqs-cmt-aff' + (isCmtOpen ? ' is-open' : '')} aria-expanded=${isCmtOpen ? 'true' : 'false'}
                  title="open the comment thread" onClick=${() => toggleReqsComment(comment.id)}>💬 ${(comment.thread || []).length}</button>` : null}
      </div>
      ${refs.length ? html`<div class="reqs-chips">${refs.map((a) => html`<${DecisionCallout} atom=${a}/>`)}</div>` : null}
      ${isCmtOpen ? html`<${ReqCommentThread} comment=${comment} resolved=${commentResolved}/>` : null}
      ${kids.length ? html`
        <details class="reqs-disc" open=${kidsOpen}>
          <summary class="reqs-disc-sum">${kids.length} nested ${kids.length === 1 ? 'requirement' : 'requirements'} <span class="reqs-disc-caret">▾</span></summary>
          <div class="reqs-kids">
            ${kids.map((k) => html`<${ReqElement} el=${k} byId=${byId} depth=${depth + 1} doc=${doc}
                active=${active} openComment=${openComment} commentResolved=${commentResolved}/>`)}
          </div>
        </details>` : null}
    </div>`;
}

function ReqsDocView() {
  const seg = (location.hash || '').split('/');
  const goalId = seg[2] || FEATURE_ID;
  const goal = ORG.goals[goalId];
  const doc = goal && goal.requirements_doc;
  if (!doc) {
    return html`
      <div class="surf5">
        <div class="surf5-head"><span class="surf5-title">Requirements doc</span></div>
        <div class="muted-strip">No requirements doc for <code>${goalId || '—'}</code>. Open the <a href="#/board" style="color:var(--rasp)">board ▸</a>.</div>
      </div>`;
  }
  const byId = {};
  (doc.elements || []).forEach((e) => { byId[e.id] = e; });
  const roots = (doc.elements || []).filter((e) => e.level === 1);
  const rd = appState.reqsDoc;
  // active anchors → force-open the disclosure chain + highlight the rows they point at.
  const active = new Set();
  if (rd.deltaView) (doc.delta || []).forEach((d) => active.add(d.anchor));
  if (rd.openComment) { const c = (doc.comments || []).find((x) => x.id === rd.openComment); if (c) active.add(c.anchor); }
  const cmt = (doc.comments || [])[0];
  const commentResolved = (rd.commentResolved != null) ? rd.commentResolved : !!(cmt && cmt.state === 'resolved');
  const wb = doc.writeback || {};
  const vh = doc.version_history || [];
  const deltaN = (doc.delta || []).length;
  return html`
    <div class="surf5 reqs-doc">
      <!-- header — workflow classification pill (mono) + version chip + version-history popover (native <details>) -->
      <div class="reqs-head">
        <span class="reqs-class" title="workflow classification">${doc.classification}</span>
        <details class="reqs-verpop">
          <summary class="reqs-vchip">${doc.version}<span class="reqs-disc-caret"> ▾</span></summary>
          <div class="reqs-verpop-body">
            <div class="reqs-verpop-h">version history</div>
            ${vh.map((v) => html`
              <div class=${'reqs-ver' + (v.v === doc.version ? ' is-current' : '')}>
                <div class="reqs-ver-top"><span class="reqs-ver-v">${v.v}</span><span class="reqs-ver-d">${(v.date || '').slice(0, 10)}</span></div>
                ${v.summary ? html`<div class="reqs-ver-sum">${v.summary}</div>` : null}
              </div>`)}
          </div>
        </details>
        <h1 class="reqs-title">${goal.title}</h1>
        <span class="reqs-goalid">${goalId}</span>
      </div>

      <!-- write-back notice — the SAME DigestNotice component as 5a's L2 digest ('↺' voice); naming the
           originating phase. Its CTA drives appState.reqsDoc.deltaView (so the doc body highlights too). -->
      <div class="reqs-writeback">
        <${DigestNotice} glyph="↺" summary=${wb.summary || 'Requirements updated from planning — review the delta.'} rows=${[]}/>
        <div class="reqs-wb-bar">
          <span class="reqs-wb-origin">updated from <b>${wb.origin_phase || 'planning'}</b> · ${deltaN} element${deltaN === 1 ? '' : 's'} changed</span>
          <button class="reqs-wb-cta" aria-expanded=${rd.deltaView ? 'true' : 'false'} onClick=${() => toggleReqsDelta(!rd.deltaView)}>
            ${rd.deltaView ? 'hide the change summary ▴' : 'review the v1→' + doc.version + ' delta ▾'}
          </button>
        </div>
      </div>

      <!-- delta review (diff-first; the decision-trail row grammar) — anchored to the affected elements;
           turning it on force-opens + highlights those elements' disclosure chains in the body below. -->
      ${rd.deltaView ? html`
        <div class="reqs-delta">
          <div class="reqs-delta-h">v1 → ${doc.version} · ${deltaN} change${deltaN === 1 ? '' : 's'} from planning — review the delta, don't re-read the doc</div>
          <div class="reqs-delta-list">
            ${(doc.delta || []).map((d) => html`
              <div class="reqs-delta-row">
                <span class="reqs-delta-diff">${d.change}</span>
                <button class="reqs-delta-anchor" title="jump to the changed element" onClick=${() => scrollToReqEl(d.anchor)}>${d.anchor} ▸</button>
                <span class="reqs-delta-origin">${d.origin_phase}</span>
              </div>`)}
          </div>
        </div>` : null}

      <!-- the element hierarchy — DEPTH IS TYPOGRAPHIC (reqs-lvlN), native <details> disclosure, NO L-badges. -->
      <div class="reqs-body">
        ${roots.map((r) => html`<${ReqElement} el=${r} byId=${byId} depth=${0} doc=${doc}
            active=${active} openComment=${rd.openComment} commentResolved=${commentResolved}/>`)}
      </div>
    </div>`;
}

/* ════════════════════════════════════════════════════════════════════════
   PHASE 6 · 6.1 — THE FRONT DOOR (chooser · tours · demo-script overlay).
   Three new surfaces, all PRESENTATION CHROME inline here (NO ORG batch — Phase 6
   Decision 7): the FR-002 scenario chooser at #/ (bare route), the five driver.js
   anatomy TOURS (keyed identically to SCRIPTS), and the presenter demo overlay.
   No sixth op, no new SCRIPTS key, exactly one additive appState key (demoScriptOpen).
   All copy authored em-dash-free (FR-018); canonical literals (goal titles/ids,
   agent slug) RENDER FROM ORG — never retyped (the drift rule). ════════════════ */

/* ── SCENARIOS — the static chooser descriptor (demo chrome). Verb + family-shape + route +
   scriptKey + an anatomy blurb (no canonical literals in the blurb — those render from ORG on the
   card). The four goal scenarios map onto goal ids via goalIdByFamily; `hiring` maps to #/hire. ── */
const SCENARIOS = [
  { key: 'feature', verb: 'Follow a feature', shape: 'segments', route: '#/goal/' + goalIdByFamily.feature, scriptKey: 'feature',
    blurb: 'Walk a goal through its stages, watch it get reclassified mid-flow, and land on the one call that needs a human.' },
  { key: 'debug', verb: 'Chase a bug', shape: 'loop', route: '#/goal/' + goalIdByFamily.debug, scriptKey: 'debug',
    blurb: 'Follow a debug loop: hypotheses confirmed and refuted on the record, a red test going green, then the fix to scope.' },
  { key: 'spike', verb: 'Run a spike', shape: 'timebox', route: '#/goal/' + goalIdByFamily.spike, scriptKey: 'spike',
    blurb: 'A timeboxed probe: throwaway code, one borderline number, three ways into the same verdict, and a go or no-go.' },
  { key: 'data', verb: 'Answer a data question', shape: 'pipeline', route: '#/goal/' + goalIdByFamily.data, scriptKey: 'data',
    blurb: 'A pipeline from two sources that disagree to a published report, with the chart that resolves once you decide.' },
  { key: 'hiring', verb: 'Hire an agent', shape: 'marketplace', route: '#/hire', scriptKey: 'hiring',
    blurb: 'Assess candidates on your own problem, read the stack-ranked report, and onboard the winner with its checker.' },
];

// the family-shape glyph — the StageSpine silhouette idiom (segments / loop / timebox / pipeline),
// reused as a 30px card mark (Step 6.1.1 taste call: typographic CSS shapes, NO new illustrations).
function shapeGlyph(shape) {
  if (shape === 'segments') return html`<span class="choose-shape choose-shape--segments"><i></i><i></i><i></i><i></i></span>`;
  if (shape === 'loop')     return html`<span class="choose-shape choose-shape--loop"><i></i><i></i><i></i></span>`;
  if (shape === 'timebox')  return html`<span class="choose-shape choose-shape--timebox"><i></i></span>`;
  if (shape === 'pipeline') return html`<span class="choose-shape choose-shape--pipeline"><i></i><span></span><i></i><span></span><i></i></span>`;
  return html`<span class="choose-shape choose-shape--marketplace"><i></i></span>`;   // hiring → diamond
}

/* Enter a scenario: set the chat's scriptKey + reset its scriptIndex to 0 (+ clear the thread for a
   clean replay). A PLAIN handler — NOT a sixth op (BINDING #4). The href/hashchange does the routing;
   this only resets the script so the chosen flow starts from beat 1 every time. ── */
function enterScenario(sc) {
  const key = sc.route.startsWith('#/hire') ? '__hire' : (sc.route.match(/^#\/goal\/([^/]+)/) || [])[1];
  if (!key) return;
  const c = chatFor(key);
  c.scriptKey = sc.scriptKey;
  c.scriptIndex = 0;
  c.messages = [];
}

function ChooserCard({ sc }) {
  const goalId = sc.route.startsWith('#/goal/') ? sc.route.slice('#/goal/'.length) : null;
  const goal = goalId ? ORG.goals[goalId] : null;
  // title + id DERIVE FROM ORG (drift rule — goal titles never retyped). Hiring has no goal row, so
  // its title is the ORG hiring request line and its "id" slot reads the marketplace.
  const title = goal ? goal.title : (ORG.hiring && ORG.hiring.request) || sc.verb;
  const idLabel = goalId || 'marketplace';
  const startGuided = (e) => {
    e.preventDefault(); e.stopPropagation();
    enterScenario(sc);
    location.hash = sc.route;
    // defer until the hashchange has painted the flow canvas, so the data-tour anchors exist.
    setTimeout(() => startTour(sc.scriptKey), 90);
  };
  return html`
    <a class="choose-card" href=${sc.route} onClick=${() => enterScenario(sc)}>
      <div class="choose-card-top">
        <span class="choose-glyph">${shapeGlyph(sc.shape)}</span>
        <span class="choose-verb">${sc.verb}</span>
        <span class="choose-id">${idLabel}</span>
      </div>
      <div class="choose-title">${title}</div>
      <div class="choose-blurb">${sc.blurb}</div>
      <div class="choose-acts">
        <span class="choose-enter">Enter ▸</span>
        <span class="choose-tour-link" role="button" tabIndex=${0} onClick=${startGuided}>Guided tour</span>
      </div>
    </a>`;
}

/* The real FR-002 chooser (replaces the Phase 1 stub). A BARE route — App renders it WITHOUT the
   three-tier shell (BINDING #7): no nav/chat zone wrappers, so no vt- name, so zero vt- dup risk. ── */
function ChooserScreen() {
  const orchestrator = (Object.values(ORG.agents).find((a) => a.kind === 'maker') || {}).slug;   // canon slug from ORG, not retyped
  const fid = goalIdByFamily.feature;
  const areas = [
    { label: 'Board', route: '#/board' },

    { label: 'Agent ops', route: '#/agent/' + orchestrator },
    { label: 'Layer-2', route: '#/layer2' },
    { label: 'Requirements doc', route: '#/reqs/' + fid },
    { label: 'Decision trail', route: '#/decisions/' + fid },
  ];
  return html`
    <div class="choose-wrap">
      <a class="choose-brand" href="#/">die<em>cast</em></a>
      <div class="choose-tag">cast to spec · no drift</div>

      <!-- the Guide opens the front door in its own voice (the persistent character is present here too). -->
      <div class="choose-guide">
        <${GuideMark} size=${18}/>
        <div class="choose-guide-t">I am the Guide. Pick one of the five things this demo can show you. Each card drops you into a real flow, and the chat rail walks you through it. Want the anatomy first? Take the guided tour.</div>
      </div>

      </div>

}

/* ── TOURS — five driver.js ANATOMY tours, keyed IDENTICALLY to SCRIPTS (BINDING #5). 5–8 stops each,
   anchored on data-tour ATTRIBUTES (not classes; survive 6.2's styling refactors). Tours teach
   anatomy — where the WHAT lives, the stage spine + its family shape, the work, the evidence, the
   chat. They NEVER call advance() (BINDING #4): the LAST stop of every tour points at the chat advance
   control and hands off to the scenario engine, which owns the narrative. startTour pre-filters to
   stops whose element is present, so a route whose element set does not match degrades quietly

const ADVANCE_STOP = { element: '[data-tour="advance"]',

    { element: '[data-tour="work"]', popover: { title: 'Work in flight', side: 'top', align: 'start', description: 'The agents working this goal right now, each row a colleague with a name and a paired checker.' } },
    { element: '[data-tour="evidence"]', popover: { title: 'The proof', side: 'top', align: 'start', description: 'Acceptance evidence lives on the canvas: the test summary, the PR, the checker run. Proof, not vibes.' } },
    ADVANCE_STOP,
  ],
  debug: [
    { element: '[data-tour="header"]', popover: { title: 'The WHAT', side: 'bottom', align: 'start', description: 'The same goal anatomy, in the debug family. One grammar, a different shape.' } },
    { element: '[data-tour="spine"]', popover: { title: 'The debug loop', side: 'bottom', align: 'start', description: 'The backbone becomes a loop band with an iteration badge. Same spine component, a materially different silhouette.' } },
    { element: '[data-tour="work"]', popover: { title: 'The investigation', side: 'top', align: 'start', description: 'Hypotheses under test. Refuted ones stay struck-but-on-file, so the reasoning is auditable later.' } },
    { element: '[data-tour="evidence"]', popover: { title: 'Confirm, refute, repro', side: 'top', align: 'start', description: 'The confirm-or-refute ledger and the repro that goes red then green. The bug is proven, not asserted.' } },
    { element: '[data-tour="needsyou"]', popover: { title: 'The hard stop', side: 'bottom', align: 'start', description: 'The one call that needs you, traced back to its root cause and held on the header.' } },
    ADVANCE_STOP,
  ],
  spike: [
    { element: '[data-tour="header"]', popover: { title: 'The WHAT', side: 'bottom', align: 'start', description: 'A spike is a question with a timebox. The header carries the goal and its family.' } },
    { element: '[data-tour="spine"]', popover: { title: 'The timebox', side: 'bottom', align: 'start', description: 'No backbone here, just a budget meter. The lightest shape in the system, because a spike is meant to be cheap.' } },
    { element: '[data-tour="work"]', popover: { title: 'Throwaway probes', side: 'top', align: 'start', description: 'The attempts are kept on the card; the code is dropped on purpose. You buy the learning, not the prototype.' } },
    { element: '[data-tour="evidence"]', popover: { title: 'The verdict', side: 'top', align: 'start', description: 'A go or no-go with its confidence and the number behind it. The reveal also shows three access tiers landing on one artifact.' } },
    { element: '[data-tour="needsyou"]', popover: { title: 'Yours to call', side: 'bottom', align: 'start', description: 'The spike shows the call and refuses to make it. Three options, nothing pre-selected.' } },
    ADVANCE_STOP,
  ],
  data: [
    { element: '[data-tour="header"]', popover: { title: 'The WHAT', side: 'bottom', align: 'start', description: 'A data question, framed as a goal. Same anatomy, the pipeline family.' } },
    { element: '[data-tour="spine"]', popover: { title: 'The pipeline', side: 'bottom', align: 'start', description: 'The spine becomes a node chain, source to report. You can see where in the pipeline you are standing.' } },
    { element: '[data-tour="work"]', popover: { title: 'The notebook', side: 'top', align: 'start', description: 'Working cells with the query visible on each one. Nothing hidden, so the number is checkable.' } },
    { element: '[data-tour="evidence"]', popover: { title: 'The report', side: 'top', align: 'start', description: 'Where the headline lives, and where the chart re-renders the moment you resolve the source disagreement.' } },
    { element: '[data-tour="needsyou"]', popover: { title: 'The source call', side: 'bottom', align: 'start', description: 'Two sources disagree. The pipeline surfaces the gap and hands you the call, one hard stop.' } },
    ADVANCE_STOP,
