  border-radius:999px;padding:1px 8px;white-space:nowrap;}
.surf-nb-st--ran{color:var(--ink-60);border:1px solid var(--hairline);}
.surf-nb-st--l1{color:var(--ink-35);border:1px solid var(--hairline);}
.surf-nb-st--l2{color:var(--warn);border:1px solid var(--warn);}
.surf-nb-code{font-family:var(--mono);font-size:10.5px;line-height:1.5;white-space:pre-wrap;margin:0;
  padding:10px 12px;border-top:1px solid var(--hairline-soft);background:var(--paper);color:var(--ink-60);}
.surf-nb-note{font-size:11px;color:var(--ink-35);padding:8px 12px;border-top:1px solid var(--hairline-soft);}

/* ── E5 report extras (ev-*) — grouped chart legend, the data table, the flag/note lines, the
   version chips, and the no-data placeholder. The disagreeing series rides raspberry (--rasp), the
   source-of-record rides muted ink (--ink-35) — EXISTING tokens, no minted color. ── */
.ev-svg .ev-bar--ink{fill:var(--ink-35);}
.ev-svg .ev-bar--alt{fill:var(--rasp);}
.ev-svg .ev-ylab,.ev-svg .ev-xlab{font-family:var(--mono);font-size:8px;fill:var(--ink-35);}
.ev-flag{display:flex;gap:7px;font-family:var(--mono);font-size:11px;color:var(--warn);
  border:1px solid var(--warn);border-radius:var(--radius-sm);background:rgba(181,130,26,.07);
  padding:6px 10px;margin:2px 0 11px;}
.ev-legend{display:flex;flex-wrap:wrap;gap:14px;margin:0 0 11px;font-family:var(--mono);font-size:10.5px;color:var(--ink-60);}
.ev-leg{display:inline-flex;align-items:center;gap:6px;}
.ev-leg-sw{width:10px;height:10px;border-radius:2px;flex:none;}
.ev-leg--ink .ev-leg-sw{background:var(--ink-35);}
.ev-leg--alt .ev-leg-sw{background:var(--rasp);}
.ev-tbl{width:100%;border-collapse:collapse;font-size:11.5px;margin:2px 0 11px;}
.ev-tbl th,.ev-tbl td{text-align:right;padding:5px 8px;border-bottom:1px solid var(--hairline-soft);
  font-family:var(--mono);color:var(--ink-60);}
.ev-tbl th:first-child,.ev-tbl td:first-child{text-align:left;color:var(--ink);}
.ev-tbl th{font-size:9px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-35);font-weight:600;}
.ev-tbl .ev-td-alt{color:var(--rasp);}
.ev-tbl-foot td{font-weight:600;color:var(--ink);border-top:1px solid var(--hairline);border-bottom:none;}
.ev-note{font-size:11.5px;line-height:1.5;color:var(--ink-60);
  border-left:2px solid var(--hairline);padding:2px 0 2px 11px;margin:0 0 11px;}
.ev-nodata{font-family:var(--mono);font-size:11.5px;color:var(--warn);border:1px dashed var(--warn);
  border-radius:var(--radius-sm);padding:11px 13px;background:rgba(181,130,26,.07);margin:2px 0 11px;}
.ev-nodata-k{color:var(--ink-35);}
.ev-vers{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px;}
.ev-vers .ev-ver{margin-top:0;}
.ev-ver--on{border-color:var(--ink-35);color:var(--ink);}
.ev-ver--on .ev-ver-dot{background:var(--ok);}
.ev-ver--pending{border-style:dashed;color:var(--ink-35);}
.ev-ver--pending .ev-ver-dot{background:var(--ink-35);}

/* ════════════════════════════════════════════════════════════════════════
   4.3 — FR-017 THREE-ACCESS-TIERS PARITY PANE (parity-* — the new prefix this
   sub-phase owns). Script-patch-driven (appState.parityOpen) — NOT an op. The
   canvas area splits to two panes: an INK-DARK terminal pane (left) + the normal
   light canvas/memo pane (right); the persistent chat rail (AppShell) is the third
   tier. The dark terminal is the prototype's ONE sanctioned identity exception
   (Decision 7) — it DEPICTS the terminal tier, so it reads dark/mono with a minimal
   title bar, never Diecast chrome. The SAME verdict card lands in BOTH panes
   (resolved via parity.artifact_id). NO view-transition-name anywhere here (the
   6×1 anchor set is unchanged — BINDING #8); the reveal is a slide that becomes a
   fade under reduced-motion (no op, no startViewTransition — pure mount animation).
   ════════════════════════════════════════════════════════════════════════ */
.parity-split{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:16px;align-items:start;
  animation:parity-in var(--morph-duration) var(--ease-morph);}
@keyframes parity-in{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@media (prefers-reduced-motion: reduce){
  .parity-split{animation:parity-fade 180ms ease-out;}
  @keyframes parity-fade{from{opacity:0;}to{opacity:1;}}
}
/* ── Terminal tier (ink-dark, mono) — the contained identity exception. ── */
.parity-term{background:var(--ink);border:1px solid var(--ink);border-radius:var(--radius-md);
  overflow:hidden;display:flex;flex-direction:column;}
.parity-term-bar{display:flex;align-items:center;gap:7px;padding:7px 11px;
  background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.08);}
.parity-term-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.18);flex:none;}
.parity-term-title{margin-left:6px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;
  text-transform:uppercase;color:var(--ink-35);}
.parity-term-body{padding:13px 14px;display:flex;flex-direction:column;gap:3px;}
.parity-line{font-family:var(--mono);font-size:11.5px;line-height:1.6;color:var(--cream);
  white-space:pre-wrap;word-break:break-word;}
.parity-line--cmd{color:var(--paper);font-weight:600;}
.parity-line--ok{color:var(--ok-on-ink);}           /* 6.2: tokenized (was raw #5FD08A) — brighter --ok, legible on ink */
.parity-landing{margin-top:11px;padding-top:11px;border-top:1px dashed rgba(255,255,255,.14);
  display:flex;flex-direction:column;gap:7px;}
.parity-landing-k{font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--ink-35);}
/* ── Canvas tier (the normal light world — the SAME verdict card lands here). ── */
.parity-canvas{background:var(--paper);border:1px solid var(--hairline);border-radius:var(--radius-md);
  padding:14px;display:flex;flex-direction:column;}
.parity-pane-k{font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--ink-35);margin-bottom:9px;}
/* ── One-substrate caption (spans both panes; names the three tiers). ── */
.parity-cap{margin-top:13px;font-family:var(--mono);font-size:11px;line-height:1.55;color:var(--ink-60);
  border-left:2px solid var(--rasp);padding:3px 0 3px 12px;}

/* ════════════════════════════════════════════════════════════════════════════════════════════════
   5b — HIRING FUNNEL · MARKETPLACE · AGENT OPS · LAYER-2  (prefixes: hire- · mkt- · ops- · l2- · svg-)
   Token-only colors (no raw hex except the on-ink brightenings already sanctioned in the parity pane).
   The two SVG helpers (RadarChart/Sparkline) carry NO view-transition-name (Contract 9 — they render
   many copies). All six surfaces render inside the standard .canvas-frame.
   ════════════════════════════════════════════════════════════════════════════════════════════════ */
/* ── shared surface scaffolding (page head reused by all six 5b routes) ── */
.surf5{max-width:880px;}
.surf5-head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:4px;}
.surf5-title{font-family:var(--mono);font-weight:500;font-size:22px;letter-spacing:-.4px;}
.surf5-kicker{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.06em;
  text-transform:uppercase;padding:3px 8px;border-radius:999px;background:var(--rasp-08);color:var(--rasp);}
.surf5-lede{color:var(--ink-60);font-size:13px;margin:6px 0 22px;max-width:620px;line-height:1.5;}
.surf5-sect-h{font-family:var(--mono);font-size:11px;color:var(--ink-60);margin:0 0 11px;letter-spacing:.02em;}
.surf5-sect-h b{color:var(--ink);font-weight:600;}
.muted-strip{margin:30px 0;padding:16px 18px;border:1px dashed var(--hairline);border-radius:var(--radius-md);
  background:var(--cream-deep);color:var(--ink-35);font-size:12.5px;font-family:var(--mono);}
.scope-badge{font-family:var(--mono);font-size:9px;letter-spacing:.05em;text-transform:uppercase;
  padding:2px 7px;border-radius:999px;border:1px solid var(--hairline);color:var(--ink-60);white-space:nowrap;}
.scope-badge--internal{border-color:rgba(107,71,176,.3);color:var(--checker);background:rgba(107,71,176,.07);}
.scope-badge--open{border-color:var(--rasp-15);color:var(--rasp);background:var(--rasp-08);}
.chip-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px;}
.facet-chip{font-family:var(--mono);font-size:11px;text-decoration:none;color:var(--ink-60);
  border:1px solid var(--hairline);border-radius:999px;padding:5px 12px;background:var(--paper);}
.facet-chip:hover{border-color:var(--ink-35);}
.facet-chip.sel{background:var(--ink);color:var(--cream);border-color:var(--ink);}
.facet-chip .n{opacity:.55;margin-left:5px;}

/* ── #/hire — 5-step wizard ── */
.hire-steps{display:flex;gap:6px;margin:2px 0 24px;}
.hire-step{flex:1;display:flex;flex-direction:column;gap:5px;}
.hire-step-bar{height:4px;border-radius:2px;background:var(--cream-shadow);}
.hire-step.done .hire-step-bar{background:var(--ink-35);}
.hire-step.now .hire-step-bar{background:var(--rasp);}
.hire-step-lbl{font-family:var(--mono);font-size:9.5px;letter-spacing:.03em;text-transform:uppercase;color:var(--ink-35);}
.hire-step.now .hire-step-lbl{color:var(--rasp);}
.hire-step.done .hire-step-lbl{color:var(--ink-60);}
.hire-frame{border:1px solid var(--hairline);border-radius:var(--radius-md);background:var(--paper);padding:20px;}
.hire-frame-h{font-family:var(--mono);font-size:15px;font-weight:600;margin:0 0 4px;}
.hire-frame-sub{color:var(--ink-60);font-size:12.5px;margin:0 0 16px;line-height:1.5;}
.hire-nav{display:flex;justify-content:space-between;gap:10px;margin-top:20px;}
.hire-btn{font-family:var(--mono);font-size:12px;border-radius:var(--radius-sm);padding:8px 16px;cursor:pointer;
  border:1px solid var(--rasp-15);background:var(--rasp);color:var(--paper);font-weight:600;}
.hire-btn:hover{filter:brightness(1.05);}
.hire-btn--ghost{background:var(--paper);color:var(--ink-60);border-color:var(--hairline);font-weight:500;}
.hire-btn[disabled]{opacity:.35;cursor:default;}
/* step 1 — assessment matrix */
.hire-matrix{display:flex;flex-direction:column;gap:1px;background:var(--hairline-soft);
  border:1px solid var(--hairline-soft);border-radius:var(--radius-sm);overflow:hidden;}
.hire-mrow{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:14px;background:var(--paper);padding:10px 14px;}
.hire-mrow-dim{font-size:12.5px;color:var(--ink);}
.hire-mrow-w{font-family:var(--mono);font-size:10px;color:var(--ink-35);}
.hire-weight{display:inline-flex;gap:3px;}
.hire-weight i{width:8px;height:8px;border-radius:2px;background:var(--cream-shadow);}
.hire-weight i.on{background:var(--maker);}
/* step 2 — federation grid */
.hire-fed{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;}
.hire-fedcard{border:1px solid var(--hairline);border-radius:var(--radius-md);background:var(--paper);padding:12px;
  display:flex;flex-direction:column;gap:8px;}
.hire-fedcard.inflight{border-style:dashed;background:var(--cream-deep);}
.hire-fedcard-top{display:flex;align-items:center;gap:9px;}
.hire-fedcard-nm{font-size:12.5px;font-weight:600;}
.hire-fedcard-slug{font-family:var(--mono);font-size:10px;color:var(--ink-35);}
.hire-fed-state{font-family:var(--mono);font-size:10.5px;display:flex;align-items:center;gap:6px;}
.hire-fed-state.done{color:var(--ok);}
.hire-fed-pill{font-family:var(--mono);font-size:10px;color:var(--warn);border:1px solid rgba(181,130,26,.3);
  background:rgba(181,130,26,.08);border-radius:999px;padding:3px 9px;align-self:flex-start;}
/* step 3 — leaderboard */
.hire-board{display:flex;flex-direction:column;gap:8px;}
.hire-row{border:1px solid var(--hairline);border-radius:var(--radius-md);background:var(--paper);overflow:hidden;}
.hire-row.win{border-color:var(--rasp-15);}
.hire-row-head{display:grid;grid-template-columns:auto auto 1fr auto auto;align-items:center;gap:12px;
  padding:11px 14px;cursor:pointer;width:100%;text-align:left;background:none;border:none;font:inherit;}
.hire-row-head:hover{background:var(--cream-deep);}
.hire-rank{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--ink-35);width:22px;}
.hire-row.win .hire-rank{color:var(--rasp);}
.hire-row-nm{font-size:13px;font-weight:600;}
.hire-row-slug{font-family:var(--mono);font-size:10px;color:var(--ink-35);}
.hire-row-pitch{font-size:11.5px;color:var(--ink-60);}
.hire-row-score{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--ink);}
.hire-row-score .k{font-size:9px;font-weight:400;color:var(--ink-35);display:block;text-transform:uppercase;letter-spacing:.04em;}
.hire-row-caret{font-size:11px;color:var(--ink-35);transition:transform var(--motion-fast);}
.hire-row.open .hire-row-caret{transform:rotate(90deg);}
.win-tag{font-family:var(--mono);font-size:8.5px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--rasp);border:1px solid var(--rasp-15);border-radius:999px;padding:2px 7px;}
.hire-eval{border-top:1px solid var(--hairline-soft);padding:16px 14px;display:grid;grid-template-columns:auto 1fr;gap:20px;}
.hire-eval-radar{display:flex;flex-direction:column;align-items:center;gap:6px;}
.hire-eval-radar-cap{font-family:var(--mono);font-size:9px;color:var(--ink-35);text-transform:uppercase;letter-spacing:.04em;}
.hire-prosc{display:flex;flex-direction:column;gap:12px;min-width:0;}
.hire-pc-h{font-family:var(--mono);font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px;}
.hire-pc-h.pro{color:var(--ok);}
.hire-pc-h.con{color:var(--warn);}
.hire-pc-li{font-size:12px;color:var(--ink);line-height:1.5;padding-left:14px;position:relative;margin-bottom:3px;}
.hire-pc-li::before{content:'›';position:absolute;left:2px;color:var(--ink-35);}
.hire-work{margin-top:6px;}
.hire-work-h{font-family:var(--mono);font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-60);margin-bottom:6px;}
details.hire-pw{border:1px solid var(--hairline);border-radius:var(--radius-sm);margin-bottom:6px;background:var(--cream-deep);}
details.hire-pw>summary{list-style:none;cursor:pointer;padding:8px 11px;display:flex;align-items:center;gap:9px;font-size:11.5px;}
details.hire-pw>summary::-webkit-details-marker{display:none;}
.hire-pw-type{font-family:var(--mono);font-size:8.5px;letter-spacing:.04em;text-transform:uppercase;
  color:var(--ink-60);border:1px solid var(--hairline);border-radius:3px;padding:1px 6px;background:var(--paper);}
.hire-pw-title{font-family:var(--mono);font-size:11px;color:var(--ink);}
.hire-pw-link{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--rasp);}
.hire-pw-body{padding:0 11px 11px;}
.hire-pw-code{font-family:var(--mono);font-size:11px;line-height:1.6;color:var(--cream);background:var(--ink);
  border-radius:var(--radius-sm);padding:10px 12px;white-space:pre-wrap;word-break:break-word;}
.hire-compare-bar{display:flex;align-items:center;gap:10px;margin:14px 0 6px;}
.hire-compare-toggle{font-family:var(--mono);font-size:11px;cursor:pointer;border:1px solid var(--hairline);
  background:var(--paper);border-radius:var(--radius-sm);padding:6px 12px;color:var(--ink-60);}
.hire-compare-toggle.on{background:var(--ink);color:var(--cream);border-color:var(--ink);}
.hire-h2h{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px;}
.hire-h2h-col{border:1px solid var(--hairline);border-radius:var(--radius-md);background:var(--paper);padding:13px;}
.hire-h2h-nm{font-size:12.5px;font-weight:600;margin-bottom:2px;}
.hire-h2h-slug{font-family:var(--mono);font-size:10px;color:var(--ink-35);margin-bottom:10px;}
/* step 4 — hire the pair */
.hire-pair{display:flex;align-items:stretch;gap:0;border:1px solid var(--rasp-15);border-radius:var(--radius-md);overflow:hidden;}
.hire-pair-half{flex:1;padding:16px;display:flex;flex-direction:column;gap:7px;background:var(--paper);}
.hire-pair-tie{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 10px;
  background:var(--cream-deep);font-family:var(--mono);font-size:10px;color:var(--ink-35);border-left:1px solid var(--hairline-soft);border-right:1px solid var(--hairline-soft);}
.hire-pair-role{font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-35);}
.hire-pair-nm{font-size:13.5px;font-weight:600;}
.hire-pair-slug{font-family:var(--mono);font-size:11px;color:var(--maker);}
.hire-pair-slug.chk{color:var(--checker);}
.hire-pair-note{font-size:12px;color:var(--ink-60);line-height:1.5;margin-top:10px;}
/* step 5 — onboard checklist */
.hire-onb{display:flex;flex-direction:column;gap:9px;}
.hire-onb-item{display:flex;gap:11px;align-items:flex-start;border:1px solid var(--hairline);
  border-radius:var(--radius-md);padding:12px 14px;background:var(--paper);}
.hire-onb-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--ok);color:var(--ok);
  display:flex;align-items:center;justify-content:center;font-size:11px;flex:none;margin-top:1px;}
.hire-onb-k{font-size:12.5px;font-weight:600;margin-bottom:3px;}
.hire-onb-d{font-size:11.5px;color:var(--ink-60);line-height:1.5;}
.hire-onb-d a{color:var(--rasp);text-decoration:none;}
.hire-onb-d ul{margin:5px 0 0;padding-left:16px;}
.hire-onb-d li{margin-bottom:2px;}
.hire-done-banner{margin-top:18px;padding:13px 16px;border-left:2px solid var(--ok);background:rgba(45,125,79,.06);
  font-size:12.5px;color:var(--ink);border-radius:0 var(--radius-sm) var(--radius-sm) 0;}

/* ── #/marketplace ── */
.mkt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:11px;}
.mkt-card-link{text-decoration:none;color:inherit;display:block;position:relative;}
.mkt-card-link .cc{transition:border-color var(--motion-fast);height:100%;}
.mkt-card-link:hover .cc{border-color:var(--ink-35);}
.mkt-card-badges{position:absolute;top:9px;right:10px;display:flex;gap:5px;align-items:center;z-index:1;}
.mkt-health{font-family:var(--mono);font-size:8.5px;letter-spacing:.04em;text-transform:uppercase;padding:2px 6px;border-radius:999px;white-space:nowrap;}
.mkt-health--active{color:var(--ok);background:rgba(45,125,79,.08);}
.mkt-health--checker-flagged{color:var(--warn);background:rgba(181,130,26,.1);}
.mkt-health--benched{color:var(--ink-35);background:var(--cream-shadow);}
.mkt-skill{border:1px solid var(--hairline);border-radius:var(--radius-md);background:var(--paper);padding:13px;
  display:flex;flex-direction:column;gap:6px;}
.mkt-skill-top{display:flex;align-items:center;gap:8px;justify-content:space-between;}
.mkt-skill-nm{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--ink);}
.mkt-skill-blurb{font-size:11.5px;color:var(--ink-60);line-height:1.45;}
.mkt-skill-owner{font-family:var(--mono);font-size:10px;color:var(--ink-35);}
.mkt-hirecta{margin:22px 0 4px;display:inline-flex;align-items:center;gap:8px;text-decoration:none;
  font-family:var(--mono);font-size:12px;color:var(--rasp);border:1px solid var(--rasp-15);border-radius:var(--radius-sm);padding:9px 15px;}
.mkt-hirecta:hover{background:var(--rasp-08);}

/* ── #/agent/:slug — resume + ops tabs ── */
.ops-tabs{display:flex;gap:3px;border-bottom:1px solid var(--hairline);margin:18px 0 20px;}
.ops-tab{font-family:var(--mono);font-size:11.5px;text-decoration:none;color:var(--ink-60);padding:9px 15px;
  border-bottom:2px solid transparent;margin-bottom:-1px;}
.ops-tab:hover{color:var(--ink);}
.ops-tab.sel{color:var(--ink);border-bottom-color:var(--rasp);font-weight:600;}
.ops-resume{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:start;}
.ops-id{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.ops-id-nm{font-family:var(--mono);font-size:18px;font-weight:600;}
.ops-id-arch{font-family:var(--mono);font-size:10px;color:var(--ink-35);text-transform:uppercase;letter-spacing:.05em;}
.ops-meta{display:flex;flex-direction:column;gap:13px;}
.ops-field-k{font-family:var(--mono);font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-35);margin-bottom:3px;}
.ops-field-v{font-size:12.5px;color:var(--ink);line-height:1.5;}
.ops-field-v code{font-family:var(--mono);font-size:11.5px;background:var(--cream-deep);padding:1px 5px;border-radius:3px;}
.ops-pairlink{font-family:var(--mono);font-size:12px;color:var(--checker);text-decoration:none;}
.ops-pairlink:hover{text-decoration:underline;}
.ops-radar-card{border:1px solid var(--hairline);border-radius:var(--radius-md);background:var(--paper);
  padding:14px;display:flex;flex-direction:column;align-items:center;gap:7px;}
.ops-radar-cap{font-family:var(--mono);font-size:9px;color:var(--ink-35);text-transform:uppercase;letter-spacing:.04em;}
.ops-track{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;}
.ops-stat{border:1px solid var(--hairline);border-radius:var(--radius-md);background:var(--cream-deep);padding:11px 15px;min-width:96px;}
.ops-stat-n{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--ink);}
.ops-stat-k{font-family:var(--mono);font-size:9.5px;color:var(--ink-35);text-transform:uppercase;letter-spacing:.04em;margin-top:2px;}
.ops-sample{margin-top:18px;}
.ops-sample-body{font-family:var(--mono);font-size:11px;line-height:1.6;color:var(--cream);background:var(--ink);
  border-radius:var(--radius-sm);padding:12px 14px;white-space:pre-wrap;}
.ops-vers{display:flex;flex-direction:column;gap:0;border:1px solid var(--hairline-soft);border-radius:var(--radius-md);overflow:hidden;}
.ops-ver{display:grid;grid-template-columns:auto auto 1fr;gap:14px;align-items:baseline;padding:11px 15px;background:var(--paper);border-bottom:1px solid var(--hairline-soft);}
.ops-ver:last-child{border-bottom:none;}
.ops-ver-sha{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--rasp);}
.ops-ver-at{font-family:var(--mono);font-size:10px;color:var(--ink-35);white-space:nowrap;}
.ops-ver-note{font-size:12px;color:var(--ink);line-height:1.45;}
.ops-mon{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:start;}
.ops-mon-spark{border:1px solid var(--hairline);border-radius:var(--radius-md);background:var(--paper);padding:14px;}
.ops-mon-spark-h{font-family:var(--mono);font-size:9.5px;color:var(--ink-35);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;}
.ops-runs{display:flex;flex-direction:column;gap:0;border:1px solid var(--hairline-soft);border-radius:var(--radius-md);overflow:hidden;margin-top:16px;}
.ops-run{display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;padding:9px 14px;background:var(--paper);border-bottom:1px solid var(--hairline-soft);}
.ops-run:last-child{border-bottom:none;}
.ops-run-id{font-family:var(--mono);font-size:11px;color:var(--ink-60);}
.ops-run-when{font-family:var(--mono);font-size:10px;color:var(--ink-35);}
.ops-run-st{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.04em;padding:2px 7px;border-radius:999px;}
.ops-run-st--done{color:var(--ok);background:rgba(45,125,79,.08);}
.ops-run-st--flagged{color:var(--warn);background:rgba(181,130,26,.1);}
.ops-replay{font-family:var(--mono);font-size:11px;color:var(--rasp);text-decoration:none;border:1px solid var(--rasp-15);
  border-radius:var(--radius-sm);padding:6px 12px;display:inline-block;margin-top:14px;}
.ops-replay:hover{background:var(--rasp-08);}
.ops-mon-figs{display:flex;flex-direction:column;gap:10px;}

/* ── #/skills/new ── */
.sk-frame{max-width:560px;}
.sk-one{margin:6px 0 18px;}
.sk-vis{display:flex;gap:10px;margin-top:14px;}
.sk-vis-btn{flex:1;text-decoration:none;border:1px solid var(--hairline);border-radius:var(--radius-md);
  padding:14px;background:var(--paper);color:inherit;display:flex;flex-direction:column;gap:5px;}
.sk-vis-btn:hover{border-color:var(--ink-35);}
.sk-vis-k{font-family:var(--mono);font-size:12px;font-weight:600;}
.sk-vis-d{font-size:11px;color:var(--ink-60);line-height:1.45;}
.sk-vis-tag{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-35);}
.sk-confirm{border:1px solid var(--ok);border-radius:var(--radius-md);background:rgba(45,125,79,.05);padding:16px;}
.sk-confirm-h{font-family:var(--mono);font-size:12px;color:var(--ok);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sk-catcard{border:1px solid var(--hairline);border-radius:var(--radius-md);background:var(--paper);padding:14px;display:flex;flex-direction:column;gap:7px;}
.sk-promote{margin-top:14px;font-family:var(--mono);font-size:11px;color:var(--ink-35);border:1px dashed var(--hairline);
  border-radius:var(--radius-sm);padding:8px 12px;display:inline-block;}
.sk-back{display:inline-block;margin-top:16px;font-family:var(--mono);font-size:11px;color:var(--ink-60);text-decoration:none;}

/* ── #/layer2 ── */
.l2-nav{display:flex;gap:7px;margin:2px 0 22px;flex-wrap:wrap;}
.l2-navbtn{font-family:var(--mono);font-size:11px;cursor:pointer;border:1px solid var(--hairline);background:var(--paper);
  border-radius:999px;padding:5px 13px;color:var(--ink-60);}
.l2-navbtn:hover{border-color:var(--ink-35);color:var(--ink);}
.l2-section{margin-bottom:34px;scroll-margin-top:12px;}
.l2-contracts{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;}
.l2-contract{border:1px solid var(--hairline);border-radius:var(--radius-md);background:var(--paper);padding:13px;
  display:flex;flex-direction:column;gap:7px;}
.l2-contract--cross{background:var(--cream-deep);}
.l2-ct-top{display:flex;align-items:center;gap:8px;justify-content:space-between;}
.l2-ct-nm{font-family:var(--mono);font-size:12.5px;font-weight:600;color:var(--ink);}
.l2-ct-kind{font-family:var(--mono);font-size:8.5px;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border-radius:999px;white-space:nowrap;}
.l2-ct-kind--chain{color:var(--maker);background:rgba(59,91,176,.08);border:1px solid rgba(59,91,176,.2);}
.l2-ct-kind--cross{color:var(--checker);background:rgba(107,71,176,.08);border:1px solid rgba(107,71,176,.2);}
.l2-ct-purpose{font-size:11.5px;color:var(--ink-60);line-height:1.45;}
.l2-ct-sig{font-family:var(--mono);font-size:10px;color:var(--ink-35);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.l2-ct-sig .ar{color:var(--rasp);}
.l2-chain-wrap{border:1px solid var(--hairline);border-radius:var(--radius-md);background:var(--paper);padding:18px 16px;overflow-x:auto;}
.l2-chain-note{font-family:var(--mono);font-size:10.5px;color:var(--ink-60);margin-top:12px;}
.l2-chain-note .now{color:var(--rasp);}
.l2-portfolio{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}
.l2-proj{border:1px solid var(--hairline);border-radius:var(--radius-md);background:var(--paper);padding:14px;}
.l2-proj-nm{font-size:12.5px;font-weight:600;margin-bottom:9px;line-height:1.3;}
.l2-proj-figs{display:flex;gap:16px;}
.l2-proj-fig-n{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--ink);}
.l2-proj-fig-k{font-family:var(--mono);font-size:9px;color:var(--ink-35);text-transform:uppercase;letter-spacing:.04em;margin-top:1px;}
.l2-proj-status{font-family:var(--mono);font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--ok);
  background:rgba(45,125,79,.08);border-radius:999px;padding:2px 8px;display:inline-block;margin-bottom:9px;}

/* ── RadarChart + Sparkline (data-driven inline SVG · M9/E5 idiom · no vt- name) ── */
.svg-radar{display:block;}
.svg-radar-grid{fill:none;stroke:var(--hairline);stroke-width:1;}
.svg-radar-axis{stroke:var(--hairline);stroke-width:1;}
.svg-radar-poly{fill:var(--rasp-15);stroke:var(--rasp);stroke-width:1.5;stroke-linejoin:round;}
.svg-radar-dot{fill:var(--rasp);}
.svg-radar-lbl{font-family:var(--mono);font-size:8px;fill:var(--ink-60);}
.svg-radar-val{font-family:var(--mono);font-size:7.5px;fill:var(--ink-35);}
.svg-spark{display:block;}
.svg-spark-line{fill:none;stroke:var(--rasp);stroke-width:1.5;stroke-linejoin:round;stroke-linecap:round;}
.svg-spark-area{fill:var(--rasp-08);stroke:none;}
.svg-spark-base{stroke:var(--hairline);stroke-width:1;stroke-dasharray:2 3;}
.svg-spark-lbl{font-family:var(--mono);font-size:8px;fill:var(--ink-35);}
.svg-spark-dot{fill:var(--rasp);}
@media (max-width:760px){
  .ops-resume,.ops-mon{grid-template-columns:1fr;}
  .hire-eval{grid-template-columns:1fr;}
  .hire-h2h{grid-template-columns:1fr;}
}

/* ════════════════════════════════════════════════════════════════════════
   5a — Board arc · ticket · decision artifact · trail · dial. Greppable
   per-surface prefixes: board-* (the shared board) · ticket-* (CAST-412) ·
   dec-* (decision artifact + trail page; EXTENDS the 2b ladder's dec- classes
   with new suffixes, never redefining them). No vt- name introduced — these
   render inside the existing shell zone wrappers (Contract 8).
   ════════════════════════════════════════════════════════════════════════ */
/* ── #/board ── */
.board-topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin:2px 0 16px;flex-wrap:wrap;}
.board-frame-line{font-size:12px;color:var(--ink-60);line-height:1.5;max-width:560px;}
.board-frame-line b{color:var(--ink);font-weight:600;}
.board-esc-inbox{display:inline-flex;align-items:center;gap:7px;text-decoration:none;white-space:nowrap;
  font-family:var(--mono);font-size:11.5px;color:var(--rasp);background:var(--rasp-08);
  border:1px solid var(--rasp-15);border-radius:999px;padding:6px 12px;}
.board-esc-inbox:hover{background:var(--rasp-15);}
.board-esc-inbox .n{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;
  border-radius:999px;background:var(--rasp);color:var(--paper);font-weight:600;font-size:10px;padding:0 4px;}
.board-cols{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-items:start;}
.board-col{background:var(--cream-deep);border:1px solid var(--hairline-soft);border-radius:var(--radius-md);padding:10px;min-height:80px;}
.board-col-head{display:flex;align-items:center;justify-content:space-between;font-family:var(--mono);font-size:10px;
  letter-spacing:.05em;text-transform:uppercase;color:var(--ink-60);margin:2px 4px 10px;}
.board-col-head .n{color:var(--ink-35);}
.board-col-body{display:flex;flex-direction:column;gap:9px;}
.board-col-empty{font-family:var(--mono);font-size:10.5px;color:var(--ink-35);padding:8px 4px;}
.board-card{display:block;text-decoration:none;color:inherit;background:var(--paper);border:1px solid var(--hairline);
  border-radius:var(--radius-md);padding:11px 11px 9px;}
.board-card:hover{border-color:var(--ink-35);}
.board-card--l3{border-left:3px solid var(--rasp);}
.board-card-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px;}
.board-card-id{font-family:var(--mono);font-size:10.5px;color:var(--ink-35);}
.board-card-title{font-size:13px;line-height:1.35;color:var(--ink);margin-bottom:9px;}
/* the board card embeds a line-density ColleagueCard for the assignee — a thin border-top sets it off */
.board-card-who{border-top:1px solid var(--hairline-soft);padding-top:8px;}
/* ── #/ticket/CAST-412 ── */
.ticket-head{margin:2px 0 18px;}
.ticket-crumb{font-family:var(--mono);font-size:11px;color:var(--ink-60);margin-bottom:8px;}
.ticket-crumb a{color:var(--rasp);text-decoration:none;}
.ticket-title-row{display:flex;align-items:baseline;gap:11px;flex-wrap:wrap;margin-bottom:14px;}
.ticket-id{font-family:var(--mono);font-size:12px;color:var(--ink-35);}
.ticket-title{font-family:var(--mono);font-weight:600;font-size:21px;letter-spacing:-.3px;color:var(--ink);}
.ticket-lock{display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:var(--cream-deep);
  border:1px solid var(--hairline-soft);border-radius:var(--radius-md);padding:11px 14px;}
.ticket-pair{display:flex;align-items:center;gap:9px;}
.ticket-pair-tie{color:var(--ink-35);font-family:var(--mono);}
.ticket-pair-who{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:12px;color:var(--ink);text-decoration:none;}
a.ticket-pair-who:hover{color:var(--rasp);}
a.ticket-pair-who:hover .av{box-shadow:0 0 0 2px var(--rasp);}
.ticket-pair-role{font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-35);}
.ticket-rw{display:flex;align-items:center;gap:7px;margin-left:auto;}
.ticket-rw-seg{width:20px;height:6px;border-radius:2px;background:var(--cream-shadow);display:inline-block;}
.ticket-rw-seg--used{background:var(--warn);}
.ticket-rw-lbl{font-family:var(--mono);font-size:10.5px;color:var(--ink-60);}
.ticket-sect-h{font-family:var(--mono);font-size:11px;color:var(--ink-60);margin:22px 0 10px;letter-spacing:.02em;}
.ticket-declog{display:flex;flex-direction:column;gap:8px;border:1px solid var(--hairline);border-radius:var(--radius-md);
  background:var(--paper);padding:13px 14px;}
.ticket-declog-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:6px 0;border-top:1px solid var(--hairline-soft);}
.ticket-declog-row:first-child{border-top:none;}
.ticket-declog-when{font-family:var(--mono);font-size:10px;color:var(--ink-35);min-width:42px;}
.ticket-nextlink{font-family:var(--mono);font-size:11px;color:var(--rasp);text-decoration:none;margin-left:auto;white-space:nowrap;}
.ticket-nextlink:hover{text-decoration:underline;}
.ticket-foot{margin-top:18px;border-top:1px dashed var(--hairline);padding-top:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.ticket-prlink{display:inline-flex;align-items:center;gap:7px;text-decoration:none;font-family:var(--mono);font-size:12px;
  color:var(--ink);border:1px solid var(--hairline);border-radius:var(--radius-sm);padding:7px 12px;background:var(--paper);}
.ticket-prlink:hover{border-color:var(--rasp);color:var(--rasp);}
.ticket-foot-why{font-size:11px;color:var(--ink-35);}
/* ── #/decision/:atomId — the artifact frame ── */
.dec-frame{max-width:760px;}
.dec-frame-crumb{font-family:var(--mono);font-size:11px;color:var(--ink-60);margin-bottom:10px;}
.dec-frame-crumb a{color:var(--rasp);text-decoration:none;}
.dec-frame-head{display:flex;align-items:flex-start;gap:11px;margin-bottom:6px;}
.dec-frame-title{font-family:var(--mono);font-weight:600;font-size:18px;line-height:1.3;letter-spacing:-.2px;color:var(--ink);}
.dec-frame-diff{font-family:var(--mono);font-size:12.5px;color:var(--ink);background:var(--cream-deep);
  border:1px solid var(--hairline-soft);border-radius:var(--radius-sm);padding:7px 11px;margin:8px 0 16px;display:inline-block;}
.dec-rec{display:flex;flex-direction:column;border:1px solid var(--hairline);border-radius:var(--radius-md);background:var(--paper);overflow:hidden;}
.dec-rec-row{display:grid;grid-template-columns:120px 1fr;gap:14px;padding:11px 15px;border-top:1px solid var(--hairline-soft);}
.dec-rec-row:first-child{border-top:none;}
.dec-rec-k{font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-35);padding-top:1px;}
.dec-rec-v{font-size:12.5px;color:var(--ink);line-height:1.5;min-width:0;}
.dec-rec-v a{color:var(--rasp);text-decoration:none;}
.dec-rec-v a:hover{text-decoration:underline;}
.dec-rec-opt{display:flex;gap:8px;align-items:baseline;padding:3px 0;}
.dec-rec-opt-mark{font-family:var(--mono);font-size:11px;color:var(--ink-35);width:13px;flex:none;}
.dec-rec-opt--chosen{font-weight:600;}
.dec-rec-opt--chosen .dec-rec-opt-mark{color:var(--ok);}
.dec-rec-opt-conseq{color:var(--ink-60);}
.dec-rec-meta{font-family:var(--mono);font-size:10.5px;color:var(--ink-60);}
.dec-esc-band{margin:22px 0 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.dec-esc-band-h{font-family:var(--mono);font-size:11px;color:var(--rasp);letter-spacing:.02em;}
.dec-esc-backlink{font-family:var(--mono);font-size:11.5px;color:var(--rasp);text-decoration:none;
  border:1px solid var(--rasp-15);border-radius:999px;padding:5px 12px;background:var(--rasp-08);cursor:pointer;}
.dec-esc-backlink:hover{background:var(--rasp-15);}
.dec-status-chip{font-family:var(--mono);font-size:9px;letter-spacing:.05em;text-transform:uppercase;
  padding:2px 8px;border-radius:999px;border:1px solid var(--hairline);color:var(--ink-60);background:var(--cream-deep);}
/* ── #/decisions/:goalId — the diff-first trail page + dial + digest ── */
.dec-trailpage{max-width:820px;}
.dec-dialhead{border:1px solid var(--hairline);border-radius:var(--radius-md);background:var(--paper);padding:16px 16px 6px;margin-bottom:16px;}
.dec-dialhead-top{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px;}
.dec-dialhead-h{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--ink);}
.dec-dialhead-sub{font-size:11px;color:var(--ink-35);}
.dec-pinned{border:1px solid var(--rasp-15);border-left:3px solid var(--rasp);border-radius:var(--radius-md);
  background:var(--rasp-08);padding:14px 16px;margin-bottom:16px;}
.dec-pinned-top{display:flex;align-items:center;gap:9px;margin-bottom:7px;flex-wrap:wrap;}
.dec-pinned-badge{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.04em;
  border:1px solid var(--rasp);color:var(--rasp);border-radius:999px;padding:1px 7px;}
.dec-pinned-now{font-family:var(--mono);font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:var(--rasp);}
.dec-pinned-title{font-family:var(--mono);font-size:13.5px;font-weight:600;color:var(--ink);margin-bottom:4px;}
.dec-pinned-diff{font-family:var(--mono);font-size:11.5px;color:var(--ink-60);margin-bottom:8px;}
.dec-pinned-cond{font-size:12px;color:var(--ink-60);line-height:1.5;margin-bottom:11px;}
.dec-pinned-cond b{color:var(--ink);}
.dec-pinned-confirm{font-family:var(--mono);font-size:11.5px;cursor:pointer;border:1px solid var(--rasp);
  background:var(--rasp);color:var(--paper);border-radius:var(--radius-sm);padding:7px 14px;font-weight:600;}
.dec-pinned-confirm:hover{filter:brightness(1.05);}
.dec-pinned-foot{font-family:var(--mono);font-size:9.5px;color:var(--ink-35);margin-top:9px;}
.dec-filterbar{display:flex;flex-direction:column;gap:9px;margin:16px 0;}
.dec-filtergrp{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.dec-filtergrp-k{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-35);min-width:48px;}
.dec-rowlink{display:block;text-decoration:none;color:inherit;}
.dec-rowlink:hover .dec-row{background:var(--cream-deep);}
.dec-trail-empty{font-family:var(--mono);font-size:11.5px;color:var(--ink-35);padding:14px;text-align:center;
  border:1px dashed var(--hairline);border-radius:var(--radius-md);}
/* the board assignee filter renders facet chips as <button>s (appState-driven, not hash) — give the
   button element the cursor/font the anchor variant gets for free */
button.facet-chip{cursor:pointer;font-family:var(--mono);font-size:11px;}
@media (max-width:760px){ .board-cols{grid-template-columns:repeat(2,1fr);} .dec-rec-row{grid-template-columns:1fr;gap:3px;} }

/* ════════════════════════════════════════════════════════════════════════
   5c — #/reqs/:goalId · the US7 requirements-doc loop (reqs-* prefix). The L1/L2/L3
   COLLISION RULE is enforced here in CSS: HIERARCHY depth is purely TYPOGRAPHIC
   (reqs-lvl1/2/3 — size · weight · indent), it never borrows an L-badge; the only
   L1/L2/L3 badges on this screen ride the decision chips (dec-* / LBadge), always
   ⚖-prefixed. Token-only colors; no view-transition-name. ════════════════════════ */
.reqs-doc{max-width:780px;}
/* header — classification pill + version chip + version-history popover + title */
.reqs-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
.reqs-class{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;color:var(--ink-60);background:var(--cream-deep);
  border:1px solid var(--hairline);border-radius:999px;padding:3px 10px;}
.reqs-verpop{position:relative;}
.reqs-vchip{list-style:none;cursor:pointer;font-family:var(--mono);font-size:11px;font-weight:600;
  color:var(--ink);border:1px solid var(--hairline);border-radius:999px;padding:3px 9px;
  display:inline-flex;align-items:center;}
.reqs-vchip::-webkit-details-marker{display:none;}
.reqs-vchip:hover{border-color:var(--ink-35);}
.reqs-disc-caret{color:var(--ink-35);font-size:9px;}
.reqs-verpop[open] .reqs-vchip{border-color:var(--ink-35);}
.reqs-verpop-body{position:absolute;top:calc(100% + 6px);left:0;z-index:20;width:288px;
  border:1px solid var(--hairline);border-radius:var(--radius-md);background:var(--paper);
  box-shadow:0 12px 30px -12px rgba(26,26,40,.3),0 2px 6px rgba(26,26,40,.06);padding:12px 14px;}
.reqs-verpop-h{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.06em;
  text-transform:uppercase;color:var(--ink-35);margin-bottom:9px;}
.reqs-ver{padding:7px 0;border-top:1px solid var(--hairline-soft);}
.reqs-ver:first-of-type{border-top:none;}
.reqs-ver-top{display:flex;align-items:baseline;gap:8px;}
.reqs-ver-v{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--ink);}
.reqs-ver.is-current .reqs-ver-v{color:var(--maker);}
.reqs-ver-d{font-family:var(--mono);font-size:10px;color:var(--ink-35);}
.reqs-ver-sum{font-size:11.5px;color:var(--ink-60);line-height:1.45;margin-top:3px;}
.reqs-title{font-family:var(--mono);font-weight:600;font-size:21px;letter-spacing:-.4px;color:var(--ink);margin:0;}
.reqs-goalid{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.05em;color:var(--ink-35);}
/* write-back notice — reuses DigestNotice; the bar carries the deltaView CTA */
.reqs-writeback{margin-bottom:18px;}
.reqs-wb-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-top:8px;}
.reqs-wb-origin{font-family:var(--mono);font-size:11px;color:var(--ink-60);}
.reqs-wb-origin b{color:var(--ink);}
.reqs-wb-cta{cursor:pointer;font-family:var(--mono);font-size:11.5px;font-weight:600;color:var(--paper);
  background:var(--ink);border:1px solid var(--ink);border-radius:var(--radius-sm);padding:6px 13px;}
.reqs-wb-cta:hover{filter:brightness(1.12);}
.reqs-wb-cta:focus-visible{outline:2px solid var(--maker);outline-offset:2px;}
/* delta review — diff-first, the decision-trail row grammar (diff LEADS the row) */
.reqs-delta{border:1px solid var(--hairline);border-radius:var(--radius-md);background:var(--paper);
  overflow:hidden;margin-bottom:20px;}
.reqs-delta-h{font-family:var(--mono);font-size:11px;color:var(--ink-60);background:var(--cream-deep);
  padding:9px 14px;border-bottom:1px solid var(--hairline);}
.reqs-delta-row{display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:baseline;
  padding:9px 14px;border-top:1px solid var(--hairline-soft);}
.reqs-delta-row:first-child{border-top:none;}
.reqs-delta-diff{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--ink);}
.reqs-delta-anchor{cursor:pointer;font-family:var(--mono);font-size:10.5px;font-weight:600;color:var(--maker);
  background:none;border:none;padding:0;text-decoration:underline;text-decoration-color:var(--hairline);text-underline-offset:2px;}
.reqs-delta-anchor:hover{text-decoration-color:var(--maker);}
.reqs-delta-origin{font-family:var(--mono);font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-35);}
/* the element hierarchy — DEPTH IS TYPOGRAPHIC, never an L-badge */
.reqs-body{border:1px solid var(--hairline);border-radius:var(--radius-md);background:var(--paper);padding:18px 20px;}
.reqs-node{padding:4px 0;}
.reqs-row{display:flex;align-items:baseline;gap:10px;}
.reqs-kind{font-family:var(--mono);font-size:8.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
  color:var(--ink-35);border:1px solid var(--hairline-soft);border-radius:3px;padding:1px 5px;flex:none;
  position:relative;top:-1px;}
.reqs-text{color:var(--ink);line-height:1.5;}
/* level = typography. L1 lead · L2 mid · L3 fine — the ONLY signal of hierarchy depth. */
.reqs-lvl1 > .reqs-row > .reqs-text{font-size:16.5px;font-weight:600;letter-spacing:-.2px;}
.reqs-lvl2 > .reqs-row > .reqs-text{font-size:13.5px;font-weight:500;}
.reqs-lvl3 > .reqs-row > .reqs-text{font-size:12.5px;font-weight:400;color:var(--ink-60);}
.reqs-lvl1{margin-bottom:6px;}
.reqs-cmt-aff{cursor:pointer;font-family:var(--mono);font-size:10.5px;color:var(--ink-60);
  background:var(--cream);border:1px solid var(--hairline);border-radius:999px;padding:1px 8px;flex:none;
  align-self:center;}
.reqs-cmt-aff:hover,.reqs-cmt-aff.is-open{border-color:var(--maker);color:var(--maker);}
.reqs-cmt-aff:focus-visible{outline:2px solid var(--maker);outline-offset:2px;}
.reqs-chips{display:flex;flex-wrap:wrap;gap:7px;margin:7px 0 2px;}
/* nested disclosure — the guide rail makes the typographic indent legible */
.reqs-disc{margin:6px 0 2px;}
.reqs-disc-sum{list-style:none;cursor:pointer;font-family:var(--mono);font-size:10px;font-weight:600;
  letter-spacing:.04em;color:var(--ink-35);display:inline-flex;align-items:center;gap:5px;padding:2px 0;}
.reqs-disc-sum::-webkit-details-marker{display:none;}
.reqs-disc-sum:hover{color:var(--ink-60);}
.reqs-disc[open] > .reqs-disc-sum .reqs-disc-caret{transform:rotate(180deg);display:inline-block;}
.reqs-kids{margin:4px 0 4px 6px;padding-left:16px;border-left:1px solid var(--hairline-soft);}
/* anchored highlight — a comment/delta target; never animated (reduced-motion-safe) */
.reqs-node--anchored{box-shadow:inset 3px 0 0 var(--warn);background:var(--cream-deep);
  border-radius:var(--radius-sm);margin-left:-10px;padding-left:10px;}
/* the ONE PM-framed comment thread — side-anchored */
.reqs-thread{border:1px solid var(--hairline);border-left:3px solid var(--maker);border-radius:var(--radius-md);
  background:var(--cream);padding:11px 13px;margin:9px 0 6px;max-width:520px;}
.reqs-thread-head{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.reqs-thread-state{font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;}
.reqs-thread-state.is-open{color:var(--warn);}
.reqs-thread-state.is-resolved{color:var(--ok);}
.reqs-thread-toggle{cursor:pointer;font-family:var(--mono);font-size:10px;color:var(--ink-60);
  background:var(--paper);border:1px solid var(--hairline);border-radius:var(--radius-sm);padding:2px 8px;}
.reqs-thread-toggle:hover{border-color:var(--ink-35);}
.reqs-thread-x{cursor:pointer;margin-left:auto;font-size:15px;line-height:1;color:var(--ink-35);
  background:none;border:none;padding:0 2px;}
.reqs-thread-x:hover{color:var(--ink);}
.reqs-msg{display:flex;gap:9px;padding:7px 0;border-top:1px solid var(--hairline-soft);}
.reqs-msg:first-of-type{border-top:none;}
.reqs-msg-av{--avatar-size:22px;flex:none;}
.reqs-msg-meta{display:flex;align-items:baseline;gap:7px;flex-wrap:wrap;margin-bottom:2px;}
.reqs-msg-who{font-size:12px;font-weight:600;color:var(--ink);}
.reqs-msg-role{font-family:var(--mono);font-size:8.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;
  color:var(--ink-35);border:1px solid var(--hairline-soft);border-radius:3px;padding:0 5px;}
.reqs-msg-role.is-pm{color:var(--maker);border-color:var(--maker);}
.reqs-msg-time{font-family:var(--mono);font-size:9.5px;color:var(--ink-35);}
.reqs-msg-text{font-size:12.5px;color:var(--ink);line-height:1.5;}
/* in-flow entry link from the CAST-412 canvas requirements stage */
.reqs-canvas-link{display:inline-flex;flex-direction:column;gap:1px;margin-top:13px;
  font-family:var(--mono);font-size:12px;font-weight:600;color:var(--ink);text-decoration:none;
  border-top:1px dashed var(--hairline-soft);padding-top:11px;}
.reqs-canvas-link:hover{color:var(--maker);}
.reqs-canvas-sub{font-weight:400;font-size:10px;color:var(--ink-35);letter-spacing:.02em;}
@media (max-width:760px){ .reqs-delta-row{grid-template-columns:1fr;gap:3px;} }

     choose-*  the FR-002 scenario chooser (#/ bare route)

/* ── choose-* — the scenario chooser. A bare route: NO three-tier shell, so it renders

<body>
<div id="app"></div>

<!-- ── 2a.3: the DATA SPINE, loaded as a CLASSIC script BEFORE the inline module ──
     file:// forbids fetch() and local ES-module imports, so window.ORG must arrive via a
     classic <script src> (Phase 1 packaging contract #1). This tag MUST precede the module
     below so window.ORG exists when the module runs; if it is deleted or the file moves, the
     module renders a visible error banner instead of silently painting stubs. Never refactor
     this to fetch('org.json') — org.js's own header restates the same rule. -->
<script src="data/org.js"></script>

<script type="module">
import { render } from 'preact';
import { html } from 'htm/preact';
import { useState, useEffect } from 'preact/hooks';   // 2b.2b: 6B decision-callout popover (LOCAL UI state only — never appState)
import { driver } from 'driver.js';                   // 6.1: guided anatomy tours (Phase-1 import-map pin, deferred to here)

/* ════════════════════════════════════════════════════════════════════════
   2a.3 — SPINE BOOT. window.ORG (from the classic script above) is the single
   source of every canonical token this app renders. To keep the drift grep clean,
   NO canonical token (goal ids · checker rule codes · agent slugs · cred stats · org
   name · rework budget) is hand-typed in the Phase-1 app surface below — each is DERIVED from ORG.
   ════════════════════════════════════════════════════════════════════════ */
const ORG = window.ORG;
// Zero-silent-failure guard (Phase 1 dispatcher posture): if the spine did not load,
// paint a visible one-line banner and STOP — never fall through to stub rendering.
if (!ORG) {
  const app = document.getElementById('app');
  if (app) app.innerHTML =
    '<div role="alert" style="max-width:620px;margin:24px auto;padding:14px 18px;'
    + 'border:1px solid var(--rasp);border-left:4px solid var(--rasp);border-radius:var(--radius-md);'
    + 'background:var(--paper);color:var(--ink);font-family:var(--mono);font-size:13px;line-height:1.5;">'
    + '⚠ Diecast data spine not loaded — <b>window.ORG</b> is missing. '
    + 'index.html needs <code>&lt;script src="data/org.js"&gt;</code> to load <em>before</em> this module '
    + '(file:// forbids fetch/import, so the spine must arrive as a classic script first).'
    + '</div>';
  throw new Error('window.ORG missing — the classic <script src="data/org.js"> must precede the module.');
}

// ── Derived canonical handles (so no canonical literal is typed in this file). ──
const goalIdByFamily = {};
for (const [gid, g] of Object.entries(ORG.goals)) goalIdByFamily[g.family] = gid;
const FEATURE_ID = goalIdByFamily.feature;                 // resolves to the feature goal id
const FEATURE = ORG.goals[FEATURE_ID];
// the single flagged checker rule code on the feature E1 panel (resolved from ORG, never typed).
const FLAGGED_RULE = ((FEATURE.evidence?.E1?.checker_rows || []).find((r) => r.state === 'flagged') || {}).code || '';
// the locked morph atom = the feature goal's L2 execution decision (uniquely the classify-as-bug
// reclassification). Selected structurally so its id is never hand-typed in this file.
const MORPH_ATOM = ORG.decisions.find(
  (a) => a.goal_slug === FEATURE_ID && a.reversibility === 'L2' && a.phase === 'execution');

// ── Spine derivation (Contract 5 / 2c mapping rule). appState.spines.<family> keeps Phase 1's
//    shape EXACTLY: {placeholder, shape, steps:string[], current:<index>, iter?, timebox?}. Labels
//    derive via stageModels.<f>.steps.map(s => s.shortLabel ?? s.label); spine_state.current (a step
//    id) maps to the numeric index Phase 1's shape renderers expect. ──
function tbMinutes(s) {                                      // '1h40m' / '3h' / '40m' → minutes
  if (!s) return 0;
  let n = 0; const h = s.match(/(\d+)\s*h/); const m = s.match(/(\d+)\s*m/);
  if (h) n += +h[1] * 60; if (m) n += +m[1]; return n;
}
function deriveSpine(family) {
  const sm = ORG.stageModels[family];
  const ss = (ORG.goals[goalIdByFamily[family]] || {}).spine_state || {};
  const steps = sm.steps.map((s) => s.shortLabel ?? s.label);
  let current = sm.steps.findIndex((s) => s.id === ss.current);
  if (current < 0) current = 0;
  const spine = { placeholder: sm.placeholder, shape: sm.shape, steps, current };
  if (ss.iter) spine.iter = { ...ss.iter };
  if (sm.timebox) {
    const budgetMin = tbMinutes(sm.timebox.budget);
    const usedStr = ss.timebox_used || sm.timebox.used;
    const usedMin = tbMinutes(usedStr);
    // 4.1 error path (design review): used > budget is a DATA error — flag `over` so SpineTimebox
    // renders the fill in --fail + console.warns (never a silent clamp); an unparseable duration
    // string (parses to 0 but isn't literally a zero) renders raw + warns. Valid data → both false,
    // so the meter renders byte-identically to before.
    const over = budgetMin ? usedMin > budgetMin : false;
    const unparseable = !!usedStr && usedMin === 0 && !/\b0\s*[hm]/.test(usedStr);
    spine.timebox = {
      budget: sm.timebox.budget,
      used: usedStr,
      pct: budgetMin ? Math.round((usedMin / budgetMin) * 100) : 0,
      over,
      unparseable,
    };
  }
  return spine;
}

/* ── 3.4 MORPH PROJECTION (the real hero morph). When the feature goal (CAST-412) is viewed in
   the DEBUG shape, its post-reclassification state comes from goals[id].morph_view — NOT from the
   real debug goal (CAST-431). These two pure helpers build that projection so GoalCanvas renders
   the loop-band spine (iter 1/3) + the just-seeded investigation (the E2 seed) for the SAME goal,
   keeping header/crumb/chat untouched. State is READ from morph_view (the goal's own data is never
   rebuilt), so the scripted reverse restores the feature projection exactly (the undo proof). ── */
function deriveMorphSpine(goal) {                            // the debug loop-band spine for a morphed feature goal
  const sm = ORG.stageModels.debug;
  const mv = goal.morph_view || {};
  const steps = sm.steps.map((s) => s.shortLabel ?? s.label);
  const iter = (mv.spine_state && mv.spine_state.iter) || { current: 1, budget: 3 };
  // the loop's live position = the furthest step the seeded work stream reaches (dbg-03 here).
  const wsSteps = (mv.work_stream || []).map((w) => w.step);
  let current = 0;
  sm.steps.forEach((s, i) => { if (wsSteps.includes(s.id)) current = i; });
  return { placeholder: sm.placeholder, shape: sm.shape, steps, current, iter: { ...iter } };
}
function deriveMorphInvestigation(goal) {                    // a one-live-pass investigation from morph_view (reuses InvestigationLedger)
  const mv = goal.morph_view || {};
  const e2 = (mv.evidence && mv.evidence['E2-seed']) || { hypotheses: [] };
  const experiments = (mv.work_stream || []).map((w) => ({
    id: w.id, label: w.label, assignee: w.assignee, verdict: 'open',   // a fresh pass — nothing weighed yet
  }));
  return {
    investigation: { passes: [{
      n: 1, status: 'live',
      summary: 'Reclassified from feature. First pass on the coupon-apply 500.',
      experiments,
    }] },
    evidence: { E2: e2 },
  };
}

/* ════════════════════════════════════════════════════════════════════════
   appState (Contract 2 — v1). Phase 2a EXTENDS this; it must NOT rename keys.
   Placeholder spine vocabulary carries placeholder:true so later phases never
   mistake stub steps for the real Phase-2c per-family set.
   ════════════════════════════════════════════════════════════════════════ */
const appState = {
  // ── appState v1.1 (2a.3) — EXTENDS Phase 1's v1; no key renamed. `family` now ranges over
  //    all four families; `spines` gains spike+data (all four DERIVED from ORG.stageModels +
  //    spine_state); `goal` is populated from ORG.goals[id]; NEW key `org`; receipts gain a
  //    decision_id field (morph). Every value below comes from the spine — no canonical literal. ──
  route:   '#/goal/' + FEATURE_ID,   // mirror of location.hash, set by router (derived id)
  family:  'feature',                // 'feature' | 'debug' | 'spike' | 'data'
  org:     ORG,                      // v1.1: the frozen data spine (window.ORG)
  goal:    { id: FEATURE_ID, title: FEATURE.title, crumb: ORG.org.crumb },
  spines:  {                         // all four DERIVED from stageModels + the family goal's spine_state
    feature: deriveSpine('feature'),
    debug:   deriveSpine('debug'),
    spike:   deriveSpine('spike'),
    data:    deriveSpine('data'),
  },
  nudge:   { ...FEATURE.nudge },     // the feature goal's nudge (who/do/why) — was the Phase 1 stub
  receipts: [],                      // decision receipts, pushed by morph op (now derived from an atom)
  pinned:  [],                       // canvas objects created by promote/pin ops (1.2)
  drill:   null,                     // 'execution' | null — drillInto:execution target (1.2 / HOW; 3.2 fleshes it)
  // 3.1: stage-navigator focus. null = "current step" (default WHAT view); a step id =
  // the user-navigated step whose StageSurface renders. Set via drillInto:<step-id> (NO sixth op).
  stageFocus: null,
  // 4.2: the data L3 PRESENTATION OVERLAY (the one script-wired resolution in the prototype). false =
  // the unresolved at-rest E5 (◐-flagged, source-of-record only); true = the resolved_view re-render
  // (both series + reconciliation note). Additive flag — never renames a key; ORG is NOT mutated by the
  // resolution, and reload rebuilds appState → false → the unresolved state. (Mirrors 4.3's parityOpen.)
  dataResolved: false,
  // 4.3: the FR-017 three-access-tiers parity reveal (the spike flow's scripted beat). false = the
  // normal spike canvas; true = the side-by-side split (ink-dark terminal pane left, canvas/memo
  // right, chat rail alongside — three tiers, one substrate). Additive flag, toggled ONLY by
  // SCRIPTS.spike's patches — NOT a sixth op, NOT a drillInto target (the closed 5-op set stands).
  // ORG is never mutated; reload rebuilds appState → false → the normal canvas. (Mirrors dataResolved.)
  parityOpen: false,
  // 3.1 / PRF2: chat is keyed PER-GOAL — appState.chat.byGoal[goalId] = {messages, scriptIndex,
  // scriptKey}. Refines (does not rename) the Phase-1 `chat` contract: the keys live one level
  // deeper, under the goal id, so switching goals shows that goal's own thread. chatFor(id) lazily
  // seeds an entry (scriptKey = family). Reload rebuilds appState → resets cleanly.
  chat:    { byGoal: {} },
  // ── appState v1.2 (5.0) — Phase 5 additive keys; EXTENDS v1/v1.1, renames nothing. These are PLAIN
  //    UI state mutated by ordinary click handlers + re-render (NOT ops — the closed 5-op set stands;
  //    Phase 3's precedent of not minting ops for UI state). 5.0 only INITIALIZES them; the sub-streams
  //    wire the handlers (5a: boardFilter + autonomyLevel · 5b: hiring · 5c: reqsDoc). Reload rebuilds
  //    appState → these reset to their at-rest values. ──
  boardFilter:  'any',                                  // 'any' | 'human' | 'agent' | 'checker'  (5a board filter)
  hiring:       { step: 1, expanded: null, compare: false },   // 5b hiring-wizard state (step 1..5)
  autonomyLevel:'balanced',                             // 'conservative' | 'balanced' | 'autonomous'  (5a dial)
  reqsDoc:      { openComment: null, deltaView: false },// 5c reqs-doc disclosure/comment state
  // ── appState v1.3 (6.1) — the ONE additive key this whole phase (BINDING #6). The presenter
  //    demo-script overlay's open/closed flag. PLAIN UI state toggled by a click handler + the `s`
  //    key (NOT an op — the closed 5-op set stands; same posture as the Phase 3/5 UI flags). Reload
  //    rebuilds appState → false → the overlay starts closed. No other new appState/ORG top-level key. ──
  demoScriptOpen: false,
};
// expose for console verification (manual click-through, Constraint C1 — not a test).
window.appState = appState;

/* ════════════════════════════════════════════════════════════════════════
   Components — PascalCase. Layout references app-shell.html but markup is fresh.
   The five future view-transition anchors (Contract 5) are mounted as PERSISTENT
   structure now (stable wrappers), so 1.3 only adds CSS `view-transition-name`:
     .nav-rail → vt-nav-rail   .chat-rail → vt-chat-rail

   ════════════════════════════════════════════════════════════════════════ */

// family → short nav tag (the four families the spine carries).
const FAM_TAG = { feature: 'FEAT', debug: 'DEBUG', spike: 'SPIKE', data: 'DATA' };
function NavRail() {
  // 2a.3: the goal list renders from ORG.goals (all four ids resolve via the route guard) —
  // the selected row keys on the routed goal id. No goal id/title is hand-typed here.
  const goals = appState.org.goals;
  const curId = appState.goal.id;
  return html`
    <nav class="nav-rail" data-tour="nav">
      <a class="brand" href="#/">die<em>cast</em></a>
      <div class="tagline">cast to spec · no drift</div>
      <div class="rail-h">Goals</div>
      ${Object.entries(goals).map(([id, g]) => html`
        <a class=${'nav-goal' + (id === curId ? ' sel' : '')} href=${'#/goal/' + id}>
          <span class="fam">${FAM_TAG[g.family] || g.family}</span><span class="t">${g.title}</span>
        </a>`)}
      <div class="nav-spacer"></div>
      <div class="rail-h">Workspace</div>
      <a class="nav-goal" href="#/board"><span class="fam">▦</span><span class="t">Board</span></a>
      <a class="nav-goal" href="#/hire"><span class="fam">✦</span><span class="t">Hire</span></a>
      <a class="nav-goal" href="#/layer2"><span class="fam">⬡</span><span class="t">Layer-2</span></a>
      <!-- 6.1: the demo-script overlay toggle (the nav-footer control; the s key is the twin). -->
      <button class=${'demo-navbtn' + (appState.demoScriptOpen ? ' on' : '')} onClick=${toggleDemoScript}
        title="Presenter demo script">◇ Demo script <kbd>s</kbd></button>
    </nav>`;
}

function labelFor(from) {
  return ({ guide: '◈ Guide', you: 'You', narration: 'Narration', system: 'System' })[from] || 'Narration';
}

function ChatRail() {
  // PRF2: the rail reads the PER-GOAL chat (chatFor(goal)). Switching goals shows that goal's own
  // thread + scenario position; SCRIPTS[scriptKey] is the active script (only `feature` exists in 3.1).
  const c = chatFor(chatKey());           // 5b: '__hire' on the hiring funnel → SCRIPTS.hiring; goal id otherwise
  const scr = SCRIPTS[c.scriptKey] || [];
  const msgs = c.messages;
  const hasScript = scr.length > 0;
  const done = c.scriptIndex >= scr.length;
  // 2b.3: the rail header speaks in the LOCKED Guide voice — the GuideMark (ink diamond +
  // mono wordmark), no checker hue. The handle derives from the routed goal title (no
  // hand-typed canonical token — the 2a.3 drift rule). On the hiring funnel the handle reflects the arc.
  const onHire = chatKey() === '__hire';
  const handle = onHire ? 'hiring' : appState.goal.title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  return html`
    <aside class="chat-rail" data-tour="chat">
      <div class="chat-h">
        <${GuideMark} size=${20} wordmark=${true}/>
        <div class="s">${handle}</div>
      </div>
      <div class="chat-log">
        ${msgs.length === 0
          ? html`<div class="chat-empty">${hasScript
              ? html`Click <b>Next ▸</b> to walk the scripted demo.`
              : html`No scripted walkthrough for this goal yet.`}</div>`
          : msgs.map((m) => html`
              <div class=${'msg ' + (m.from || 'narration')}>
                <div class="mfrom">${labelFor(m.from)}</div>
                <div class="mtext">${m.text}</div>
                ${m.ops ? html`
                  <div class="mops">
                    ${m.ops.map((o) => html`<button class="opbtn" data-op=${o.op}>${o.label}</button>`)}
                  </div>` : null}
              </div>`)}
      </div>
      <!-- "Next ▸" is scenario-advance (NOT an op) — wired to advance() directly, kept
           visibly the same grammar as the data-op buttons it sits beside. -->
      <button class="next-btn" data-tour="advance" onClick=${advance} disabled=${!hasScript || done}>
        ${!hasScript ? 'No script for this goal' : (done ? 'Script complete · reload to replay' : 'Next ▸')}
      </button>
      <div class="chat-inp">Steer, ask, or override the Guide… ⏎</div>
    </aside>`;
}

function AppShell({ children }) {
  // Three-tier shell. NavRail + ChatRail are persistent chrome (rendered here, not
  // per-route); CanvasFrame is the only slot that swaps with the route. 6.1: the presenter
  // demo-script overlay (appState.demoScriptOpen) mounts here so it rides every shell route;
  // it returns null when closed, so it is inert until toggled.
  return html`
    <div class="shell">
      <${NavRail}/>
      <main id="canvas-frame" class="canvas-frame">${children}</main>
      <${ChatRail}/>
      <${DemoScriptOverlay}/>
    </div>`;
}

function GoalCanvas() {
  const goalId = appState.goal.id;
  const goal = appState.org.goals[goalId];
  const fam = appState.family;
  // 3.4: MORPHED = the goal is being viewed in a family that is NOT its own, with a morph_view to
  // supply the new-shape state (the real hero morph: CAST-412, a feature goal, shown as debug). The
  // spine + work + evidence then read morph_view, NOT the real debug goal (CAST-431). On the real
  // debug goal (CAST-431) and on the feature default this is false → zero behavior change.
  const morphed = fam === 'debug' && !!(goal && goal.family !== 'debug' && goal.morph_view);
  const spine = morphed ? deriveMorphSpine(goal) : appState.spines[fam];
  const isDebug = fam === 'debug';
  const devMode = location.hash.includes('/dev');   // dev op-strip gated behind a #/dev suffix (1.3 handoff tidy)

  // 3.1: the stage navigator + StageSurface read EVERYTHING from ORG.stageModels (labels/surfaces/
  // artifacts) — nothing hardcoded. focusStep = the navigated step (appState.stageFocus) or, by
  // default, the current step (goal.spine_state.current). The surface renders that step's artifacts.
  const sm = appState.org.stageModels[fam] || { steps: [] };
  const steps = sm.steps || [];
  const currentStepId = (goal && goal.spine_state && goal.spine_state.current) || (steps[0] && steps[0].id);
  const focusStepId = appState.stageFocus || currentStepId;
  const focusStep = steps.find((s) => s.id === focusStepId) || steps[0];
  const stepArtifacts = ((goal && goal.artifacts) || []).filter((a) => a.step === focusStepId);
  // doc steps host the requirements/planning decision atoms in order (derived — no hardcoded ids/labels).
  const docSteps = steps.filter((s) => s.surface === 'doc');
  const DOC_PHASES = ['requirements', 'planning'];
  const stepPhase = {};
  docSteps.forEach((s, i) => { if (DOC_PHASES[i]) stepPhase[s.id] = DOC_PHASES[i]; });
  const stepDecisions = (appState.org.decisions || []).filter(
    (a) => a.goal_slug === goalId && stepPhase[focusStepId] && a.phase === stepPhase[focusStepId]);
  // the goal's single L3 atom → the persistent needs-you chip + the EscalationRail.
  const l3Atom = (appState.org.decisions || []).find((a) => a.goal_slug === goalId && a.reversibility === 'L3');
  // 3.3: the goal's first L1 atom → the one L1 decision pill on the debug investigation ledger.
  const l1Atom = (appState.org.decisions || []).find((a) => a.goal_slug === goalId && a.reversibility === 'L1');
  // 3.3: the Guide narration is PER-GOAL (shared grammar, goal-correct content — same as the nudge /
  // work-stream). The feature line is byte-identical to before (FLAGGED_RULE, no regression); the debug
  // line narrates this goal's OWN loop signal (iteration + the confirmed hypothesis), derived from ORG.
  const e2Confirmed = (isDebug && goal && goal.evidence && goal.evidence.E2)
    ? (goal.evidence.E2.hypotheses || []).find((h) => h.verdict === 'confirmed') : null;
  const iterState = (goal && goal.spine_state && goal.spine_state.iter)
    || (morphed && goal.morph_view.spine_state && goal.morph_view.spine_state.iter) || null;
  const guideLine = isDebug
    ? `The Guide is tracking this debug loop${iterState ? ` — iteration ${iterState.current}/${iterState.budget}` : ''}${e2Confirmed ? `, ${e2Confirmed.id} confirmed; scoping the fix.` : '.'}`
    : `The Guide is tracking this goal. It flagged ${FLAGGED_RULE} on the open PR and queued a review for you.`;
  const e1 = goal && goal.evidence && goal.evidence.E1;
  const nav = { ids: steps.map((s) => s.id), focus: appState.stageFocus };   // navigator: click → drillInto:<step-id>
  // 3.4: morphed CAST-412 swaps the work-happening stream to the seeded investigation (symptom +
  // first hypotheses from morph_view); the real feature/debug goals read their own work_stream.
  const workStream = morphed ? (goal.morph_view.work_stream || []) : ((goal && goal.work_stream) || []);
  // ── 4.1 SPIKE handles (all DERIVED from ORG — no hardcoded vocabulary). ──
  const isSpike = fam === 'spike';
  // L2 extension chip → rides the timebox meter (the "extended 2h→3h" atom, as a 6B callout).
  const tbExtension = isSpike
    ? (appState.org.decisions || []).find((a) => a.goal_slug === goalId && a.reversibility === 'L2')
    : null;
  // the goal's E4 verdict + its home step → the default-view E4 strip + the drillInto target.
  const e4 = goal && goal.evidence && goal.evidence.E4;
  const verdictStepId = (steps.find((s) => s.evidence === 'E4') || {}).id;
  // the memo surface carries its owning L1 decision pill ("timeboxed to 2h; p95 only").
  const memoL1 = (focusStep && focusStep.surface === 'memo')
    ? (appState.org.decisions || []).find((a) => a.goal_slug === goalId && a.reversibility === 'L1')
    : null;
  // ── 4.2 DATA handles (all DERIVED from ORG — no hardcoded vocabulary). ──
  const isData = fam === 'data';
  // the data notebook hosts the goal's recorded analysis decisions: the first L1 (e.g. the null-row
  // exclusion) + the first L2 (e.g. median-over-mean) render as Decision callouts on the notebook. The
  // L3 source call stays on the header needs-you chip, never here (one hard stop per flow). Ids DERIVED.
  const notebookDecisions = (isData && focusStep && focusStep.surface === 'notebook')
    ? [
        (appState.org.decisions || []).find((a) => a.goal_slug === goalId && a.reversibility === 'L1'),
        (appState.org.decisions || []).find((a) => a.goal_slug === goalId && a.reversibility === 'L2'),
      ].filter(Boolean)
    : null;
  // surface decisions: the doc-phase mapping (feature) OR the memo's owning L1 (spike) OR the
  // notebook's L1+L2 analysis decisions (data).
  const surfaceDecisions = (stepDecisions && stepDecisions.length) ? stepDecisions
    : (notebookDecisions && notebookDecisions.length) ? notebookDecisions
    : (memoL1 ? [memoL1] : []);

  return html`
    <div class="goal-view">
      <div class="crumb">${appState.goal.crumb.replace(' / ', ' ')} <b>${appState.goal.id.toLowerCase()}</b></div>

      <!-- Part 1 · goal anatomy (header / needs-you / guide / spine-navigator / nudge).
           6.1: data-tour="…" anatomy anchors — ATTRIBUTES (not classes; 6.2's styling refactors
           can't silently break tours) carrying NO vt- name (BINDING #7). -->
      <div class="goal-header" data-tour="header">
        <span class="gtitle">${appState.goal.title}</span>
        <span class=${'fampill' + (isDebug ? ' debug' : '')}>${fam}</span>
      </div>

      <!-- 3.1: the goal's single L3 atom surfaces as a persistent "⚠ needs you" chip in the header
           band; clicking opens the EscalationRail INLINE at the WHAT level (US3 S3 — no Execution tab). -->
      ${l3Atom ? html`<div data-tour="needsyou"><${NeedsYouChip} atom=${l3Atom}/></div>` : null}

      <!-- Guide narration — 2b.3: the locked Guide voice (GuideMark diamond, hue-free) +
           real narration derived from ORG (FLAGGED_RULE, never hand-typed). -->
      <div class="guide-line" data-tour="guide">
        <${GuideMark} size=${16}/>
        <span>${guideLine}</span>
      </div>

      <!-- Stage spine — 3.1: now a NAVIGATOR. The .spine-zone wrapper + its (absent) anchor
           placement stay byte-identical (morph contract holds — no vt-name here → rides the root
           crossfade). Clicking a step dispatches drillInto:<step-id> (NO sixth op) → appState.stageFocus,
           and StageSurface (below) swaps to that step. Labels come from stageModels (no watermark now). -->
      <div class="spine-zone" data-tour="spine">
        <${StageSpine} spine=${spine} nav=${nav} extension=${tbExtension}/>
      </div>

      <!-- Nudge zone — NudgeCard (3B). The .nudge ZONE WRAPPER keeps the vt-nudge-card anchor. -->
      <div class="nudge" data-tour="nudge">
        <${NudgeCard} nudge=${appState.nudge}/>
      </div>

      <!-- Part 2 · work-happening stream (PRF1) + stage artifacts (StageSurface). The work stream
           renders from ORG.goals[id].work_stream, each assignee RESOLVED against ORG.agents (NOT the
           2b kit FIXTURES — that is the defect PRF1 names). The stage-artifacts zone is the focused
           step's familiar-tool surface; at the evidence-home step the full EvidenceBlock renders (E1
           = real raster + onerror fallback), otherwise a compact E1 strip summarizes acceptance. -->
      <div class="body">
        <section data-tour="work">
          ${isSpike
            ? html`
                <div class="sect-h"><span class="k">Probes</span> tried · ${workStream.length} on ${appState.goal.id.toLowerCase()} · throwaway by design</div>
                <${ProbesCard} goal=${goal}/>`
            : html`
                <div class="sect-h"><span class="k">In flight</span> work · ${workStream.length} on ${appState.goal.id.toLowerCase()}</div>
                <div class="work-stream">
                  ${workStream.map((it) => html`<${WorkRow} item=${it} steps=${steps}/>`)}
                </div>`}
        </section>
        <!-- 3.4: the evidence/work ZONE WRAPPER carries the vt-evidence-strip morph anchor (the 6th
             anchor, Phase-1 RESERVED). It is present in BOTH the feature default render and the morphed
             render, so on the real hero morph it GLIDES while its EvidenceBlock content crossfades
             (E1 strip ⇄ E2 seed). Exactly ONE element per snapshot carries the name (BINDING #8). The
             inner zone has three states, in priority order:
               • morphed CAST-412 → the just-seeded investigation from morph_view (the post-reclass shape);
               • real debug default (CAST-431) → its own InvestigationLedger (3.3, FR-007 history);
               • everything else → Stage artifacts (StageSurface + the focused step's evidence / E1 strip).
             Only this evidence/work content deviates — header/spine/nudge/work-stream/exec/chat are
             shared across families (SC-005). -->
        <div class="evidence-zone" data-tour="evidence">
          ${isSpike && appState.parityOpen
            ? html`
                <section>
                  <div class="sect-h"><span class="k">Parity</span> · FR-017 — three access tiers, one artifact</div>
                  <${SpikeParity} goal=${goal} goalId=${goalId} step=${focusStep}
                    goalArtifacts=${stepArtifacts} stepDecisions=${surfaceDecisions}/>
                </section>`
            : morphed
            ? html`
                <section>
                  <div class="sect-h"><span class="k">Investigation</span> ledger${spine.iter
                    ? html` <span style="font-family:var(--mono);font-size:10px;color:var(--ink-35)">· ↺ iter ${spine.iter.current}/${spine.iter.budget} · reclassified, the loop’s memory starts here</span>`
                    : null}</div>
                  <${InvestigationLedger} goal=${deriveMorphInvestigation(goal)} l1Atom=${null}/>
                </section>`
            : (isDebug && !appState.stageFocus)
              ? html`
                  <section>
                    <div class="sect-h"><span class="k">Investigation</span> ledger${spine.iter
                      ? html` <span style="font-family:var(--mono);font-size:10px;color:var(--ink-35)">· ↺ iter ${spine.iter.current}/${spine.iter.budget} · the loop’s memory</span>`
                      : null}</div>
                    <${InvestigationLedger} goal=${goal} l1Atom=${l1Atom}/>
                  </section>`
              : html`
                  <section>
                    <div class="sect-h"><span class="k">Stage</span> artifacts${appState.stageFocus
                      ? html` <span style="font-family:var(--mono);font-size:10px;color:var(--ink-35)">· viewing ${focusStep.shortLabel || focusStep.label} — click the current step to return</span>`
                      : html` <span style="font-family:var(--mono);font-size:10px;color:var(--ink-35)">· current step</span>`}</div>
                    <${StageSurface} step=${focusStep} goalArtifacts=${stepArtifacts} stepDecisions=${surfaceDecisions} goal=${goal}/>
                    ${focusStep && focusStep.evidence
                      ? html`<div style="margin-top:14px"><${EvidenceBlock} kind=${focusStep.evidence} data=${adaptEvidence(focusStep.evidence, goal, { resolved: appState.dataResolved })}/></div>`
                      : (e1
                          ? html`<div style="margin-top:14px"><${EvidenceStrip} e1=${e1}/></div>`
                          : (e4 ? html`<div style="margin-top:14px"><${EvidenceStripE4} e4=${e4} verdictStepId=${verdictStepId}/></div>` : null))}
                  </section>`}
        </div>
      </div>

      <!-- Pinned objects — created by promote (chat artifact) / pin (canvas-local stub). -->
      ${appState.pinned.length > 0 ? html`
        <div class="pinned-wrap">
          <div class="sect-h"><span class="k">Pinned</span> on canvas</div>
          ${appState.pinned.map((p) => html`
            <div class="pinned-card">
              <div class="name">${p.title}</div>
              <div class="prov">${p.provenance}</div>
            </div>`)}

      <!-- Drill-in execution panel — toggled by drillInto:execution (the existing 5-op op; NO sixth op).
           3.2: the real run_node.html lift. ExecPanel renders ONLY while drill==='execution' (below the
           canvas zones), so the dispatch tree DOM is absent from — never snapshotted by — the 3.4 morph
           (the morph beat keeps drill cleared). The WHAT content above is untouched by the toggle. -->
      ${appState.drill === 'execution' ? html`<${ExecPanel} goal=${goal}/>` : null}

      <!-- receipt-trail — 2b.3: each morph receipt renders through the kit Decision component at

      <div class="receipt-trail">
        ${appState.receipts.length === 0
          ? html`receipt trail · decision receipts appear here.`
          : appState.receipts.map((r) => html`
              <${Decision} layer="pill"
                atom=${{ id: r.decision_id, diff: r.label, reversibility: r.level, status: r.status || 'recorded' }}/>`)}
      </div>

      <!-- DEV OP STRIP — GATED behind a #/dev hash suffix (1.3 handoff tidy). The showable
           goal route never renders it; append /dev (e.g. the goal hash + /dev) to expose the
           raw op buttons + the deliberately bad op (unknown-op console.warn guard path).
           Verification crutch only — not part of the showable artifact. -->

const L_BADGE = { L1: 'lbadge--l1', L2: 'lbadge--l2', L3: 'lbadge--l3' };
function LBadge({ level }) {
  if (!level) return null;
  return html`<span class=${'lbadge ' + (L_BADGE[level] || 'lbadge--l1')}>${level}</span>`;
}
const CONF_GLYPH = { H: '●', M: '◐', L: '○' };

/* ── Avatar primitive (Contract 6): one component, four kinds. The mark geometry is
   .av-mk (optically scaled per shape — see CSS); the glyph/initials ride the upright
   .av-face. Size flows from --avatar-size (inherited), not per-call markup. ── */
function Avatar({ kind, initials = '', glyph }) {
