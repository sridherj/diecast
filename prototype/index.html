function GoalCanvas() {
  const goalId = appState.goal.id;
  const goal = appState.org.goals[goalId];
  const fam = appState.family;
  // 3.4: MORPHED = the goal is being viewed in a family that is NOT its own, with a morph_view to
  // supply the new-shape state (the real hero morph: CAST-412, a feature goal, shown as debug). The
  // spine + work + evidence then read morph_view, NOT the real debug goal (CAST-431). On the real
  // debug goal (CAST-431) and on the feature default this is false → zero behavior change.
  const morphed = fam === 'debug' && !!(goal && goal.family !== 'debug' && goal.morph_view);
  const spine = morphed ? deriveMorphSpine(goal) : appState.spines[fam];
  const isDebug = fam === 'debug';
  const devMode = location.hash.includes('/dev');   // dev op-strip gated behind a #/dev suffix (1.3 handoff tidy)

  // 3.1: the stage navigator + StageSurface read EVERYTHING from ORG.stageModels (labels/surfaces/
  // artifacts) — nothing hardcoded. focusStep = the navigated step (appState.stageFocus) or, by
  // default, the current step (goal.spine_state.current). The surface renders that step's artifacts.
  const sm = appState.org.stageModels[fam] || { steps: [] };
  const steps = sm.steps || [];
  const currentStepId = (goal && goal.spine_state && goal.spine_state.current) || (steps[0] && steps[0].id);
  const focusStepId = appState.stageFocus || currentStepId;
  const focusStep = steps.find((s) => s.id === focusStepId) || steps[0];
  const stepArtifacts = ((goal && goal.artifacts) || []).filter((a) => a.step === focusStepId);
  // doc steps host the requirements/planning decision atoms in order (derived — no hardcoded ids/labels).
  const docSteps = steps.filter((s) => s.surface === 'doc');
  const DOC_PHASES = ['requirements', 'planning'];
  const stepPhase = {};
  docSteps.forEach((s, i) => { if (DOC_PHASES[i]) stepPhase[s.id] = DOC_PHASES[i]; });
  const stepDecisions = (appState.org.decisions || []).filter(
    (a) => a.goal_slug === goalId && stepPhase[focusStepId] && a.phase === stepPhase[focusStepId]);
  // the goal's single L3 atom → the persistent needs-you chip + the EscalationRail.
  const l3Atom = (appState.org.decisions || []).find((a) => a.goal_slug === goalId && a.reversibility === 'L3');
  // 3.3: the goal's first L1 atom → the one L1 decision pill on the debug investigation ledger.
  const l1Atom = (appState.org.decisions || []).find((a) => a.goal_slug === goalId && a.reversibility === 'L1');
  // 3.3: the Guide narration is PER-GOAL (shared grammar, goal-correct content — same as the nudge /
  // work-stream). The feature line is byte-identical to before (FLAGGED_RULE, no regression); the debug
  // line narrates this goal's OWN loop signal (iteration + the confirmed hypothesis), derived from ORG.
  const e2Confirmed = (isDebug && goal && goal.evidence && goal.evidence.E2)
    ? (goal.evidence.E2.hypotheses || []).find((h) => h.verdict === 'confirmed') : null;
  const iterState = (goal && goal.spine_state && goal.spine_state.iter)
    || (morphed && goal.morph_view.spine_state && goal.morph_view.spine_state.iter) || null;
  const guideLine = isDebug
    ? `The Guide is tracking this debug loop${iterState ? ` — iteration ${iterState.current}/${iterState.budget}` : ''}${e2Confirmed ? `, ${e2Confirmed.id} confirmed; scoping the fix.` : '.'}`
    : `The Guide is tracking this goal. It flagged ${FLAGGED_RULE} on the open PR and queued a review for you.`;
  const e1 = goal && goal.evidence && goal.evidence.E1;
  const nav = { ids: steps.map((s) => s.id), focus: appState.stageFocus };   // navigator: click → drillInto:<step-id>
  // 3.4: morphed CAST-412 swaps the work-happening stream to the seeded investigation (symptom +
  // first hypotheses from morph_view); the real feature/debug goals read their own work_stream.
  const workStream = morphed ? (goal.morph_view.work_stream || []) : ((goal && goal.work_stream) || []);
  // ── 4.1 SPIKE handles (all DERIVED from ORG — no hardcoded vocabulary). ──
  const isSpike = fam === 'spike';
  // L2 extension chip → rides the timebox meter (the "extended 2h→3h" atom, as a 6B callout).
  const tbExtension = isSpike
    ? (appState.org.decisions || []).find((a) => a.goal_slug === goalId && a.reversibility === 'L2')
    : null;
  // the goal's E4 verdict + its home step → the default-view E4 strip + the drillInto target.
  const e4 = goal && goal.evidence && goal.evidence.E4;
  const verdictStepId = (steps.find((s) => s.evidence === 'E4') || {}).id;
  // the memo surface carries its owning L1 decision pill ("timeboxed to 2h; p95 only").
  const memoL1 = (focusStep && focusStep.surface === 'memo')
    ? (appState.org.decisions || []).find((a) => a.goal_slug === goalId && a.reversibility === 'L1')
    : null;
  // surface decisions: the doc-phase mapping (feature) OR the memo's owning L1 (spike).
  const surfaceDecisions = (stepDecisions && stepDecisions.length) ? stepDecisions : (memoL1 ? [memoL1] : []);

  return html`
    <div class="goal-view">
      <div class="crumb">${appState.goal.crumb.replace(' / ', ' ')} <b>${appState.goal.id.toLowerCase()}</b></div>

      <!-- Part 1 · goal anatomy (header / needs-you / guide / spine-navigator / nudge) -->
      <div class="goal-header">
        <span class="gtitle">${appState.goal.title}</span>
        <span class=${'fampill' + (isDebug ? ' debug' : '')}>${fam}</span>
      </div>

      <!-- 3.1: the goal's single L3 atom surfaces as a persistent "⚠ needs you" chip in the header
           band; clicking opens the EscalationRail INLINE at the WHAT level (US3 S3 — no Execution tab). -->
      ${l3Atom ? html`<${NeedsYouChip} atom=${l3Atom}/>` : null}

      <!-- Guide narration — 2b.3: the locked Guide voice (GuideMark diamond, hue-free) +
           real narration derived from ORG (FLAGGED_RULE, never hand-typed). -->
      <div class="guide-line">
        <${GuideMark} size=${16}/>
        <span>${guideLine}</span>
      </div>

      <!-- Stage spine — 3.1: now a NAVIGATOR. The .spine-zone wrapper + its (absent) anchor
           placement stay byte-identical (morph contract holds — no vt-name here → rides the root
           crossfade). Clicking a step dispatches drillInto:<step-id> (NO sixth op) → appState.stageFocus,
           and StageSurface (below) swaps to that step. Labels come from stageModels (no watermark now). -->
      <div class="spine-zone">
        <${StageSpine} spine=${spine} nav=${nav} extension=${tbExtension}/>
      </div>

      <!-- Nudge zone — NudgeCard (3B). The .nudge ZONE WRAPPER keeps the vt-nudge-card anchor. -->
      <div class="nudge">
        <${NudgeCard} nudge=${appState.nudge}/>
      </div>

      <!-- Part 2 · work-happening stream (PRF1) + stage artifacts (StageSurface). The work stream
           renders from ORG.goals[id].work_stream, each assignee RESOLVED against ORG.agents (NOT the
           2b kit FIXTURES — that is the defect PRF1 names). The stage-artifacts zone is the focused
           step's familiar-tool surface; at the evidence-home step the full EvidenceBlock renders (E1
           = real raster + onerror fallback), otherwise a compact E1 strip summarizes acceptance. -->
      <div class="body">
        <section>
          ${isSpike
            ? html`
                <div class="sect-h"><span class="k">Probes</span> tried · ${workStream.length} on ${appState.goal.id.toLowerCase()} · throwaway by design</div>
                <${ProbesCard} goal=${goal}/>`
            : html`
                <div class="sect-h"><span class="k">In flight</span> work · ${workStream.length} on ${appState.goal.id.toLowerCase()}</div>
                <div class="work-stream">
                  ${workStream.map((it) => html`<${WorkRow} item=${it} steps=${steps}/>`)}
                </div>`}
        </section>
        <!-- 3.4: the evidence/work ZONE WRAPPER carries the vt-evidence-strip morph anchor (the 6th
             anchor, Phase-1 RESERVED). It is present in BOTH the feature default render and the morphed
             render, so on the real hero morph it GLIDES while its EvidenceBlock content crossfades
             (E1 strip ⇄ E2 seed). Exactly ONE element per snapshot carries the name (BINDING #8). The
             inner zone has three states, in priority order:
               • morphed CAST-412 → the just-seeded investigation from morph_view (the post-reclass shape);
               • real debug default (CAST-431) → its own InvestigationLedger (3.3, FR-007 history);
               • everything else → Stage artifacts (StageSurface + the focused step's evidence / E1 strip).
             Only this evidence/work content deviates — header/spine/nudge/work-stream/exec/chat are
             shared across families (SC-005). -->
        <div class="evidence-zone">
          ${morphed
            ? html`
                <section>
                  <div class="sect-h"><span class="k">Investigation</span> ledger${spine.iter
                    ? html` <span style="font-family:var(--mono);font-size:10px;color:var(--ink-35)">· ↺ iter ${spine.iter.current}/${spine.iter.budget} · reclassified, the loop’s memory starts here</span>`
                    : null}</div>
                  <${InvestigationLedger} goal=${deriveMorphInvestigation(goal)} l1Atom=${null}/>
                </section>`
            : (isDebug && !appState.stageFocus)
              ? html`
                  <section>
                    <div class="sect-h"><span class="k">Investigation</span> ledger${spine.iter
                      ? html` <span style="font-family:var(--mono);font-size:10px;color:var(--ink-35)">· ↺ iter ${spine.iter.current}/${spine.iter.budget} · the loop’s memory</span>`
                      : null}</div>
                    <${InvestigationLedger} goal=${goal} l1Atom=${l1Atom}/>
                  </section>`
              : html`
                  <section>
                    <div class="sect-h"><span class="k">Stage</span> artifacts${appState.stageFocus
                      ? html` <span style="font-family:var(--mono);font-size:10px;color:var(--ink-35)">· viewing ${focusStep.shortLabel || focusStep.label} — click the current step to return</span>`
                      : html` <span style="font-family:var(--mono);font-size:10px;color:var(--ink-35)">· current step</span>`}</div>
                    <${StageSurface} step=${focusStep} goalArtifacts=${stepArtifacts} stepDecisions=${surfaceDecisions} goal=${goal}/>
                    ${focusStep && focusStep.evidence
                      ? html`<div style="margin-top:14px"><${EvidenceBlock} kind=${focusStep.evidence} data=${adaptEvidence(focusStep.evidence, goal)}/></div>`
                      : (e1
                          ? html`<div style="margin-top:14px"><${EvidenceStrip} e1=${e1}/></div>`
                          : (e4 ? html`<div style="margin-top:14px"><${EvidenceStripE4} e4=${e4} verdictStepId=${verdictStepId}/></div>` : null))}
                  </section>`}
        </div>
      </div>

      <!-- Pinned objects — created by promote (chat artifact) / pin (canvas-local stub). -->
      ${appState.pinned.length > 0 ? html`
        <div class="pinned-wrap">
          <div class="sect-h"><span class="k">Pinned</span> on canvas</div>
          ${appState.pinned.map((p) => html`
            <div class="pinned-card">
              <div class="name">${p.title}</div>
              <div class="prov">${p.provenance}</div>
            </div>`)}
        </div>` : null}

      <!-- Drill-in execution panel — toggled by drillInto:execution (the existing 5-op op; NO sixth op).
           3.2: the real run_node.html lift. ExecPanel renders ONLY while drill==='execution' (below the
           canvas zones), so the dispatch tree DOM is absent from — never snapshotted by — the 3.4 morph
           (the morph beat keeps drill cleared). The WHAT content above is untouched by the toggle. -->
      ${appState.drill === 'execution' ? html`<${ExecPanel} goal=${goal}/>` : null}

           diff, reversibility}). The .receipt-trail ZONE WRAPPER keeps its vt-receipt-trail morph
           anchor (Contract 9 — anchor on the wrapper, never on the kit component); only the inner
           content changes, so the Phase-1 morph contract holds. -->
      <div class="receipt-trail">
        ${appState.receipts.length === 0

           goal route never renders it; append /dev (e.g. the goal hash + /dev) to expose the
           raw op buttons + the deliberately bad op (unknown-op console.warn guard path).

          <button data-op="nudge:n2">nudge</button>

          <button data-op="pin:c1">pin</button>
          <button data-op="morf:debug">⚠ bad-op</button>
        </div>` : null}
    </div>`;
}

/* ── StageSpine (Contract 3 / pick 1B/2B + timebox + pipeline): ONE component, a
   four-way `spine.shape` switch → four MATERIALLY-DIFFERENT silhouettes (bar / loop
   band / single meter / node chain), not four colorings of one stepper. Each carries
   the PLACEHOLDER watermark while placeholder:true. ── */
// 3.1: an optional `nav` prop ({ids:[stepId...], focus:<stepId|null>}) turns a spine into a
// NAVIGATOR — each step becomes a <button data-op="drillInto:<step-id>"> (NO sixth op; the
// dispatcher's drillInto branches on the arg) and the focused step gets an ink ring (spine-seg--focus)
// distinct from the raspberry `current` fill. Without `nav` (e.g. #/kit) the steps render as inert
// divs exactly as before — the kit harness is unchanged.
function SpineSegments({ spine, nav }) {            // shape A — labeled segment BAR
  const ids = (nav && nav.ids) || [];

  return html`
    <div class="spine-segbar">
      ${spine.steps.map((s, i) => {
        const id = ids[i];
        const navable = !!(nav && id);
        const cls = 'spine-seg'
          + (i === spine.current ? ' spine-seg--now' : i < spine.current ? ' spine-seg--done' : '')
          + (focus != null && id === focus ? ' spine-seg--focus' : '')
          + (navable ? ' spine-seg--nav' : '');
        const inner = html`<span class="spine-n">${String(i + 1).padStart(2, '0')}</span><span class="spine-lbl">${s}</span>`;
        return navable
          ? html`<button class=${cls} data-op=${'drillInto:' + id} aria-pressed=${id === focus ? 'true' : 'false'}>${inner}</button>`
          : html`<div class=${cls}>${inner}</div>`;
      })}
    </div>`;
}
function SpineLoop({ spine, nav }) {                 // shape B — staged LOOP BAND + iter badge
  const iter = spine.iter || { current: 1, budget: 3 };
  // 3.3 error path: an iteration counter past its budget is a DATA error — render the badge in
  // --fail + console.warn rather than clamping silently (zero-silent-failure). Valid counters
  // (current ≤ budget, e.g. CAST-431's 2/3) render byte-identically to before.
  const overBudget = iter.current > iter.budget;
  if (overBudget) console.warn('SpineLoop: iteration counter past budget', iter);
  const ids = (nav && nav.ids) || [];
  const focus = nav && nav.focus;
  return html`
    <div class="spine-loopband">
      ${spine.steps.map((s, i) => {
        const id = ids[i];

        const node = navable
          ? html`<button class=${cls} data-op=${'drillInto:' + id} aria-pressed=${id === focus ? 'true' : 'false'}>${inner}</button>`
          : html`<span class=${cls}>${inner}</span>`;
        return html`${node}${i < spine.steps.length - 1 ? html`<span class="spine-loopsep">→</span>` : null}`;
      })}

    </div>`;
}
// 4.1: SpineTimebox is the spike spine. It now (a) renders the four sub-steps BENEATH the meter
// (the 2c FLAG — the meter is a wrapper, not the only element), navigable via drillInto:<step-id>
// (NO sixth op — the `nav` prop threads through exactly like SpineSegments/SpineLoop); (b) renders the
// L2 extension chip on the meter (the optional `extension` atom → a 6B Decision callout); and (c)

      ${extension ? html`<div class="spine-tb-ext"><${Decision} atom=${extension} layer="callout"/></div>` : null}
      ${steps.length ? html`
        <div class="spine-tb-steps">

              + (focus != null && id === focus ? ' spine-tb-step--focus' : '')

            return navable
              ? html`<button class=${cls} data-op=${'drillInto:' + id} aria-pressed=${id === focus ? 'true' : 'false'}>${inner}</button>`

function StageSpine({ spine, nav, extension }) {     // 3.1: `nav` threads through; 4.1: `extension` → the spike L2 chip
  if (!spine || !spine.shape) {                     // visible fallback, never a blank gap

function EvBarChart({ headline }) {                  // hand-rolled inline SVG (NO chart library)
  const bars = headline.bars || [];
  const W = 340, H = 96, padX = 6, padBottom = 16, padTop = 8;
  const n = Math.max(bars.length, 1);
  const slot = (W - padX * 2) / n;
  const bw = Math.max(slot - 10, 4);
  const max = Math.max(...bars.map((b) => b.value), 1);
  const plotH = H - padBottom - padTop;
  return html`
    <svg class="ev-svg" viewBox=${`0 0 ${W} ${H}`} role="img" aria-label=${'report chart · ' + (headline.unit || '')}>
      <line class="ev-axis" x1=${padX} y1=${H - padBottom} x2=${W - padX} y2=${H - padBottom}/>
      ${bars.map((b, i) => {
        const h = Math.round((b.value / max) * plotH);
        const x = padX + i * slot + (slot - bw) / 2;
        const y = H - padBottom - h;
        return html`
          <rect class=${'ev-bar' + (i === bars.length - 1 ? ' ev-bar--latest' : '')}
                x=${x} y=${y} width=${bw} height=${h} rx="2"/>
          <text x=${x + bw / 2} y=${H - 5} text-anchor="middle" font-size="8" fill="var(--ink-35)">${b.label}</text>`;
      })}
    </svg>`;
}
function EvidenceE5({ data }) {                      // Rendered Report + Provenance
  const hl = data.headline || {}, pv = data.provenance || {}, ver = data.version || {};
  return html`

          <pre class="ev-prov-q">${pv.query}</pre>

      <div class="ev-ver"><span class="ev-ver-dot"></span>Report v${ver.n} · ${ver.date}${ver.note ? ' · ' + ver.note : ''}</div>

}

/* ── Decision ladder (Contract 1 pick 6A/6B/6C, Contract 3 atom): ONE component, a
   `layer` prop → three projections of ONE atom. The DEC- id renders in every layer so an
   ID-match across layers is verifiable. Fields are read VERBATIM from the contract-3 atom;
   `diff` is a presentational distillation (render hint), never a contract field. ── */
function hhmm(ts) {                                  // HH:MM from an ISO timestamp (display only)
  const m = /T(\d{2}:\d{2})/.exec(ts || '');
  return m ? m[1] : '--:--';
}
function DecisionPill({ atom }) {                    // 6A — inline pill
  const sup = atom.status === 'superseded';
  const awaiting = atom.status === 'awaiting_human';
  return html`
    <span class=${'dec-pill' + (sup ? ' dec-pill--superseded' : '') + (awaiting ? ' dec-pill--awaiting' : '')}>
      <span class="dec-scale">⚖</span>
      <span class="dec-diff">${atom.diff || atom.title}</span>
      <${LBadge} level=${atom.reversibility}/>
      ${awaiting ? html`<span class="dec-await-tag">awaiting</span>` : null}
      <span class="dec-id">${atom.id}</span>
    </span>`;
}
function DecisionCallout({ atom }) {                 // 6B — pill-as-button + CSS popover
  const [open, setOpen] = useState(false);
  useEffect(() => {                                  // escape-to-close (a11y)
    if (!open) return undefined;
    const onKey = (e) => { if (e.key === 'Escape') setOpen(false); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [open]);
  return html`
    <span class="dec-callout">
      <button class="dec-pill dec-pill--btn" aria-expanded=${open ? 'true' : 'false'}
              aria-haspopup="dialog" onClick=${() => setOpen(!open)}>
        <span class="dec-scale">⚖</span>
        <span class="dec-diff">${atom.diff || atom.title}</span>
        <${LBadge} level=${atom.reversibility}/>
        <span class="dec-id">${atom.id}</span>
      </button>
      ${open ? html`
        <div class="dec-pop" role="dialog" aria-label=${'decision ' + atom.id}>
          <div class="dec-pop-row"><span class="dec-pop-k">why</span>${atom.rationale}</div>
          <div class="dec-pop-row">
            <span class="dec-pop-k">considered</span>
            ${(atom.options_considered || []).map((o) => html`
              <div class=${'dec-pop-opt' + (o.chosen ? ' dec-pop-opt--chosen' : '')}>
                <span class="dec-pop-opt-mark">${o.chosen ? '✓' : '·'}</span>
                <span>${o.option} — ${o.consequence}</span>
              </div>`)}
          </div>
          <div class="dec-pop-row"><span class="dec-pop-k">revisit if</span>${atom.revisit_if}</div>
          <div class="dec-pop-by">${atom.originating_agent} · ${atom.author_type} · ${hhmm(atom.timestamp)}</div>
          <a class="dec-pop-link" href="#/kit">open full record →</a>
        </div>` : null}
    </span>`;
}
function DecisionRow({ atom }) {                     // 6C — diff-first trail row
  const sup = atom.status === 'superseded';
  return html`
    <div class=${'dec-row' + (sup ? ' dec-row--superseded' : '')}>
      <span class="dec-c-time">${hhmm(atom.timestamp)}</span>
      <span class="dec-c-phase">${atom.phase}</span>
      <span class="dec-c-lvl"><${LBadge} level=${atom.reversibility}/></span>
      <span class="dec-c-title">
        <span class="dec-c-diff">${atom.diff || ('decision: ' + atom.title)}</span>
        <span class="dec-c-name">${atom.title} · <span class="dec-id">${atom.id}</span>${sup && atom.superseded_by
          ? html` · <a class="dec-suplink" href="#/kit">superseded by ${atom.superseded_by} →</a>` : ''}</span>
      </span>
      <span class="dec-c-who">${atom.originating_agent}</span>
    </div>`;
}
function Decision({ atom, layer = 'pill' }) {
  if (!atom) { console.warn('Decision: missing atom'); return html`<span class="dec-unknown">⚠ no decision atom</span>`; }
  if (layer === 'callout') return html`<${DecisionCallout} atom=${atom}/>`;
  if (layer === 'row') return html`<${DecisionRow} atom=${atom}/>`;
  return html`<${DecisionPill} atom=${atom}/>`;
}

/* ════════════════════════════════════════════════════════════════════════
   3.1 — FEATURE BACKBONE COMPONENTS. All PURE (props)->vdom (no appState reads except
   the NeedsYouChip's ephemeral LOCAL useState popover, same posture as the 6B callout).
   StageSurface (surf-*) renders the focused step's familiar-tool surface; WorkRow renders
   the per-goal work stream resolved against ORG.agents (PRF1); the evidence adapters map
   the ORG E1 shape onto EvidenceBlock + wire the real raster. NO view-transition-name here.
   ════════════════════════════════════════════════════════════════════════ */

// ── assignee → identity resolvers (PRF1). initials from a slug; resolve against ORG. ──
function initialsOf(slug) {
  if (!slug) return '?';
  if (slug.charAt(0) === '@') {                          // '@you' → the human's initials (e.g. SJ)
    const h = (ORG.humans || []).find((x) => x.slug === slug);
    return h ? h.initials : slug.replace('@', '').slice(0, 2).toUpperCase();
  }
  const parts = slug.split('-').filter(Boolean);         // 'crud-orchestrator' → 'CO'
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return slug.slice(0, 2).toUpperCase();
}
function resolveAssignee(slug) {
  const a = (ORG.agents || {})[slug];
  if (a) return { slug, name: slug, kind: a.kind, state: a.state, human: false };
  const h = (ORG.humans || []).find((x) => x.slug === slug);
  if (h) return { slug, name: slug, kind: 'human', state: 'idle', human: true };
  if (ORG.guide && ORG.guide.slug === slug) return { slug, name: slug, kind: 'guide', state: 'working', human: false };
  console.warn('resolveAssignee: unresolved assignee', slug);   // visible-not-silent
  return { slug, name: slug, kind: 'maker', state: 'idle', human: false, unresolved: true };
}

// ── WorkRow (PRF1) — one run-status row per work_stream item, the assignee resolved against
//    ORG.agents (Avatar kind from the agent's kind). The @you MANUAL item carries the needs-you
//    accent ONLY when blocking. Replaces the 2b kit FIXTURES in this zone. ──
const WORK_STATUS = {
  running: { cls: 'running', glyph: '▸', label: 'running' },
  working: { cls: 'running', glyph: '▸', label: 'running' },
  idle:    { cls: 'idle', glyph: '○', label: 'queued' },
  benched: { cls: 'idle', glyph: '○', label: 'benched' },
  blocked: { cls: 'blocked', glyph: '⚠', label: 'blocked' },
  'checker-flagged': { cls: 'blocked', glyph: '⚠', label: 'flagged' },
};
function WorkRow({ item, steps }) {
  const who = resolveAssignee(item.assignee);
  const needs = who.human && item.kind === 'manual';     // pending human action = needs-you
  const st = needs
    ? { cls: 'needs', glyph: '⚠', label: 'needs you' }
    : (WORK_STATUS[who.state] || { cls: 'idle', glyph: '○', label: who.state || 'idle' });
  const step = (steps || []).find((s) => s.id === item.step);
  const stepLbl = step ? (step.shortLabel || step.label) : item.step;
  return html`
    <div class=${'work-row' + (needs ? ' work-row--needs' : '')} data-agent=${who.slug}>
      <span class="work-id">
        <${Avatar} kind=${who.kind} initials=${initialsOf(who.slug)}/>
        <span class="work-name">${who.name}</span>
      </span>
      <span class="work-meta">
        <span class="work-step">${stepLbl}</span>
        <span class=${'work-status work-status--' + st.cls}>${st.glyph} ${st.label}</span>
      </span>
      <span class="work-label">${item.label}</span>
    </div>`;
}

// 4.1: `memo` now flesh-out → MemoSurface (the one-pager findings memo); the thin RowsSurface
// version Phase 3 shipped is retired for this kind. `notebook` stays thin (4.2 fleshes it out).
const SURFACE_BODY = { doc: DocSurface, board: RowsSurface, 'pr-thread': PrThreadSurface,
  ledger: RowsSurface, notebook: RowsSurface, memo: MemoSurface };
function StageSurface({ step, goalArtifacts, stepDecisions, goal }) {   // 4.1: `goal` threads to bodies that need spine data (MemoSurface)
  if (!step || !step.surface) {

// ── MemoSurface (surf-memo-*) — the fleshed-out `memo` kind (Step 4.1.3). A one-pager findings

// ── NeedsYouChip (L3) — a persistent header chip; clicking opens the EscalationRail INLINE at the
//    WHAT level (no Execution-tab entry, US3 S3). atomToEscalation maps an L3 ADR atom → the rail's
//    props (3 ranked options, NOTHING pre-selected). Local useState popover (not appState). ──
function atomToEscalation(atom) {
  const ticket = (atom.influenced || []).find((x) => /^CAST-/.test(x));
  return {
    title: atom.title, route: '@you', expires: 'in 1h',
    want: atom.what_i_want, tried: atom.what_i_tried,
    options: (atom.options_considered || []).slice(0, 3).map((o, i) => ({ id: String.fromCharCode(97 + i), label: o.label, consequence: o.consequence })),
    policy: 'decisions/escalation-policy.md', ticket,
    // 4.1: the spike L3 carries spike_ref → the E4 verdict. The rail renders a BACK-LINK (the second
    // direction of the bidirectional nav); absent on every non-spike L3, so no regression.
    spikeRef: atom.spike_ref || null,
  };
}
function NeedsYouChip({ atom }) {
  const [open, setOpen] = useState(false);
  useEffect(() => {                                       // escape-to-close (a11y; mirrors the 6B callout)
    if (!open) return undefined;
    const onKey = (e) => { if (e.key === 'Escape') setOpen(false); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [open]);
  const esc = atomToEscalation(atom);
  return html`
    <div class="ny-band">
      <button class="ny-chip" aria-expanded=${open ? 'true' : 'false'} aria-haspopup="dialog" onClick=${() => setOpen(!open)}>
        ⚠ needs you<span class="ny-chip-t">· ${esc.ticket || atom.id}</span>
      </button>
      ${open ? html`<div class="ny-rail" role="dialog" aria-label=${'escalation ' + atom.id}><${EscalationRail} escalation=${esc}/></div>` : null}
    </div>`;
}

// ── Evidence adapters — map the ORG goal-evidence shape onto EvidenceBlock props. E1 is fully
//    adapted (real raster shots + checker attribution from execution.iteration.checker); E2–E5 pass
//    the ORG object through (3.3 / 3.4 / Phase 4 own their polish). ──
function adaptE1(goal) {
  const e = (goal.evidence && goal.evidence.E1) || {};
  const m = /(\d+)\s*passed\s*\/\s*(\d+)\s*failed/i.exec(e.test_summary || '');
  return {
    tests: { passed: m ? +m[1] : null, failed: m ? +m[2] : null, coverageDelta: e.coverage_delta },
    shots: e.shots || [],
    checks: (e.checker_rows || []).map((r) => ({ code: r.code, label: r.label, status: r.state })),
    pr: { id: (e.pr || '').replace(/^PR\s*/i, '') || e.pr, label: goal.title },
    checkerSlug: (goal.execution && goal.execution.iteration && goal.execution.iteration.checker) || null,
  };
}
// 4.1: adapt the ORG E4 shape ({verdict, confidence:'◐', budget_ms, p95_ms, atom_ref, caption,
// data_points:[{label,ms}]}) onto EvidenceE4's props. confidence is a GLYPH in ORG (◐); the
// component runs it back through confGlyph, so map the glyph → the H/M/L key it expects (◐→M).
// spike_ref becomes {atomId, evId} → the bidirectional local-disclosure link (no route, no op).
const GLYPH_TO_CONF = { '●': 'H', '◐': 'M', '○': 'L' };
function adaptE4(goal) {
  const e = (goal.evidence && goal.evidence.E4) || {};
  return {
    answer: e.verdict,
    confidence: GLYPH_TO_CONF[e.confidence] || 'M',
    budget_ms: e.budget_ms, p95_ms: e.p95_ms,
    dataPoints: (e.data_points || []).map((p) => `${p.label}: ${p.ms}ms`),
    evId: e.id,
    spike_ref: e.atom_ref ? { atomId: e.atom_ref, evId: e.id } : null,
  };
}
function adaptEvidence(kind, goal) {
  if (kind === 'E1') return adaptE1(goal);
  if (kind === 'E4') return adaptE4(goal);
  return (goal.evidence && goal.evidence[kind]) || {};
}

/* ════════════════════════════════════════════════════════════════════════
   3.2 — EXECUTION DRILL-IN COMPONENTS (exec-*). RunNode + IterationPanel are
   BOTH PURE (props)->vdom — they read PROPS + the frozen ORG.agents global (for
   avatar hue / maker-checker resolution, same posture as 3.1's WorkRow/RunNode
   avatars), NEVER appState — so Phase 5a reuses IterationPanel on the ticket view
   without rework. RunNode is the recursive run_node.html VISUAL idiom lift (rail-
   threaded recursion · has-failure/has-warning rollup · ↻ rework #N · ctx tint ·
   status dots · skill chips). It is mounted at EXACTLY ONE external call-site
   (ExecPanel) — the span tree exists nowhere else (trace-creep guard); the only
   other `<${RunNode}` is the component's own recursion. ExecPanel keeps the focus
   run's expand state in a LOCAL useState (ephemeral UI, same posture as the 6B
   callout / NeedsYouChip popover) — NOT appState; the panel's OPEN/CLOSED is
   appState.drill, and it renders ONLY while drill==='execution', so it is absent
   from (never snapshotted by) the 3.4 morph. NO view-transition-name here.
   ════════════════════════════════════════════════════════════════════════ */

// ── status semantics (distinct red --fail rollup vs raspberry needs-you) ──
const EXEC_STATUS = {
  done:    { cls: 'done',    lbl: 'done' },
  running: { cls: 'running', lbl: 'running' },
  blocked: { cls: 'blocked', lbl: 'blocked' },
  flagged: { cls: 'flagged', lbl: 'flagged' },
};
// run_node.html rollup: failure dominates warning. `blocked` (a hard L3 stop) rolls up as failure;
// `flagged` / rework roll up as warning. Pure recursion over the node subtree.
function execRollup(node) {
  let fail = node.status === 'blocked' || node.status === 'failed' || node.status === 'stuck';
  let warn = node.rework != null || node.status === 'flagged';
  for (const c of node.children || []) { const r = execRollup(c); fail = fail || r.fail; warn = warn || r.warn; }
  return { fail, warn };
}
function execRollClass(node) {
  const { fail, warn } = execRollup(node);
  return fail ? ' has-failure' : warn ? ' has-warning' : '';
}
function ctxTint(ctx) {                                   // ctx-tint BUCKET derived in the view (data carries raw used/limit)
  if (!ctx || !ctx.limit) return 'calm';
  const p = ctx.used / ctx.limit;
  return p >= 0.70 ? 'hot' : p >= 0.45 ? 'mid' : 'calm';
}
function countNodes(n) { let c = 1; for (const k of n.children || []) c += countNodes(k); return c; }

// ── RunNode({node, depth}) — recursive, pure. Guard: an unknown agent slug (can't happen given the
//    3.1 generator invariant, but guarded anyway) renders the slug raw + a `?` avatar, never throws. ──
function RunNode({ node, depth = 0 }) {
  if (!node || typeof node !== 'object') {                // visible fallback, never throw mid-demo
    console.warn('RunNode: missing node');
    return html`<div class="exec-node exec-node--unknown">⚠ missing run node</div>`;
  }
  const st = EXEC_STATUS[node.status] || { cls: 'unknown', lbl: node.status || '?' };
  const agent = (ORG.agents || {})[node.agent];
  const unknownAgent = !agent;
  if (unknownAgent) console.warn('RunNode: unresolved agent', node.agent);   // visible-not-silent
  const avatarKind = agent ? agent.kind : 'maker';        // resolved agent kind drives the maker/checker hue
  const ctx = node.ctx;
  const pct = (ctx && ctx.limit) ? Math.round(ctx.used / ctx.limit * 100) : null;
  const skills = node.skills || [];
  return html`
    <div class=${'exec-group' + execRollClass(node)}>
      <div class=${'exec-node' + (depth > 0 ? ' is-child' : '') + ((st.cls === 'blocked' || st.cls === 'flagged') ? ' exec-node--alert' : '')} data-run-id=${node.id}>
        <div class="exec-row1">
          <span class=${'exec-dot exec-dot--' + st.cls}></span>
          <span class="exec-av" style="--avatar-size:18px">
            ${unknownAgent
              ? html`<${Avatar} kind="maker" glyph="?"/>`
              : html`<${Avatar} kind=${avatarKind} initials=${initialsOf(node.agent)}/>`}
          </span>
          <span class=${'exec-agent' + (unknownAgent ? ' exec-agent--unknown' : '')}>${node.agent}</span>
          <span class="exec-kind">${node.kind}</span>
          ${node.rework != null ? html`<span class="exec-rework">↻ rework #${node.rework}</span>` : null}
          <span class="exec-stat">${st.lbl}</span>
        </div>
        <div class="exec-label">${node.label}</div>
        <div class="exec-row2">

// ── IterationPanel({iteration}) — maker/checker ColleagueCard line-density pair (bracket tie),
//    finding rows (code · label · round · status), 3-segment rework meter, named exits. PURE: the
//    maker/checker slugs resolve against the frozen ORG.agents global (no appState). Reused by 5a. ──
function FindingRow({ f }) {

function ExecReworkMeter({ rework }) {                     // 3-segment meter from iteration.rework
  const used = rework ? rework.used : 0, budget = rework ? rework.budget : 0;
  const segs = [];
  for (let i = 0; i < budget; i++) segs.push(html`<i class=${'exec-rw-seg' + (i < used ? ' exec-rw-seg--used' : '')}></i>`);
  return html`<span class="exec-rwmeter">${segs}<span class="exec-rw-lbl">rework ${used}/${budget}</span></span>`;
}
const EXEC_EXIT_META = {                                  // named exits — visually complete, INERT (no data-op → dispatcher never fires; no onClick → no console error)
  fix:      { glyph: '✎', hint: 'apply the checker fix and re-review' },

// adapt an ORG.agents record onto the kit ColleagueCard's agent shape (the kit was authored for the
// FIXTURES shape: id = 2-letter avatar initials, inflight = {label}). Keeps the line-density lockup
// rendering correctly (avatar initials, paired tie, rework meter, autonomy badge, inflight pill).
function execAgentCard(slug) {
  const a = (ORG.agents || {})[slug];

    : (a.inflight ? { label: a.state === 'running' ? 'run in flight' : a.inflight + ' in flight' } : null);
  return { id: initialsOf(slug), slug, kind: a.kind, pairedWith: a.pairedWith,

function IterationPanel({ iteration }) {

// ── ExecPanel({goal}) — the Execution-tab shell (rendered ONLY while appState.drill==='execution',

/* ════════════════════════════════════════════════════════════════════════
   3.3 — DEBUG-LOOP CANVAS COMPONENTS (dbg-*). The investigation ledger is the
   ONE evidence/work-zone deviation from the feature grammar (SC-005: every other
   zone is shared). InvestigationLedger + ExperimentRow are PURE (props)->vdom —
   they read PROPS + the frozen ORG (resolveAssignee / execAgentCard against
   ORG.agents, same posture as 3.1's WorkRow and 3.2's RunNode), NEVER appState.

const VERDICT_MARK = { confirmed: '✓', refuted: '✕', open: '○' };
// ── ExperimentRow — one experiment an agent ran in a pass: label + verdict chip, with the

// ── InvestigationPass — one iteration pass. <details>: the live pass is open; closed passes

// ── InvestigationLedger — the debug work zone: the iteration passes (history first-class) + an L1

//    atom (props). Visible fallback if the passes are missing (zero-silent-failure). ──
function InvestigationLedger({ goal, l1Atom }) {

/* ════════════════════════════════════════════════════════════════════════
   NERVOUS SYSTEM (1.2) — the typed-op dispatcher + the scenario engine.
   Contract 3: the op vocabulary is a CLOSED 5-op set; NOTHING mutates the
   canvas outside dispatch(). pin stays DISTINCT from promote (not aliased) —
   the closed vocabulary is itself the contract being proven. The VISUAL morph
   (view-transition-name tagging, contrasting spine shapes, watermark) is 1.3;
   here morph only flips appState.family + pushes a receipt stub.
   ════════════════════════════════════════════════════════════════════════ */

// Two canned nudges the `nudge` op cycles between (proves the card re-renders from state).
// [0] is the feature goal's nudge from ORG (carries the goal id + flagged rule — derived, never
// typed); [1] is demo chrome with zero canonical tokens (the cycle target that proves re-render).
const NUDGES = [
  { ...FEATURE.nudge },
  { who: 'Guide', do: 'Reproduce the auth timeout', why: 'attach the failing trace before hypothesizing' },
];

/* ── The five op functions (Step 1.2.2) — minimal-but-visible state mutations. ── */
function morph(family, s) {                     // chat course-change reshapes the canvas
  s.family = family;
  // 3.4: morph is MORPH-SAFE — it always clears the HOW drill-in so the exec tree DOM never
  // participates in the view-transition snapshot (the close-beat guard, enforced at the op too).
  s.drill = null;
  // 3.4: the receipt drops ONLY on the FORWARD morph (away from the goal's real family — the
  // "classify as bug" reclassification); the scripted REVERSE (back to the goal's own family)
  // emits NO second receipt (Decision 9 — reversibility is shown by the canvas returning, not by a
  // new atom; one atom DEC-CAST-412-03, one receipt). Idempotent: never double-push the same atom.
  const goal = s.org.goals[s.goal.id];
  const intrinsic = goal && goal.family;
  const a = MORPH_ATOM;
  const already = s.receipts.some((r) => r.decision_id === a.id);
  if (family !== intrinsic && !already) {
    // The receipt is DERIVED from the locked morph atom (level/label/time all spine-derived),
    // keeping Phase 1's receipt keys {level,label,at} + the v1.1 decision_id.
    s.receipts.push({
      level: a.reversibility,                   // 'L2'
      label: a.title,                           // the decision's headline, from the spine
      at: a.timestamp.slice(11, 16),            // 'HH:MM' (UTC) → '17:52'
      rationale: a.rationale,
      decision_id: a.id,                        // v1.1: receipts gain a decision_id
    });
  }
}
function nudge(_id, s) {                         // swap the dominant next step (cycle two canned nudges)
  s.nudge = (s.nudge.do === NUDGES[0].do) ? { ...NUDGES[1] } : { ...NUDGES[0] };
}
function promote(artifactId, s) {               // chat artifact → durable pinned canvas object
  s.pinned.push({ id: artifactId, kind: 'promoted',
                  title: 'Acceptance criteria — RBAC checkout',
                  provenance: 'from chat · Guide · 17:53' });
  chatFor(s.goal.id).messages.push({ from: 'system', text: 'Pinned ✓ — artifact promoted to the canvas.' });  // PRF2: per-goal chat
}
// drillInto is REUSED for BOTH targets (closed 5-op set — NO sixth op for stage navigation; see the
// OPS table comment). The argument grammar branches:
//   • arg === 'execution' → toggle the HOW drill-in panel (the run_node.html lift; 3.2 fleshes it).
//   • arg === '<step-id>' → set appState.stageFocus (3.1 stage navigator). Re-clicking the focused
//     step, OR clicking the current step while at default, returns to the default view (stageFocus=null).
function drillInto(target, s) {
  if (target === 'execution') { s.drill = (s.drill === 'execution') ? null : 'execution'; return; }
  const g = s.org.goals[s.goal.id];
  const current = g && g.spine_state && g.spine_state.current;
  if (s.stageFocus === target || (s.stageFocus == null && target === current)) { s.stageFocus = null; return; }
  s.stageFocus = target;
}
function pin(artifactId, s) {                    // DISTINCT from promote — canvas-local stub object
  // 2a.3: the flagged rule code derives from ORG (FLAGGED_RULE), never hand-typed.
  s.pinned.push({ id: artifactId, kind: 'pinned',
                  title: `Canvas note — ${FLAGGED_RULE} checker flag`,
                  provenance: 'pinned on canvas · 17:54' });
}

/* ── The dispatcher (Step 1.2.1, ~30 lines vanilla). Every canvas change goes through here. ── */
// Closed 5-op set (Contract 3) — stays closed. Stage navigation is NOT a sixth op: it REUSES
// `drillInto` with a step-id argument (drillInto:'<step-id>' → stageFocus), while drillInto:'execution'
// remains the HOW drill-in. The arg-grammar branch lives in drillInto() above.
const OPS = { morph, nudge, promote, drillInto, pin };          // closed set (Contract 3)
const reduced = matchMedia('(prefers-reduced-motion: reduce)');

function fade(apply) {                                          // fallback: apply, then a 180ms opacity ramp
  apply();
  const frame = document.getElementById('canvas-frame');
  frame && frame.animate([{ opacity: 0.0 }, { opacity: 1 }], { duration: 180, easing: 'ease-out' });
}

function dispatch(opStr) {                                      // e.g. "morph:debug"
  const [op, arg] = opStr.split(':');
  if (!OPS[op]) { console.warn('unknown op:', opStr); return; }// guard — no throw mid-demo
  const apply = () => { OPS[op](arg, appState); paint(); };
  if (!document.startViewTransition || reduced.matches) return fade(apply);
  document.startViewTransition(apply);                         // shared-element morph (visuals in 1.3)
}

// Exactly ONE delegated listener (survives re-renders; never bind per element).
document.addEventListener('click', (e) => {
  const el = e.target.closest('[data-op]');
  if (el) dispatch(el.getAttribute('data-op'));
});

/* ── 4.1: spike_ref BIDIRECTIONAL LOCAL DISCLOSURE (Decision 11) — NOT a sixth op. The closed 5-op
   set stands; this is the existing chip→callout mechanism + scroll/highlight, on its own delegated
   listener (the elements carry data-disclose-*, never data-op, so dispatch() ignores them). One
   direction: the verdict's spike_ref [data-disclose-l3] opens the header L3 rail by CLICKING the
   existing NeedsYouChip (the literal chip→callout affordance), then scroll/highlights it. The other:
   the rail's back-link [data-disclose-e4="<evId>"] scroll/highlights the E4 verdict card. Pure DOM
   affordance — no appState, same posture as the 6B popover. ── */
function spkFlash(el) {
  if (!el) return;
  el.classList.add('spk-flash');
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  setTimeout(() => el.classList.remove('spk-flash'), 1400);
}
document.addEventListener('click', (e) => {
  const toL3 = e.target.closest('[data-disclose-l3]');
  if (toL3) {
    const chip = document.querySelector('.ny-chip');
    if (chip && chip.getAttribute('aria-expanded') !== 'true') chip.click();   // open via the established chip mechanism
    setTimeout(() => spkFlash(document.querySelector('.ny-rail .rail')), 60);    // after the rail's re-render
    return;
  }
  const toE4 = e.target.closest('[data-disclose-e4]');
  if (toE4) { spkFlash(document.getElementById(toE4.getAttribute('data-disclose-e4'))); return; }
});

/* ── Per-goal chat (PRF2). chatFor(id) lazily seeds {messages, scriptIndex, scriptKey:<family>};
   activeScript() resolves SCRIPTS[scriptKey]. Switching goals shows that goal's own thread + its
   scenario position; reload rebuilds appState → resets cleanly. ── */
function chatFor(goalId) {
  const by = appState.chat.byGoal;
  if (!by[goalId]) {
    const fam = (appState.org.goals[goalId] || {}).family;
    by[goalId] = { messages: [], scriptIndex: 0, scriptKey: fam };
  }
  return by[goalId];
}

/* ── The scenario engine (Step 1.2.3). An ARRAY WALKER, explicitly NOT a state machine. Engine
   state lives ONLY in the PER-GOAL chat (chatFor(goal).scriptIndex) → reload resets, and each
   goal keeps its own position (PRF2). ── */
function advance() {
  const c = chatFor(appState.goal.id);
  const scr = SCRIPTS[c.scriptKey] || [];
  const i = c.scriptIndex;
  if (i >= scr.length) return;
  const step = scr[i];
  c.messages.push({ from: step.from || 'narration', text: step.narration, ops: step.ops });
  c.scriptIndex = i + 1;
  const apply = () => { step.patch && step.patch(appState); paint(); };
  if (step.transition === 'morph' && document.startViewTransition && !reduced.matches) {
    document.startViewTransition(apply);
  } else if (step.transition === 'morph') {
    fade(apply);
  } else {
    apply();
  }
}

/* ── SCRIPTS — per-family scenario scripts (3.1 introduces SCRIPTS.feature; 3.3 adds .debug, 3.4
   adds the real morph beat). The feature flow (~7 beats): open → Guide why-line nudge → spine-
   navigator beat (focus the design step) → promote a real artifact → evidence beat (focus the E1
   home step) → the L3 needs-you beat → close. Narration INTERPOLATES canonical tokens + step labels
   from ORG (FEATURE_ID, FLAGGED_RULE, the PR + test summary, step labels, the L3 ticket) — NEVER
   retyped, so the drift grep stays clean (no stage-label string literal appears in this file). ── */
const FEAT_SM = ORG.stageModels.feature;
const featDocSteps = FEAT_SM.steps.filter((s) => s.surface === 'doc');
const featDesignStep = featDocSteps[1] || {};                          // 2nd doc step (the design/RFC step)
const featDoneStep = FEAT_SM.steps.find((s) => s.evidence === 'E1') || {};   // E1 home = the acceptance step
const featCurrentStep = FEAT_SM.steps.find((s) => s.id === FEATURE.spine_state.current) || {};
const FEAT_E1 = (FEATURE.evidence && FEATURE.evidence.E1) || {};
const FEAT_L3 = ORG.decisions.find((a) => a.goal_slug === FEATURE_ID && a.reversibility === 'L3') || {};
const FEAT_L3_TICKET = (FEAT_L3.influenced || []).find((x) => /^CAST-/.test(x)) || FEAT_L3.id;
// 3.2: the drill beat's narration interpolates the execution shape from ORG (run count, rework meter,
// the flagged finding code) — never retyped, so the drift grep stays clean.
const FEAT_EXEC = FEATURE.execution || {};
const FEAT_EXEC_RUNS = (FEAT_EXEC.runs || []).length;
const FEAT_EXEC_RW = (FEAT_EXEC.iteration && FEAT_EXEC.iteration.rework) || {};
const FEAT_EXEC_FLAG = ((FEAT_EXEC.iteration && FEAT_EXEC.iteration.findings) || []).find((f) => f.status === 'flagged') || {};
// 3.4: the real hero morph handles — DERIVED from morph_view + the locked atom (no hand-typed token,
// so the drift grep stays clean: the iter and the root cause are interpolated, never literal strings).
const FEAT_MORPH_ITER = (FEATURE.morph_view && FEATURE.morph_view.spine_state && FEATURE.morph_view.spine_state.iter) || { current: 1, budget: 3 };
const FEAT_MORPH_ROOTCAUSE = ((MORPH_ATOM.rationale || '').match(/v[\d.]+ RBAC migration/) || ['the RBAC migration'])[0];
// ── 3.3: debug-flow scenario handles — every token DERIVED from ORG (no hardcoded stage label /
//    canonical literal appears in SCRIPTS.debug, so the drift grep stays clean). ──
const DEBUG_ID = goalIdByFamily.debug;
const DEBUG = ORG.goals[DEBUG_ID];
const DBG_SM = ORG.stageModels.debug;
const DBG_CURRENT_STEP = DBG_SM.steps.find((s) => s.id === (DEBUG.spine_state && DEBUG.spine_state.current)) || {};
const DBG_EXP_STEP = DBG_SM.steps.find((s) => s.id === ((DBG_SM.loop && DBG_SM.loop.over) || [])[1]) || {};   // the experiment step in the loop (dbg-03)
const DBG_E2_STEP = DBG_SM.steps.find((s) => s.evidence === 'E2') || {};   // E2 home (dbg-04)
const DBG_E3_STEP = DBG_SM.steps.find((s) => s.evidence === 'E3') || {};   // E3 home (dbg-05)
const DBG_ITER = (DEBUG.spine_state && DEBUG.spine_state.iter) || { current: 1, budget: 3 };
const DBG_E2 = (DEBUG.evidence && DEBUG.evidence.E2) || {};
const DBG_H3 = (DBG_E2.hypotheses || []).find((h) => h.verdict === 'confirmed') || {};
const DBG_E3 = (DEBUG.evidence && DEBUG.evidence.E3) || {};
const DBG_PASSES = (DEBUG.investigation && DEBUG.investigation.passes) || [];

/* ════════════════════════════════════════════════════════════════════════
   Render spine. Hash-keyed routes (#/area/id grammar), one App resolver, and a
   single top-level SYNCHRONOUS paint(). CRITICAL (carried to 1.2/1.3): every
   app-state update goes through paint(); NO component-local useState for app
   state — synchronous render is what lets 1.2 wrap paint() inside
   startViewTransition without snapshotting stale DOM.
   ════════════════════════════════════════════════════════════════════════ */
const routes = { '': Home, '#/goal': GoalCanvas, '#/board': BoardStub, '#/kit': KitHarness };

function resolve(hash) {                       // key on first two '#/area' segments
  const key = hash.split('/').slice(0, 2).join('/').replace(/^#$/, '');
  return routes[key] || routes[''];
}

function App() {
  const View = resolve(location.hash);
  return html`<${AppShell}><${View}/><//>`;
}

function paint() {
  appState.route = location.hash || '#/';
  render(html`<${App}/>`, document.getElementById('app'));
}

// 2a.3 ROUTE GUARD: #/goal/<id> resolves ANY of the four goal ids in ORG.goals, syncing
// appState.goal + appState.family to that goal so the canvas renders its family's spine.
// An unknown goal id keeps the current goal (no crash). This runs ONLY on real navigation — NOT
// on op-dispatch paints — so the morph (which flips family without a hashchange) is never undone.
function syncGoalFromRoute(hash) {
  const m = (hash || '').match(/^#\/goal\/([^/]+)/);
  if (!m) return;
  const g = appState.org.goals[m[1]];
  if (!g) return;                              // unknown goal id → keep current goal (guard)
  if (m[1] !== appState.goal.id) appState.stageFocus = null;   // 3.1: a NEW goal resets stage focus (its step ids differ)
  appState.goal = { id: m[1], title: g.title, crumb: appState.org.org.crumb };
  appState.family = g.family;
  // 3.3: the nudge is PER-GOAL — render the routed goal's own nudge object (the debug nudge for
  // CAST-431, the feature nudge for CAST-412). On CAST-412 entry this is byte-identical to boot
  // (= FEATURE.nudge = NUDGES[0]), so the feature canvas + its nudge-op cycle are un-regressed.
  // The morph (3.4) flips family WITHOUT a hashchange, so this never fires on a morph — the morph
  // owns its own nudge state on CAST-412.
  if (g.nudge) appState.nudge = { ...g.nudge };
  chatFor(m[1]).scriptKey = g.family;          // PRF2: scriptKey set per-goal on route entry, by family
}
function navigate() {
  syncGoalFromRoute(location.hash);
  paint();
}

addEventListener('hashchange', navigate);
