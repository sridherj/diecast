name: Feature request
description: Propose a new capability for Diecast.
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature. Please describe the problem
        first, then the solution you have in mind.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem does this solve? Who hits it?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Sketch the API, command, or flow you have in mind.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why you ruled them out.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, prior art, or anything else useful.
    validations:
      required: false
