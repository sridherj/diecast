name: Anonymization Lint
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install pytest
      - run: bin/lint-anonymization
      - run: bin/audit-interdependencies
      - run: bin/check-doc-links
      - run: pytest tests/
