<!--
  Archetype: Code-Snippet Showcase
  When to use: Information or Reveal slides — API usage, implementation patterns, code walkthroughs.
  Density limits: Max 15 lines visible, dark code theme, line highlighting required.
  Placeholders: {{SLIDE_ID}}, {{ACTION_TITLE}}, {{LANG}}, {{LINE_HIGHLIGHTS}}, {{CODE}}, {{SPEAKER_NOTES}}
  Notes: data-line-numbers="3-5|8-10" for step-through highlighting.
-->
<section id="{{SLIDE_ID}}">
  <h2 class="slide-title" style="text-align: left;">{{ACTION_TITLE}}</h2>

  <pre style="margin-top: 0.8em;"><code class="language-{{LANG}}" data-trim data-line-numbers="{{LINE_HIGHLIGHTS}}">
{{CODE}}
  </code></pre>

  <aside class="notes">{{SPEAKER_NOTES}}</aside>
</section>
