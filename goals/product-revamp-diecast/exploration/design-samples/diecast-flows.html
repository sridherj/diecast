<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Diecast — flows</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ════════════════ DIECAST KIT — identity locked ════════════════ */
:root{
  --cream:#F5F4F0; --cream-deep:#EDEBE4; --cream-shadow:#E2DFD5;
  --paper:#FFFFFF; --ink:#1A1A28; --ink60:#4A4860; --ink35:#9C99AC; --ink20:#C9C6D2;
  --line:#DDD8CD; --line-soft:#E9E6DD;
  --rasp:#D6235C; --rasp08:rgba(214,35,92,.08); --rasp15:rgba(214,35,92,.16);
  --maker:#3B5BB0; --maker08:rgba(59,91,176,.09);
  --checker:#6B47B0; --ok:#2D7D4F; --ok08:rgba(45,125,79,.09); --warn:#B5821A; --warn08:rgba(181,130,26,.1);
  --mono:'IBM Plex Mono',ui-monospace,monospace; --sans:'DM Sans',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--sans);color:var(--ink);background:var(--cream-deep);
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  -webkit-font-smoothing:antialiased;
}
button{font-family:var(--sans);cursor:pointer;border:0;background:none}
.shell{
  display:grid;grid-template-columns:232px minmax(0,1fr) 296px;
  width:min(1320px,100%);height:min(800px,calc(100vh - 48px));
  background:var(--cream);border:1px solid var(--line);border-radius:14px;overflow:hidden;
  box-shadow:0 28px 70px -34px rgba(26,26,40,.28),0 2px 6px rgba(26,26,40,.05);
}
/* micro-label */
.lab{font-family:var(--mono);font-size:9px;letter-spacing:.17em;text-transform:uppercase;color:var(--ink35)}
.hr-lab{display:flex;align-items:baseline;gap:9px}
.hr-lab::after{content:"";flex:1;height:1px;background:var(--line-soft)}

/* ════ avatars — the agent grammar (humans=circles, agents=squares, same slot) ════ */
.av{
  width:22px;height:22px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:8.5px;font-weight:600;
}
.av.h{border-radius:50%;background:var(--ink);color:var(--cream)}
.av.m{border-radius:6px;border:1.5px solid var(--maker);color:var(--maker);background:var(--paper)}
.av.c{border-radius:6px;background:var(--checker);color:#fff}
.pairstack{display:inline-flex;align-items:center}
.pairstack .av+.av{margin-left:-7px;box-shadow:0 0 0 2px var(--paper)}
/* status dots — Linear vocabulary */
.sd{width:8px;height:8px;border-radius:50%;flex-shrink:0;position:relative}
.sd.working{background:var(--maker)}
.sd.working::after{content:"";position:absolute;inset:-3.5px;border-radius:50%;border:1.5px solid var(--maker);opacity:.4;animation:ping 2s ease-out infinite}
.sd.queued{background:transparent;border:1.5px solid var(--ink20)}
.sd.review{background:var(--checker)}
.sd.done{background:var(--ok)}
.sd.you{background:var(--rasp)}
.sd.you::after{content:"";position:absolute;inset:-3.5px;border-radius:50%;border:1.5px solid var(--rasp);opacity:.45;animation:ping 2.2s ease-out infinite}
@keyframes ping{0%{transform:scale(.45);opacity:.55}80%,100%{transform:scale(1.2);opacity:0}}
@media (prefers-reduced-motion:reduce){.sd::after{animation:none!important}}

/* ════ LEFT — goal rail ════ */
.rail{background:var(--cream);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:18px 12px 14px}
.brand{font-family:var(--mono);font-weight:600;font-size:15px;letter-spacing:-.03em;padding:0 10px}
.brand em{font-style:normal;color:var(--rasp)}
.tag{font-family:var(--mono);font-size:8.5px;color:var(--ink35);letter-spacing:.15em;text-transform:uppercase;padding:2px 10px 20px}
.rail .hr-lab{padding:0 10px 8px}
.goal{
  display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13px;
  color:var(--ink60);cursor:pointer;position:relative;transition:background .14s;
  border:1px solid transparent;
}
.goal:hover{background:rgba(26,26,40,.04)}
.goal.sel{background:var(--paper);color:var(--ink);font-weight:500;border-color:var(--line);box-shadow:0 1px 3px rgba(26,26,40,.06)}
.goal.sel::before{content:"";position:absolute;left:-12px;top:8px;bottom:8px;width:3px;background:var(--rasp);border-radius:0 2px 2px 0}
.fam{font-family:var(--mono);font-size:8px;letter-spacing:.07em;padding:2.5px 6px;border-radius:3px;
  color:var(--ink60);background:var(--cream-deep);border:1px solid var(--line-soft);flex-shrink:0;min-width:38px;text-align:center}
.goal.sel .fam{background:var(--rasp08);border-color:var(--rasp15);color:var(--rasp)}
.goal .t{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;letter-spacing:-.01em}
.ws{margin-top:auto;padding-top:12px}
.ws .goal{font-size:12.5px;padding:7px 10px;gap:10px}
.glyph{width:14px;text-align:center;color:var(--ink35);font-size:11.5px}
.badge{font-family:var(--mono);font-size:9px;background:var(--ink);color:var(--cream);border-radius:99px;padding:2px 7px}

/* ════ CENTER — the step surface ════ */
.canvas{position:relative;overflow-y:auto;padding:24px 30px 28px;background:var(--cream)}
.crumb{font-family:var(--mono);font-size:10px;color:var(--ink35);margin-bottom:13px;letter-spacing:.04em}
.crumb b{color:var(--ink60);font-weight:500}
.headrow{display:flex;align-items:baseline;gap:13px;flex-wrap:wrap;margin-bottom:16px}
.gtitle{font-family:var(--mono);font-weight:600;font-size:22px;letter-spacing:-.035em}
.fampill{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;color:var(--rasp);
  border:1px solid var(--rasp15);background:var(--rasp08);border-radius:99px;padding:3.5px 10px;position:relative;top:-3px}
.meta{font-family:var(--mono);font-size:10.5px;color:var(--ink35)}

/* stepper — discrete steps, the user's existing mental model */
.stepper{display:flex;align-items:center;margin-bottom:14px}
.step{display:flex;align-items:center;gap:8px;cursor:pointer;padding:7px 10px;border-radius:7px;transition:background .14s}
.step:hover{background:rgba(26,26,40,.04)}
.step .ix{
  width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:9px;font-weight:600;flex-shrink:0;
  border:1.5px solid var(--ink20);color:var(--ink35);background:var(--paper);
}
.step.done .ix{border-color:var(--ok);color:var(--ok)}
.step.now .ix{background:var(--ink);border-color:var(--ink);color:var(--cream)}
.step .sn{font-family:var(--mono);font-size:11px;color:var(--ink35);letter-spacing:-.01em}
.step.done .sn{color:var(--ink60)}
.step.now .sn{color:var(--ink);font-weight:600}
.step.now{background:var(--paper);box-shadow:inset 0 0 0 1px var(--line),0 1px 3px rgba(26,26,40,.05)}
.step.now::after{content:"";align-self:flex-end}
.step.viewing:not(.now){background:var(--cream-deep)}
.conn{flex:1 0 12px;height:1.5px;background:var(--line);margin:0 2px;min-width:10px;max-width:34px}
.conn.done{background:var(--ok);opacity:.45}
.iterbadge{font-family:var(--mono);font-size:9.5px;background:var(--ink);color:var(--cream);border-radius:99px;padding:3px 9px;margin-left:8px;flex-shrink:0}
.iterbadge i{font-style:normal;color:var(--rasp)}

/* guide bar — L1, the only raspberry block */
.gbar{
  display:flex;align-items:center;gap:12px;margin-bottom:14px;
  background:var(--paper);border:1px solid var(--line);border-left:3px solid var(--rasp);
  border-radius:9px;padding:11px 15px;box-shadow:0 1px 3px rgba(26,26,40,.04);
}
.gbar .gm{font-family:var(--mono);font-size:9px;letter-spacing:.15em;color:var(--rasp);flex-shrink:0}
.gbar .do{font-weight:700;font-size:13.5px;letter-spacing:-.015em}
.gbar .why{font-size:12px;color:var(--ink60)}
.cta{
  margin-left:auto;flex-shrink:0;background:var(--rasp);color:#FFF6F9;font-weight:700;font-size:12.5px;
  border-radius:7px;padding:8px 15px;box-shadow:0 2px 8px -2px rgba(214,35,92,.45);
  transition:transform .12s,box-shadow .12s;
}
.cta:hover{transform:translateY(-1px)}

/* in-flight strip — CI-status mental model */
.strip{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.chiplet{
  display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10.5px;
  color:var(--ink60);background:var(--paper);border:1px solid var(--line);border-radius:99px;
  padding:5px 12px 5px 7px;letter-spacing:-.01em;
}
.chiplet.you{border-color:var(--rasp15);background:var(--rasp08);color:var(--ink)}
.chiplet .st{color:var(--ink35);font-size:9.5px}

/* the step surface card */
.surface{background:var(--paper);border:1px solid var(--line);border-radius:11px;box-shadow:0 1px 4px rgba(26,26,40,.05);overflow:hidden}
.surf-h{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--line-soft)}
.surf-h .lab{flex:1}
.surf-h .src{font-family:var(--mono);font-size:9px;color:var(--ink20);letter-spacing:.08em}

/* —— familiar surface: DOC —— */
.doc{padding:26px 34px 30px;max-width:640px}
.doc h1{font-size:21px;letter-spacing:-.02em;margin-bottom:6px}
.doc .lede{font-size:13.5px;color:var(--ink60);line-height:1.6;margin-bottom:16px}
.doc h3{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink35);margin:16px 0 8px}
.doc ul{list-style:none}
.doc li{font-size:13px;line-height:1.65;padding-left:14px;position:relative;margin-bottom:4px}
.doc li::before{content:"—";position:absolute;left:0;color:var(--ink20)}
.docwrap{display:grid;grid-template-columns:minmax(0,1fr) 190px;gap:0}
.margin{padding:24px 16px;border-left:1px solid var(--line-soft);background:#FCFBF8}
.mcom{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:11px;line-height:1.5;margin-bottom:10px;position:relative}
.mcom::before{content:"";position:absolute;left:-17px;top:14px;width:16px;height:1px;background:var(--line)}
.mcom .who{display:flex;align-items:center;gap:6px;font-weight:700;font-size:10.5px;margin-bottom:3px}
.mcom .when{font-family:var(--mono);font-size:8.5px;color:var(--ink35);margin-left:auto;font-weight:400}
.mcom.open{border-left:2px solid var(--warn)}
.mcom.resolved{opacity:.55}
.mcom .act{font-family:var(--mono);font-size:8.5px;color:var(--rasp);letter-spacing:.08em;text-transform:uppercase;margin-top:6px;cursor:pointer}
.hl{background:var(--warn08);border-bottom:1px dashed var(--warn);cursor:pointer}
.vrow{display:flex;gap:8px;align-items:center;padding:13px 34px;border-top:1px solid var(--line-soft);background:#FCFBF8}
.vchip{font-family:var(--mono);font-size:9.5px;color:var(--ink60);background:var(--cream-deep);border-radius:99px;padding:3px 9px}
.appr{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--ink60);margin-left:10px}

/* —— familiar surface: BOARD (Linear list idiom) —— */
.board{padding:6px 0 10px}
.bgroup{padding:10px 18px 4px}
.brow{
  display:flex;align-items:center;gap:11px;padding:9px 18px;font-size:13px;cursor:pointer;
  border-top:1px solid transparent;border-bottom:1px solid transparent;transition:background .12s;
}
.brow:hover{background:#FBFAF6}
.brow .id{font-family:var(--mono);font-size:10.5px;color:var(--ink35);width:64px;flex-shrink:0}
.brow .bt{flex:1;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brow .props{display:flex;align-items:center;gap:10px;flex-shrink:0}
.kchip{font-family:var(--mono);font-size:8.5px;letter-spacing:.05em;color:var(--ink35);border:1px solid var(--line-soft);border-radius:4px;padding:1.5px 6px}
.kchip.warn{color:var(--warn);border-color:var(--warn);background:var(--warn08)}
.kchip.you{color:var(--rasp);border-color:var(--rasp15);background:var(--rasp08)}
.rework{display:inline-flex;gap:2px;align-items:center}
.rework i{width:9px;height:3.5px;border-radius:2px;background:var(--cream-shadow)}
.rework i.u{background:var(--warn)}

/* —— familiar surface: REPORT (CI idiom) —— */
.report{padding:18px 22px 20px}
.rhead{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.rbig{font-family:var(--mono);font-weight:600;font-size:16px;letter-spacing:-.02em}
.rbig.ok{color:var(--ok)} .rbig.bad{color:var(--rasp)}
.check{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11.5px;padding:8px 4px;border-top:1px solid var(--line-soft)}
.check .nm{flex:1;color:var(--ink60);letter-spacing:-.01em}
.check .det{color:var(--ink35);font-size:10px}
.ico{width:16px;text-align:center;flex-shrink:0}
.ico.ok{color:var(--ok)} .ico.bad{color:var(--rasp)} .ico.warn{color:var(--warn)}
.redgreen{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line-soft);border:1px solid var(--line-soft);border-radius:8px;overflow:hidden;margin-top:14px}
.rg{background:var(--paper);padding:13px 15px}
.rg .lab{margin-bottom:8px}
.rg pre{font-family:var(--mono);font-size:10.5px;line-height:1.7;color:var(--ink60);white-space:pre-wrap}
.rg.red pre b{color:var(--rasp);font-weight:600}
.rg.green pre b{color:var(--ok);font-weight:600}

/* —— familiar surface: LEDGER (incident-timeline idiom) —— */
.ledger{padding:14px 22px 18px;position:relative}
.lrow{display:grid;grid-template-columns:52px 18px minmax(0,1fr);gap:0 12px;position:relative}
.lrow .tm{font-family:var(--mono);font-size:9.5px;color:var(--ink35);padding-top:13px;text-align:right}
.lrow .node{position:relative;display:flex;justify-content:center}
.lrow .node::before{content:"";position:absolute;top:0;bottom:0;width:1.5px;background:var(--line-soft);left:50%}
.lrow:first-child .node::before{top:14px}
.lrow:last-child .node::before{bottom:auto;height:14px}
.lrow .node i{position:relative;z-index:1;width:9px;height:9px;border-radius:50%;margin-top:14px;background:var(--ink20);font-style:normal}
.lrow.refuted .node i{background:var(--ink20)}
.lrow.confirmed .node i{background:var(--ok)}
.lrow.live .node i{background:var(--maker);box-shadow:0 0 0 4px var(--maker08)}
.lcard{margin:6px 0;border:1px solid var(--line-soft);border-radius:8px;padding:10px 13px;background:#FCFBF8}
.lrow.live .lcard{background:var(--paper);border-color:var(--line);box-shadow:0 1px 4px rgba(26,26,40,.05)}
.lcard .lt{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;letter-spacing:-.01em}
.lcard .lt .hid{font-family:var(--mono);font-size:9.5px;color:var(--ink35);font-weight:400}
.lcard .verdict{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;margin-left:auto}
.lrow.refuted .verdict{color:var(--ink35)} .lrow.refuted .lt .htext{color:var(--ink35);text-decoration:line-through;font-weight:400}
.lrow.live .verdict{color:var(--maker)}
.lcard .pd{font-size:11.5px;color:var(--ink60);margin-top:5px;line-height:1.55}
.lcard .pd b{font-weight:600}

/* —— familiar surface: NOTEBOOK (Hex idiom) —— */
.nb{padding:16px 22px 20px}
.cell{border:1px solid var(--line-soft);border-radius:7px;margin-bottom:8px;overflow:hidden}
.cell .ch{display:flex;align-items:center;gap:9px;padding:7px 12px;background:#FCFBF8;font-family:var(--mono);font-size:10px;color:var(--ink35);cursor:pointer}
.cell .ch .n{color:var(--ink60)}
.chartwrap{border:1px solid var(--line);border-radius:9px;padding:16px 18px 10px;margin:14px 0 10px;background:var(--paper)}
.chartwrap .ct{font-size:13.5px;font-weight:700;letter-spacing:-.015em;margin-bottom:2px}
.chartwrap .cs{font-size:11px;color:var(--ink60);margin-bottom:10px}
.prov{font-family:var(--mono);font-size:9.5px;color:var(--ink35);display:flex;gap:14px}
.prov a{color:var(--ink60);text-decoration:none;border-bottom:1px solid var(--line)}

/* —— familiar surface: MEMO (spike) —— */
.memo{padding:22px 26px;max-width:620px}
.memo .q{font-size:16px;font-weight:700;letter-spacing:-.02em;margin-bottom:14px}
.tb{margin-bottom:16px}
.tb .tline{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9.5px;color:var(--ink35);margin-bottom:5px}
.tb .bar{height:6px;border-radius:3px;background:var(--cream-deep);overflow:hidden}
.tb .fill{height:100%;width:56%;background:var(--ink);border-radius:3px}
.probe{display:flex;gap:10px;align-items:baseline;padding:8px 0;border-top:1px solid var(--line-soft);font-size:12.5px}
.probe .pn{font-family:var(--mono);font-size:11px;color:var(--ink60);width:170px;flex-shrink:0}
.probe .pr{color:var(--ink60)}
.verdraft{margin-top:14px;border:1px dashed var(--ink35);border-radius:8px;padding:12px 14px;background:var(--cream)}
.verdraft .lab{margin-bottom:6px}
.verdraft .vt{font-size:13px;font-weight:600;line-height:1.5}
.conf{font-family:var(--mono);font-size:9px;border:1px solid var(--warn);color:var(--warn);border-radius:3px;padding:1.5px 6px;margin-left:8px}

/* todo placeholder */
.todoph{padding:46px 30px;text-align:center;color:var(--ink35)}
.todoph .big{font-family:var(--mono);font-size:12px;letter-spacing:.04em;margin-bottom:6px;color:var(--ink60)}
.todoph .sm{font-size:12px}

/* decision seal */
.seal{
  display:inline-flex;gap:9px;align-items:center;margin-top:14px;font-size:11px;color:var(--ink60);
  border:1px dashed var(--ink35);border-radius:6px;padding:6.5px 12px;background:var(--cream);
}
.seal b{color:var(--ink);font-weight:600;font-family:var(--mono);font-size:10.5px;letter-spacing:-.01em}
.lvl{font-family:var(--mono);font-size:8px;padding:1.5px 5px;border-radius:3px;letter-spacing:.06em;border:1px solid var(--line);color:var(--ink35)}
.lvl.l2{border-color:var(--warn);color:var(--warn)}

/* ════ RIGHT — Guide ════ */
.chat{background:var(--paper);border-left:1px solid var(--line);display:flex;flex-direction:column;min-height:0}
.chat-h{padding:16px 16px 12px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;gap:9px}
.gmark{width:25px;height:25px;border-radius:7px;background:var(--rasp08);border:1px solid var(--rasp15);
  color:var(--rasp);display:inline-flex;align-items:center;justify-content:center;font-size:12px}
.chat-h .t{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:-.02em}
.chat-h .s{font-family:var(--mono);font-size:8.5px;color:var(--ink35);letter-spacing:.1em;text-transform:uppercase}
.msgs{padding:15px 15px 8px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.m{max-width:95%;font-size:12px;line-height:1.55}
.m .mlab{font-family:var(--mono);font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink35);margin-bottom:3px}
.m.you{align-self:flex-end}
.m.you .bub{background:var(--cream);border:1px solid var(--line-soft);border-radius:10px 10px 3px 10px;padding:8px 11px}
.m.g .mlab{color:var(--rasp)}
.m.g .bub{border-left:2px solid var(--rasp15);padding:1px 0 1px 11px}
.op{font-family:var(--mono);font-size:9px;color:var(--rasp);background:var(--rasp08);border-radius:4px;padding:1.5px 6px;white-space:nowrap}
.acard{margin-top:8px;border:1px solid var(--line);border-radius:8px;background:var(--cream);padding:9px 11px;font-size:11px}
.acard .at{font-family:var(--mono);font-size:10.5px;font-weight:600;margin-bottom:2px}
.acard .am{color:var(--ink60);font-size:10.5px}
.acard .pin{display:inline-block;margin-top:7px;font-family:var(--mono);font-size:8.5px;letter-spacing:.08em;
  color:var(--rasp);cursor:pointer;border-bottom:1px solid var(--rasp15);text-transform:uppercase}
.inp{margin:11px 13px 14px;display:flex;align-items:center;gap:8px;border:1px solid var(--line);
  border-radius:9px;padding:10px 12px;font-size:12px;color:var(--ink35);background:var(--cream)}

/* helpers */
function surf(label, idiom, body){
  return `<section class="surface"><div class="surf-h"><span class="lab">${label}</span><span class="src">${idiom}</span></div>${body}</section>`;
}
function g(label, rows){ return `<div class="bgroup hr-lab"><span class="lab">${label}</span></div>${rows.join("")}`; }
function r(dot,id,title,who,chips){
  const ch = chips.map(([t,k])=>k==="warn"?`<span class="kchip warn">${t}</span>`
    :k==="you"?`<span class="kchip you">${t}</span>`
    :t.includes("rework")?`<span class="kchip">${t.replace("rework","")}</span>`
    :t.startsWith("<span")?t:`<span class="kchip">${t}</span>`).join("");
  return `<div class="brow"><span class="sd ${dot}"></span><span class="id">${id}</span><span class="bt">${title}</span><span class="props">${ch}${who}</span></div>`;
}
function boardRows(groups){ return `<div class="board">${groups.join("")}</div>`; }

        ${needsYou?`<span class="sd you"></span>`:""}</div>`;}).join("")}
    <div class="ws"><div class="hr-lab" style="padding:0 10px 8px"><span class="lab">Workspace</span></div>
      <div class="goal"><span class="glyph">▦</span><span class="t">Board</span><span class="badge">@you · 3</span></div>
      <div class="goal"><span class="glyph">⬡</span><span class="t">Marketplace</span></div>
      <div class="goal"><span class="glyph">⚙</span><span class="t">Agent ops</span></div></div>`;
}

function renderCanvas(){
  const f = FLOWS[cur];
  const nowIx = f.steps.findIndex(s=>s.st==="now");
  const showIx = curStep ?? nowIx;
  const step = f.steps[showIx];
  const body = step.view ? SURF[step.view]() :
    `<section class="surface"><div class="todoph"><div class="big">— ${step.n.toUpperCase()} · NOT STARTED —</div><div class="sm">${step.ph||""}</div></div></section>`;

  document.getElementById("canvas").innerHTML = `
    <div class="crumb">northwind <span style="color:var(--line)">/</span> goals <span style="color:var(--line)">/</span> <b>${f.slug}</b></div>
    <div class="headrow"><span class="gtitle">${f.title}</span><span class="fampill">${f.fam==="FEAT"?"FEATURE":f.fam}</span><span class="meta">${f.meta}</span></div>
    <div style="display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink60);margin-bottom:14px">
      <span style="font-family:var(--mono);font-size:9.5px;color:var(--rasp);letter-spacing:.1em">◈ GUIDE</span>${f.guideline}</div>
    <div class="stepper">
      ${f.steps.map((s,i)=>`${i?`<span class="conn ${f.steps[i-1].st==="done"?"done":""}"></span>`:""}
        <span class="step ${s.st} ${i===showIx&&s.st!=="now"?"viewing":""}" onclick="goStep(${i})">
          <span class="ix">${s.st==="done"?"✓":String(i+1).padStart(2,"0")}</span><span class="sn">${s.n}</span></span>`).join("")}
      ${f.iter?`<span class="iterbadge">↺ ${f.iter}</span>`:""}
    </div>
    <div class="gbar"><span class="gm">◈ NEXT</span>
      <div><div class="do">${f.nudge.do}</div><div class="why">${f.nudge.why}</div></div>
      <button class="cta">Go</button></div>
    <div class="strip">${f.strip.map(s=>`<span class="chiplet ${s.you?"you":""}"><span class="sd ${s.dot}"></span>${s.html}</span>`).join("")}</div>
    ${body}`;
}

function renderChat(){
  const f = FLOWS[cur];
  document.getElementById("chat").innerHTML = `
    <div class="chat-h"><span class="gmark">◈</span><div><div class="t">Guide</div><div class="s">${f.slug}</div></div></div>
    <div class="msgs">${f.chat.map(m=>`
      <div class="m ${m.who==="g"?"g":"you"}"><div class="mlab">${m.who==="g"?"◈ guide":"you"}</div>
        <div class="bub">${m.t}${m.card?`<div class="acard"><div class="at">${m.card.t}</div><div class="am">${m.card.m}</div><span class="pin">📌 pin to canvas</span></div>`:""}</div></div>`).join("")}
    </div>
    <div class="inp">Steer, ask, or override the Guide… <span class="key">⏎</span></div>`;
}

function paint(){ renderRail(); renderCanvas(); renderChat(); }
function go(k){ cur=k; curStep=null;
  if(document.startViewTransition) document.startViewTransition(paint); else paint();
  location.hash = k; }
function goStep(i){ curStep=i;
  if(document.startViewTransition) document.startViewTransition(renderCanvas); else renderCanvas(); }

const h = location.hash.replace("#","").split("/");
if (FLOWS[h[0]]) cur = h[0];
if (h[1]!==undefined && h[1]!=="") curStep = +h[1];
paint();
</script>
</body></html>
