{% if job.status == "running" %}
<div class="suggest-status"
     hx-get="/api/news/status"
     hx-trigger="every 3s"
     hx-swap="outerHTML">
    <div class="spinner"></div>
    <span>Generating news digest...</span>
</div>

{% elif job.status == "completed" %}
<div class="suggest-status completed">
    <span>Digest generated successfully.</span>
    <script>setTimeout(function() { window.location.reload(); }, 1000);</script>
</div>

{% elif job.status == "error" %}
<div class="suggest-status error">
    <span>{{ job.error or "Digest generation failed" }}</span>
    <button class="btn btn-sm"
            hx-post="/api/news/generate"
            hx-target="#digest-status"
            hx-swap="innerHTML">
        Retry
    </button>
</div>

{% else %}
{# idle — nothing to show #}
{% endif %}
