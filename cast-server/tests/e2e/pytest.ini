[pytest]
# T2 e2e suite — production cadence, NO env-var overrides (spec §Constraints).
#
# Markers used by this suite. Registering them here silences
# PytestUnknownMarkWarning so a typo would still surface as a real warning.
markers =
    e2e: live-HTTP T2 case (requires cast-server bin + ptyxis on host; runs nightly only)

# pytest-timeout (per Review #10) — honored when the plugin is installed.
# Missing → "Unknown config option: timeout" warning, key inert. Same posture
# as the integration suite (see cast-server/tests/integration/pytest.ini).
timeout = 360
