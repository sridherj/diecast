[pytest]
# Belt-and-suspenders FR-003 defense: any single hung test fails as
# "timed out" instead of stalling the suite. Wall-clock budget for the
# child-delegation T1 module is <30s overall; per-test 5s is the ceiling.
#
# Honored when the `pytest-timeout` plugin is installed. If not, this key is
# ignored — the integration suite still runs, but a runaway test will not be
# auto-killed. See sp2.1 plan for context.
timeout = 5
