{% extends "base.html" %}

{% block title %}About — Diecast{% endblock %}

{% block content %}
<section class="about-page">
    <img src="/static/hero-warm-workshop.png" alt="Diecast workshop" class="about-hero">

    <img src="/static/wordmark.png" alt="Diecast" class="about-wordmark">

    <h2 class="about-tagline-primary">Cast to spec. No drift.</h2>
    <h3 class="about-tagline-secondary">Cast from the same die. Every run.</h3>

    <p class="about-blurb">
        Diecast bundles opinionated agents into a workflow chain you can install in any project.
    </p>

    <nav class="about-links">
        <a href="https://github.com/sridherj/diecast" target="_blank" rel="noopener">GitHub</a>
        <a href="https://github.com/sridherj/diecast/blob/main/LICENSE" target="_blank" rel="noopener">License</a>
        <span class="about-version">v{{ version }}</span>
    </nav>
</section>
{% endblock %}
